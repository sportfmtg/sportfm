    due_date: entry?.due_date||'', status: entry?.status||'En attente',
    reference: entry?.reference||'', notes: entry?.notes||'', ...(entry||{})

  const [busy,setBusy]=useState(false);
  const [employees,setEmployees]=useState([]);

    await logAction(adminEmail, entry?'Écriture modifiée':'Écriture créée', `${form.type} — ${form.label} — ${fmtFCFA(form.amount)}`);

      </div>

      <div className="grid2">

            {(ENTRY_CATEGORIES[form.type]||[]).map(c=><option key={c}>{c}</option>)}

        <div className="field"><label>Libellé *</label>
          <input value={form.label} onChange={e=>set('label',e.target.value)} placeholder="Ex : Facture MTN Mobile Money" /></div>
      </div>

      <div className="grid2">
        <div className="field"><label>Montant (FCFA) *</label>
          <input type="number" value={form.amount} onChange={e=>set('amount',e.target.value)} placeholder="0" min="0" /></div>
        <div className="field"><label>Statut</label>

      </div>

      <div className="grid2">
        <div className="field"><label>Date *</label>

      <div className="grid2">

        <div className="field"><label>Notes internes <span style={{fontWeight:400,color:'var(--muted)',fontSize:12}}>(optionnel)</span></label>
          <input value={form.notes||''} onChange={e=>set('notes',e.target.value)} placeholder="Remarques…" /></div>

function PieChart({ data }){
  // data = [{label, value, color}]
  if(!data||data.length===0) return <div style={{color:'var(--muted)',fontSize:13,padding:20,textAlign:'center'}}>Aucune donnée ce mois.</div>;
  const total = data.reduce((s,d)=>s+d.value,0)||1;
  let cumAngle = -Math.PI/2;
  const slices = data.map(d=>{
    const angle = (d.value/total)*2*Math.PI;
    const x1=Math.cos(cumAngle), y1=Math.sin(cumAngle);
    cumAngle+=angle;
    const x2=Math.cos(cumAngle), y2=Math.sin(cumAngle);
    const large=angle>Math.PI?1:0;
    const path=`M0,0 L${(x1*45).toFixed(2)},${(y1*45).toFixed(2)} A45,45,0,${large},1,${(x2*45).toFixed(2)},${(y2*45).toFixed(2)} Z`;
    return {...d, path};
  });
  return (
    <div style={{display:'flex',gap:20,alignItems:'center',flexWrap:'wrap'}}>
      <svg viewBox="-50 -50 100 100" width="120" height="120" style={{flexShrink:0}}>
        {slices.map((s,i)=><path key={i} d={s.path} fill={s.color} opacity={0.85} />)}
        <circle cx="0" cy="0" r="20" fill="#fff" />
      </svg>
      <div style={{flex:1,minWidth:140}}>
        {slices.map((s,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:7,marginBottom:5}}>
            <span style={{width:10,height:10,borderRadius:2,background:s.color,flexShrink:0,display:'inline-block'}}/>
            <span style={{fontSize:11.5,color:'var(--navy)',flex:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{s.label}</span>
            <span style={{fontSize:11.5,fontWeight:700,color:'#c0392b',whiteSpace:'nowrap'}}>{Number(s.value).toLocaleString('fr-FR')}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function MiniBarChart({ data, color }){
  if(!data||data.length===0) return null;
  const max = Math.max(...data.map(d=>d.v),1);
  return (
    <div style={{display:'flex',alignItems:'flex-end',gap:3,height:48,marginTop:8}}>
      {data.map((d,i)=>(
        <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
          <div style={{width:'100%',background:color,borderRadius:'3px 3px 0 0',height:Math.max(2,Math.round((d.v/max)*44))+'px',opacity:.85}} />
          <div style={{fontSize:9,color:'var(--muted)',whiteSpace:'nowrap'}}>{d.l}</div>
        </div>
      ))}
    </div>
  );
}

  const [filterCategory,setFilterCategory]=useState('all');

  async function load(){
    const { data }=await sb.from('accounting_entries').select('*').order('date',{ascending:false});
    setEntries(data||[]); setLoading(false);
  }
  useEffect(()=>{ load(); },[]);

  async function deleteEntry(id,label){
    if(!confirm(`Supprimer "${label}" ?`)) return;
    await sb.from('accounting_entries').delete().eq('id',id);
    await logAction(adminEmail,'Écriture supprimée',label);
    toast('Supprimé'); load();

  if(editing!==null) return <EntryForm entry={editing.id?editing:null}
    onSave={()=>{setEditing(null);load();}} onCancel={()=>setEditing(null)}

  // ---- Computed metrics ----
  const now = new Date();
  const thisMonth = now.getMonth();
  const thisYear  = now.getFullYear();
  const yearEntries = entries.filter(e=>new Date(e.date).getFullYear()===thisYear);
  const totalAR   = yearEntries.filter(e=>e.type==='AR').reduce((s,e)=>s+Number(e.amount||0),0);
  const totalAP   = yearEntries.filter(e=>e.type==='AP').reduce((s,e)=>s+Number(e.amount||0),0);
  const net       = totalAR - totalAP;
  const pendingAR = entries.filter(e=>e.type==='AR'&&e.status==='En attente').reduce((s,e)=>s+Number(e.amount||0),0);
  const pendingAP = entries.filter(e=>e.type==='AP'&&e.status==='En attente').reduce((s,e)=>s+Number(e.amount||0),0);
  const overdueAP = entries.filter(e=>e.type==='AP'&&e.status==='En retard').reduce((s,e)=>s+Number(e.amount||0),0);

  // Monthly AR/AP for current year (chart)
  const monthlyData = Array.from({length:12},(_,m)=>({
    l: MONTHS_FR[m],
    ar: yearEntries.filter(e=>e.type==='AR'&&new Date(e.date).getMonth()===m).reduce((s,e)=>s+Number(e.amount||0),0),
    ap: yearEntries.filter(e=>e.type==='AP'&&new Date(e.date).getMonth()===m).reduce((s,e)=>s+Number(e.amount||0),0),
  }));

  // Category breakdown
  const catAP = {};
  yearEntries.filter(e=>e.type==='AP').forEach(e=>{ catAP[e.category||'Autre']=(catAP[e.category||'Autre']||0)+Number(e.amount||0); });
  const catAPSorted = Object.entries(catAP).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const catAPMax = catAPSorted[0]?.[1]||1;

  // Filtered list entries
  const years = [...new Set(entries.map(e=>new Date(e.date).getFullYear()))].sort((a,b)=>b-a);
  if(!years.includes(thisYear)) years.unshift(thisYear);
  const listType = tab==='ar'?'AR':tab==='ap'?'AP':null;
  const filtered = entries.filter(e=>{
    const d=new Date(e.date);
    return (!listType||e.type===listType)
      && (filterStatus==='all'||e.status===filterStatus)
      && (filterYear==='all'||d.getFullYear()===Number(filterYear))
      && (filterMonth==='all'||d.getMonth()===Number(filterMonth))

            {t.l}
          </button>
        ))}
        <div style={{flex:1}} />
        <button className="btn-primary" style={{marginBottom:6,marginRight:0}} onClick={()=>setEditing({})}>+ Nouvelle écriture</button>
      </div>

      {loading ? <Spinner/> : tab==='dashboard' ? (
        /* ===== DASHBOARD ===== */
        <div>
          {/* KPI row */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:12,marginBottom:24}}>
            {[
              {l:'Recettes YTD',     n:totalAR,  c:'#1f7a48', bg:'#e3f6ea', sign:'+'},
              {l:'Dépenses YTD',     n:totalAP,  c:'#c0392b', bg:'#fce8e8', sign:'-'},

const SHOW_GROUPS = [
  'Émissions sportives de référence',
  'Société, interaction et communautés',
  'Éducation, impact, culture et divertissement',
];

function ShowForm({ show, onSave, onCancel, adminEmail, toast }){
  const [form,setForm]=useState(show||{ name:'', tag:'', schedule:'', description:'', group_title:SHOW_GROUPS[0], image_url:'', sort_order:0 });
  const [file,setFile]=useState(null);
  const [busy,setBusy]=useState(false);
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));

  async function save(){
    if(!form.name.trim()){ toast('Nom requis'); return; }
    setBusy(true);
    let image_url = form.image_url||null;
    if(file){
      const path=`shows/${Date.now()}_${file.name}`;
      const { error:upErr }=await sb.storage.from('article-images').upload(path,file,{upsert:true});
      if(upErr){ toast('Upload : '+upErr.message); setBusy(false); return; }
      const { data:u }=sb.storage.from('article-images').getPublicUrl(path);
      image_url=u.publicUrl;
    }
    const payload={...form, image_url, sort_order:Number(form.sort_order)||0, updated_at:new Date().toISOString()};
    let res;
    if(show?.id){ res=await sb.from('shows').update(payload).eq('id',show.id); }
    else { res=await sb.from('shows').insert([payload]); }
    setBusy(false);
    if(res.error){ toast('Erreur : '+res.error.message); return; }
    await logAction(adminEmail, show?'Émission modifiée':'Émission ajoutée', form.name);
    toast(show?'Mis à jour':'Émission ajoutée'); onSave();
  }

  return (
    <div className="panel">
      <h3 style={{marginBottom:20}}>{show?'Modifier l\'émission':'Nouvelle émission'}</h3>
      <div className="grid2">
        <div className="field"><label>Nom de l'émission *</label>
          <input value={form.name} onChange={e=>set('name',e.target.value)} placeholder="Ex : Happy Day" /></div>
        <div className="field"><label>Tag / Sous-titre</label>
          <input value={form.tag||''} onChange={e=>set('tag',e.target.value)} placeholder="Ex : MATINALE" /></div>
      </div>
      <div className="field"><label>Horaire &amp; Présentateur</label>
        <input value={form.schedule||''} onChange={e=>set('schedule',e.target.value)} placeholder="Ex : Lun–Ven 06h–08h · Jules Gamligo" /></div>
      <div className="field"><label>Description</label>
        <textarea value={form.description||''} onChange={e=>set('description',e.target.value)}
          placeholder="Décrivez l'émission…" style={{minHeight:70}} /></div>
      <div className="grid2">
        <div className="field"><label>Groupe / Catégorie</label>
          <select value={form.group_title||''} onChange={e=>set('group_title',e.target.value)}>
            {SHOW_GROUPS.map(g=><option key={g}>{g}</option>)}
            <option value="Autre">Autre</option>
          </select></div>
        <div className="field"><label>Ordre d'affichage</label>
          <input type="number" value={form.sort_order||0} onChange={e=>set('sort_order',e.target.value)} min="0" /></div>
      </div>
      <div className="field"><label>Photo de l'émission</label>
        <input type="file" accept="image/*" onChange={e=>setFile(e.target.files[0]||null)} style={{padding:'9px 0',fontSize:13.5}} />
        {form.image_url&&!file&&<div style={{marginTop:8}}><img src={form.image_url} style={{height:60,borderRadius:6,objectFit:'cover'}} /></div>}
      </div>
      <div style={{display:'flex',gap:10,marginTop:4}}>
        <button className="btn-primary" disabled={busy} onClick={save}>{busy?'…':(show?'Enregistrer':'Ajouter')}</button>
        <button className="btn-ghost" onClick={onCancel}>Annuler</button>
      </div>
    </div>
  );
}

function PageJournal({ section }){
  const [logs,setLogs]=useState([]);
  const [open,setOpen]=useState(false);
  const [loading,setLoading]=useState(false);

  useEffect(()=>{
    if(!open) return;
    setLoading(true);
    const keywords = PAGE_LOG_KEYWORDS[section]||[];
    sb.from('admin_logs').select('*').order('created_at',{ascending:false}).limit(200)
      .then(({data})=>{
        const all = data||[];
        const filtered = keywords.length===0 ? all :
          all.filter(l=> keywords.some(kw=>
            (l.action||'').toLowerCase().includes(kw) ||
            (l.details||'').toLowerCase().includes(kw)
          ));
        setLogs(filtered.slice(0,15));
        setLoading(false);
      });
  },[open,section]);

  return (
    <div style={{marginTop:8,marginBottom:24}}>
      <button onClick={()=>setOpen(o=>!o)}
        style={{display:'flex',alignItems:'center',gap:8,fontSize:12.5,fontWeight:700,color:'var(--muted)',
          padding:'8px 14px',border:'1px solid var(--line)',borderRadius:8,background:'#fff',width:'100%',
          justifyContent:'space-between'}}>
        <span>📋 Journal d'activité — {section}</span>
        <span>{open?'▲':'▼'}</span>
      </button>
      {open&&(
        <div style={{background:'#fff',border:'1px solid var(--line)',borderTop:'none',borderRadius:'0 0 8px 8px',padding:'4px 0'}}>
          {loading ? <div style={{padding:'16px',textAlign:'center',color:'var(--muted)',fontSize:13}}>Chargement…</div>
          : logs.length===0 ? <div style={{padding:'16px',textAlign:'center',color:'var(--muted)',fontSize:13}}>Aucune activité enregistrée pour cette section.</div>
          : logs.map((l,i)=>(
            <div key={l.id||i} style={{display:'flex',gap:12,padding:'9px 16px',borderBottom:i<logs.length-1?'1px solid #f1f2f6':'none',alignItems:'flex-start'}}>
              <span style={{fontSize:10.5,color:'var(--muted)',whiteSpace:'nowrap',flexShrink:0,marginTop:1}}>{new Date(l.created_at).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</span>
              <span style={{fontSize:12,fontWeight:700,color:'var(--navy)',flexShrink:0}}>{l.admin_email?.split('@')[0]}</span>
              <span style={{fontSize:12.5,color:'#4a5168',flex:1}}>{l.action}{l.details&&<span style={{color:'var(--muted)'}}> — {l.details}</span>}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function AdBlock({ ad }){
  if(!ad) return null;
  const isYT = ad.video_url && (ad.video_url.includes('youtube.com')||ad.video_url.includes('youtu.be'));
  const ytId = (url)=>{ const m=url.match(/(?:v=|youtu\.be\/)([^&\s]+)/); return m?m[1]:null; };
  const body = ad.type==='video'
    ? (isYT
        ? <iframe width="100%" style={{aspectRatio:'16/9',border:'none',borderRadius:8,display:'block'}}
            src={`https://www.youtube.com/embed/${ytId(ad.video_url)}`} allowFullScreen />
        : <video src={ad.video_url} controls style={{width:'100%',borderRadius:8,display:'block'}} />)
    : (ad.image_url
        ? <img src={ad.image_url} alt={ad.title} style={{width:'100%',display:'block',borderRadius:8}} />
        : null);
  if(!body) return null;
  const card=(
    <div className="ad-block">
      <div className="ad-label">Partenaire</div>
      <div className="ad-body">{body}</div>
      {ad.link_url && <div className="ad-cta">En savoir plus →</div>}
    </div>
  );
  return ad.link_url
    ? <a href={ad.link_url} target="_blank" rel="noopener noreferrer" style={{display:'block',textDecoration:'none'}}>{card}</a>
    : card;
}

function AdminAds({ ads, reload, toast, adminEmail }){
  const [editing,setEditing]=useState(null);
  const [uploading,setUploading]=useState(false);
  const adImgRef=useRef(null);

  async function handleAdImg(e){
    const file=e.target.files?.[0]; if(!file) return;
    if(!file.type.startsWith('image/')){ toast('Image uniquement'); return; }
    setUploading(true);
    try{

function AdminLogs(){
  const [logs,setLogs]=useState([]);
  const [busy,setBusy]=useState(true);
  useEffect(()=>{
    sb.from('admin_logs').select('*').order('created_at',{ascending:false}).limit(200)
      .then(({data})=>{ setLogs(data||[]); setBusy(false); });
  },[]);
  if(busy) return <Spinner/>;
  return (
    <div className="panel">
      <h3>Journal d'activité ({logs.length})</h3>
      {logs.length===0 ? <div className="empty">Aucune action enregistrée pour l'instant.</div> :
      <table className="admin-table"><thead><tr>
        <th>Admin</th><th>Action</th><th>Détails</th><th>Date</th>
      </tr></thead><tbody>
        {logs.map(l=>(
          <tr key={l.id}>
            <td style={{fontWeight:600,fontSize:12.5,color:'var(--navy)'}}>{l.admin_email}</td>
            <td><span className="pill pub" style={{whiteSpace:'nowrap'}}>{l.action}</span></td>
            <td style={{fontSize:12.5,color:'var(--muted)',maxWidth:340}}>{l.details||'—'}</td>
            <td style={{color:'var(--muted)',fontSize:12.5,whiteSpace:'nowrap'}}>{timeAgo(l.created_at)}</td>
          </tr>
        ))}
      </tbody></table>}
    </div>
  );
}

function timeAgo(ts){
  if(!ts) return '';
  const d=new Date(ts), now=new Date(), s=Math.floor((now-d)/1000);
  if(s<60) return "à l'instant";
  const m=Math.floor(s/60); if(m<60) return 'il y a '+m+' min';
  const h=Math.floor(m/60); if(h<24) return 'il y a '+h+' h';
  const days=Math.floor(h/24); if(days<7) return 'il y a '+days+' j';
  return d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
}

  function loadESPN(){
    setEspnLoading(true);
    // Build today's date string YYYYMMDD
    const now = new Date();
    const todayStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
    // Fetch full tournament range June 11 → today (ESPN supports date range with limit)
    const base = 'https://site.api.espn.com/apis/site/v2/sports/soccer/FIFA.WORLD';
    fetch(`${base}/scoreboard?dates=20260611-${todayStr}&limit=200`)
      .then(r=>r.json())
      .then(d=>{
        const evs = d.events||[];
        if(evs.length>0){ setEspnScores(evs); setEspnLoading(false); return; }
        // Fallback: try today only
        return fetch(`${base}/scoreboard`).then(r=>r.json()).then(d2=>{setEspnScores(d2.events||[]); setEspnLoading(false);});
      })
      .catch(()=>setEspnLoading(false));
    // Standings
    fetch('https://site.api.espn.com/apis/v2/sports/soccer/FIFA.WORLD/standings')
      .then(r=>r.json())
      .then(d=>setGroups(d.standings?.groups||[]))
      .catch(()=>{});
    // Leaders — try with season year first, then without
    fetch('https://site.api.espn.com/apis/v2/sports/soccer/FIFA.WORLD/leaders?season=2026&limit=20')
      .then(r=>r.json())
      .then(d=>{
        const ls = d.leaders||[];
        if(ls.length>0){ setAllLeaders(ls); return; }
        return fetch('https://site.api.espn.com/apis/v2/sports/soccer/FIFA.WORLD/leaders?limit=20')

                    <span style={{fontWeight:800,fontSize:16,color:'var(--navy)'}}>{home?.team?.displayName||home?.team?.name||'—'}</span>
                  </div>
                  <div style={{fontWeight:900,fontSize:24,color:'#c8102e',minWidth:80,textAlign:'center',letterSpacing:'.05em'}}>
                    {home?.score||0} – {away?.score||0}
                  </div>
                  <div style={{flex:1,minWidth:100,textAlign:'right'}}>
                    <span style={{fontWeight:800,fontSize:16,color:'var(--navy)'}}>{away?.team?.displayName||away?.team?.name||'—'}</span>
                    {away?.team?.flag?.href ? <img src={away.team.flag.href} alt="" style={{width:24,height:16,objectFit:'cover',borderRadius:2,marginLeft:6,verticalAlign:'middle'}} /> : null}
                  </div>
                  <span style={{fontSize:12,fontWeight:800,padding:'4px 12px',borderRadius:20,background:'#c8102e',color:'#fff',letterSpacing:'.04em',flexShrink:0}}>
                    {status?.shortDetail||status?.description||'LIVE'}
                  </span>
                </div>
              );
            })}
          </div>
        )}

        {/* ─── 2-COL LAYOUT ─── */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 340px',gap:28,alignItems:'start'}}>
          {/* LEFT: All Matches */}
          <div>
            <div className="sechead" style={{marginTop:0}}>
              <h2 style={{fontSize:16}}>📅 Résultats &amp; Matchs</h2><div className="line"></div>
            </div>
            {espnLoading ? <Spinner/> : espnScores.length===0 ? (
              <div style={{background:'#fff',border:'1px solid var(--line)',borderRadius:12,padding:32,textAlign:'center',color:'var(--muted)'}}>
                <div style={{fontSize:32,marginBottom:8}}>⚽</div>
                <div style={{fontWeight:700}}>Aucun match programmé aujourd'hui</div>
                <div style={{fontSize:13,marginTop:4}}>Les données ESPN seront disponibles dès le prochain match.</div>
              </div>
            ) : (
              [...doneMatches,...preMatches].map(ev=>{
                const comp=ev.competitions?.[0];
                const home=comp?.competitors?.find(c=>c.homeAway==='home');
                const away=comp?.competitors?.find(c=>c.homeAway==='away');
                const status=ev.status?.type;
                const isDone=status?.state==='post';
                return (
                  <div key={ev.id} className="cdm-match-card" style={{background:'#fff',border:'1px solid var(--line)',borderRadius:12,padding:'14px 18px',display:'flex',alignItems:'center',gap:12,marginBottom:10,flexWrap:'wrap'}}>
                    <div style={{flex:1,minWidth:80}}>
                      {home?.team?.flag?.href ? <img src={home.team.flag.href} alt="" style={{width:20,height:14,objectFit:'cover',borderRadius:2,marginRight:6,verticalAlign:'middle'}} /> : null}
                      <span style={{fontWeight:700,fontSize:14,color:'var(--navy)'}}>{home?.team?.displayName||home?.team?.name||'—'}</span>
                    </div>
                    <div style={{fontWeight:900,fontSize:18,color:isDone?'var(--navy)':'#2a5bd0',minWidth:70,textAlign:'center'}}>
                      {isDone ? `${home?.score||0} – ${away?.score||0}` : (status?.shortDetail||'–')}
                    </div>
                    <div style={{flex:1,minWidth:80,textAlign:'right'}}>
                      <span style={{fontWeight:700,fontSize:14,color:'var(--navy)'}}>{away?.team?.displayName||away?.team?.name||'—'}</span>
                      {away?.team?.flag?.href ? <img src={away.team.flag.href} alt="" style={{width:20,height:14,objectFit:'cover',borderRadius:2,marginLeft:6,verticalAlign:'middle'}} /> : null}
                    </div>
                    <span style={{fontSize:11,fontWeight:800,padding:'3px 10px',borderRadius:20,background:isDone?'#e8eaf0':'#f0f7ff',color:isDone?'#666':'#2a5bd0',letterSpacing:'.04em',flexShrink:0}}>
                      {status?.shortDetail||status?.description||'—'}
                    </span>
                  </div>
                );
              })
            )}
          </div>

          {/* RIGHT: Tabbed Stats */}
          <div>
            {/* Tab pills */}
            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}}>
              {statCategories.map(sc=>(
                <button key={sc.id} onClick={()=>setStatTab(sc.id)}
                  style={{fontSize:11.5,fontWeight:700,padding:'6px 12px',borderRadius:20,border:'none',cursor:'pointer',
                    background:statTab===sc.id?sc.color:'#f1f2f6',
                    color:statTab===sc.id?'#fff':'var(--navy)',
                    letterSpacing:'.03em',transition:'background .15s'}}>
                  {sc.label}
                </button>
              ))}
            </div>

            {/* Leaderboard card */}
            {statCategories.map(sc=> statTab!==sc.id ? null : (
              <div key={sc.id} style={{background:'#fff',border:'1px solid var(--line)',borderRadius:14,overflow:'hidden',marginBottom:16}}>
                {sc.data.length===0 ? (
                  <div style={{padding:28,textAlign:'center',color:'var(--muted)',fontSize:13}}>
                    <div style={{fontSize:28,marginBottom:8}}>{sc.label.split(' ')[0]}</div>
                    Classement disponible dès le début du tournoi
                  </div>
                ) : sc.data.slice(0,10).map((p,i)=>{
                  const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':null;
                  const headshotUrl = p.athlete?.headshot?.href||'';
                  const initials = (p.athlete?.displayName||p.displayName||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
                  return (
                    <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'11px 16px',
                      borderBottom:i<Math.min(sc.data.length,10)-1?'1px solid #f2f3f7':'none',
                      background:i===0?'rgba(244,196,48,.05)':'#fff'}}>
                      <span style={{width:24,textAlign:'center',fontSize:i<3?17:12,fontWeight:700,color:i>=3?'var(--muted-2)':'',flexShrink:0}}>
                        {medal||i+1}
                      </span>
                      {headshotUrl
                        ? <img src={headshotUrl} alt="" style={{width:32,height:32,objectFit:'cover',borderRadius:'50%',flexShrink:0,border:'2px solid #e8eaf0'}}
                            onError={e=>{ e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }} />
                        : null}
                      <div style={{width:32,height:32,borderRadius:'50%',background:sc.color,flexShrink:0,
                        display:headshotUrl?'none':'flex',alignItems:'center',justifyContent:'center',
                        fontSize:11,fontWeight:800,color:'#fff',letterSpacing:'-.02em',border:'2px solid #e8eaf0'}}>
                        {initials}
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:700,fontSize:13.5,color:'var(--navy)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                          {p.athlete?.displayName||p.displayName||'—'}
                        </div>
                        <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>
                          {p.athlete?.team?.displayName||p.team?.displayName||''}
                        </div>
                      </div>
                      <div style={{display:'flex',flexDirection:'column',alignItems:'center',flexShrink:0}}>
                        <span style={{fontFamily:"'Barlow Semi Condensed',sans-serif",fontWeight:900,fontSize:22,
                          color:i===0?'#f4c430':i===1?'#9ea7b2':i===2?'#cd7f32':sc.color,lineHeight:1}}>
                          {p.value||p.displayValue||0}
                        </span>
                        <span style={{fontSize:9.5,fontWeight:700,color:'var(--muted)',letterSpacing:'.04em',textTransform:'uppercase'}}>{sc.unit}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            ))}

            {/* Mini Stats */}
            <div style={{background:'linear-gradient(135deg,#0a1628,#1a3a2a)',borderRadius:14,padding:20,color:'#fff'}}>
              <div style={{fontFamily:"'Barlow Semi Condensed',sans-serif",fontWeight:800,fontSize:12,letterSpacing:'.08em',color:'#a0b8a8',marginBottom:12}}>STATISTIQUES CDM 2026</div>
              {[
                ['⚽','Matchs joués', doneMatches.length||'—'],
                ['📅','À venir',     preMatches.length||'—'],
                ['🏆','Équipes',     48],
              ].map(([icon,label,val])=>(
                <div key={label} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:'1px solid rgba(255,255,255,.08)'}}>
                  <span style={{fontSize:13,color:'#a0b8a8'}}>{icon} {label}</span>
                  <span style={{fontWeight:800,fontSize:16,color:'#f4c430'}}>{val}</span>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* ─── GROUP STANDINGS ─── */}
        <div style={{marginTop:32}}>
          <div className="sechead">
            <h2 style={{fontSize:16}}>📊 Classements des Groupes</h2><div className="line"></div>
          </div>
          {groups.length===0 ? (
            <div style={{background:'#fff',border:'1px solid var(--line)',borderRadius:12,padding:'20px 24px',color:'var(--muted)',fontSize:13,textAlign:'center'}}>
              Chargement des classements…
            </div>
          ) : (
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(340px,1fr))',gap:20}}>
              {groups.map((g,gi)=>{
                const entries = g.standings?.entries||g.entries||[];
                // Sort by points desc, then GD desc
                const sorted = [...entries].sort((a,b)=>{
                  const gs=(e,n)=>Number(e.stats?.find(s=>s.name===n||s.abbreviation===n)?.value||0);
                  const ptsDiff = gs(b,'points')||gs(b,'PTS') - (gs(a,'points')||gs(a,'PTS'));
                  if(ptsDiff!==0) return ptsDiff;
                  return (gs(b,'pointDifferential')||gs(b,'GD')) - (gs(a,'pointDifferential')||gs(a,'GD'));
                });
                return (
                  <div key={gi} style={{background:'#fff',border:'1px solid var(--line)',borderRadius:14,overflow:'hidden',boxShadow:'0 2px 8px rgba(0,0,0,.05)'}}>
                    {/* Group header */}
                    <div style={{background:'var(--navy)',padding:'11px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <span style={{fontFamily:"'Barlow Semi Condensed',sans-serif",fontWeight:900,fontSize:15,letterSpacing:'.08em',color:'#fff',textTransform:'uppercase'}}>
                        {g.name||`Groupe ${String.fromCharCode(65+gi)}`}
                      </span>
                      <span style={{fontSize:10,fontWeight:700,color:'rgba(255,255,255,.5)',letterSpacing:'.06em'}}>{sorted.length} équipes</span>
                    </div>
                    {/* Column headers */}
                    <div style={{display:'grid',gridTemplateColumns:'20px 1fr 24px 24px 24px 24px 28px 28px 34px',gap:0,padding:'6px 12px',borderBottom:'2px solid #f0f1f5',background:'#f8f9fc'}}>
                      {['#','ÉQUIPE','J','G','N','P','BP','BC','PTS'].map((h,hi)=>(
                        <span key={h} style={{fontSize:9.5,fontWeight:800,letterSpacing:'.04em',color:'var(--muted)',textAlign:hi>1?'center':'left',textTransform:'uppercase'}}>{h}</span>
                      ))}
                    </div>
                    {/* Rows */}
                    {sorted.map((e,ei)=>{
                      const stats = e.stats||[];
                      const gs = (n) => {
                        const s = stats.find(s=>s.name===n||s.abbreviation===n||s.displayName===n);
                        return s?.displayValue??s?.value??'0';
                      };
                      const qualifies = ei < 2;
                      const flagUrl = e.team?.logos?.[0]?.href || e.team?.flag?.href;
                      return (
                        <div key={ei} style={{
                          display:'grid',
                          gridTemplateColumns:'20px 1fr 24px 24px 24px 24px 28px 28px 34px',
                          gap:0,
                          alignItems:'center',
                          padding:'10px 12px',
                          borderBottom:ei<sorted.length-1?'1px solid #f4f5f8':'none',
                          background: ei===0 ? 'rgba(0,107,63,.05)' : ei===1 ? 'rgba(0,107,63,.02)' : '#fff',
                          borderLeft: qualifies ? '3px solid #006b3f' : '3px solid transparent',
                        }}>
                          {/* Rank */}
                          <span style={{fontWeight:800,fontSize:12,color:qualifies?'#006b3f':'var(--muted)',textAlign:'center'}}>{ei+1}</span>
                          {/* Team name + flag */}
                          <div style={{display:'flex',alignItems:'center',gap:6,minWidth:0}}>
                            {flagUrl
                              ? <img src={flagUrl} alt="" style={{width:20,height:14,objectFit:'cover',borderRadius:2,flexShrink:0}} />
                              : <div style={{width:20,height:14,background:'#e0e3ec',borderRadius:2,flexShrink:0}}/>
                            }
                            <span style={{fontWeight:qualifies?700:500,fontSize:12.5,color:'var(--navy)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                              {e.team?.displayName||e.team?.shortDisplayName||e.team?.name||e.name||'—'}
                            </span>
                          </div>
                          {/* Stats */}
                          <span style={{textAlign:'center',fontSize:12,color:'#6b7180'}}>{gs('gamesPlayed')||gs('GP')||'—'}</span>
                          <span style={{textAlign:'center',fontSize:12,fontWeight:600,color:'#1f7a48'}}>{gs('wins')||gs('W')||'0'}</span>
                          <span style={{textAlign:'center',fontSize:12,color:'#6b7180'}}>{gs('ties')||gs('D')||gs('draws')||'0'}</span>
                          <span style={{textAlign:'center',fontSize:12,fontWeight:600,color:'#c0392b'}}>{gs('losses')||gs('L')||'0'}</span>
                          <span style={{textAlign:'center',fontSize:12,color:'#4a5168'}}>{gs('pointsFor')||gs('GF')||gs('goalsFor')||'0'}</span>
                          <span style={{textAlign:'center',fontSize:12,color:'#4a5168'}}>{gs('pointsAgainst')||gs('GA')||gs('goalsAgainst')||'0'}</span>
                          <span style={{textAlign:'center',fontWeight:900,fontSize:15,color:ei===0?'#006b3f':ei===1?'#0a7a4a':'var(--navy)'}}>{gs('points')||gs('PTS')||'0'}</span>
                        </div>
                      );
                    })}
                    {/* Qualifier legend */}
                    <div style={{padding:'6px 12px',background:'#f8f9fc',borderTop:'1px solid #f0f1f5',display:'flex',alignItems:'center',gap:6}}>
                      <div style={{width:10,height:10,borderRadius:2,background:'#006b3f',flexShrink:0}}/>
                      <span style={{fontSize:10,color:'var(--muted)',fontWeight:600}}>Qualifié pour les huitièmes de finale</span>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* ─── PREDICTIONS / POLLS ─── */}
        {preMatches.length>0 && (
          <div style={{marginTop:32}}>
            <div className="sechead">
              <h2 style={{fontSize:16}}>🗳️ Vos Pronostics</h2><div className="line"></div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:16}}>
              {preMatches.slice(0,6).map(ev=>{
                const comp=ev.competitions?.[0];
                const home=comp?.competitors?.find(c=>c.homeAway==='home');
                const away=comp?.competitors?.find(c=>c.homeAway==='away');
                const matchId=ev.id;
                const myVote=votedMap[matchId];
                const pollData=polls[matchId];
                const total=(pollData?.votes_home||0)+(pollData?.votes_draw||0)+(pollData?.votes_away||0)||1;
                const pct=(n)=>Math.round(((n||0)/total)*100);
                const homeName=home?.team?.displayName||home?.team?.name||'Équipe 1';
                const awayName=away?.team?.displayName||away?.team?.name||'Équipe 2';
                return (
                  <div key={matchId} style={{background:'#fff',border:'1px solid var(--line)',borderRadius:14,padding:20}}>
                    <div style={{fontSize:11,fontWeight:800,letterSpacing:'.06em',color:'var(--muted)',marginBottom:10,textTransform:'uppercase'}}>
                      {ev.status?.type?.shortDetail||ev.status?.type?.description||'À venir'}
                    </div>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
                      <span style={{fontWeight:800,fontSize:15,color:'var(--navy)',flex:1}}>{homeName}</span>
                      <span style={{fontWeight:900,fontSize:13,color:'var(--muted)',padding:'0 10px'}}>VS</span>
                      <span style={{fontWeight:800,fontSize:15,color:'var(--navy)',flex:1,textAlign:'right'}}>{awayName}</span>
                    </div>
                    <div style={{fontSize:12.5,fontWeight:700,color:'var(--muted)',marginBottom:10,textAlign:'center'}}>Qui va gagner ?</div>
                    {!myVote ? (
                      <div style={{display:'flex',gap:8}}>
                        <button onClick={()=>votePoll(matchId,homeName,awayName,'home')}
                          style={{flex:1,background:'linear-gradient(135deg,#0a1628,#1a3a2a)',color:'#fff',border:'none',borderRadius:9,padding:'10px 6px',fontSize:12,fontWeight:700,cursor:'pointer',lineHeight:1.3}}>
                          🏠 {homeName.split(' ')[0]}
                        </button>
                        <button onClick={()=>votePoll(matchId,homeName,awayName,'draw')}
                          style={{flex:0,background:'#f1f2f6',color:'var(--navy)',border:'none',borderRadius:9,padding:'10px 12px',fontSize:12,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}}>
                          🤝 Nul
                        </button>
                        <button onClick={()=>votePoll(matchId,homeName,awayName,'away')}
                          style={{flex:1,background:'linear-gradient(135deg,#c8102e,#8a0b20)',color:'#fff',border:'none',borderRadius:9,padding:'10px 6px',fontSize:12,fontWeight:700,cursor:'pointer',lineHeight:1.3}}>
                          {awayName.split(' ')[0]} ✈️
                        </button>
                      </div>
                    ) : (
                      <div>
                        <div style={{fontSize:11,color:'#1f7a48',fontWeight:700,marginBottom:8,textAlign:'center'}}>
                          ✅ Votre vote : {myVote==='home'?homeName:myVote==='draw'?'Nul':awayName}
                        </div>
                        {[
                          {label:homeName,key:'votes_home',color:'#c8102e',pct:pct(pollData?.votes_home)},
                          {label:'Nul',key:'votes_draw',color:'#8a90a2',pct:pct(pollData?.votes_draw)},
                          {label:awayName,key:'votes_away',color:'#006b3f',pct:pct(pollData?.votes_away)},
                        ].map(b=>(
                          <div key={b.key} style={{marginBottom:8}}>
                            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,fontWeight:700,marginBottom:3,color:myVote===b.key.replace('votes_','')?b.color:'var(--navy)'}}>
                              <span>{b.label}</span><span>{b.pct}%</span>
                            </div>
                            <div style={{height:8,background:'#f1f2f6',borderRadius:4,overflow:'hidden'}}>
                              <div className="cdm-poll-bar" style={{height:'100%',width:`${b.pct}%`,background:b.color,borderRadius:4}}/>
                            </div>
                          </div>
                        ))}
                        <div style={{fontSize:11,color:'var(--muted)',textAlign:'center',marginTop:6}}>
                          {(pollData?.votes_home||0)+(pollData?.votes_draw||0)+(pollData?.votes_away||0)} vote{((pollData?.votes_home||0)+(pollData?.votes_draw||0)+(pollData?.votes_away||0))>1?'s':''}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ─── CDM ARTICLES ─── */}
        {cdmArticles.length>0 && (
          <div style={{marginTop:32}}>
            <div className="sechead">
              <h2 style={{fontSize:16}}>📰 Actualités CDM</h2><div className="line"></div>
            </div>
            <div className="grid3">
              {cdmArticles.map(a=>(
                <article key={a.id} className="gcard" style={{cursor:'pointer'}}>
                  <div className={imgCls(a)} style={{...imgStyle(a), position:'relative'}}>
                    <span style={{position:'absolute',top:10,left:10,background:'#c8102e',color:'#fff',fontWeight:800,fontSize:10,letterSpacing:'.07em',padding:'4px 9px',borderRadius:5}}>CDM 2026</span>
                  </div>
                  <div className="eyebrow" style={{marginTop:10,color:'#c8102e'}}>{a.tag}</div>
                  <h4 style={{fontFamily:"'Barlow Semi Condensed',sans-serif",fontWeight:700,fontSize:17,lineHeight:1.15,letterSpacing:'-.005em',margin:0,color:'var(--navy)'}}>{a.title}</h4>
                  <div className="meta" style={{fontSize:12,color:'var(--muted-2)',marginTop:7}}>{timeAgo(a.created_at)}</div>
                </article>
              ))}
            </div>
          </div>
        )}

        {/* Empty state if no ESPN data and no articles */}
        {!espnLoading && espnScores.length===0 && cdmArticles.length===0 && (
          <div style={{textAlign:'center',padding:'60px 20px',color:'var(--muted)'}}>
            <div style={{fontSize:56,marginBottom:12}}>🏆</div>
            <div style={{fontFamily:"'Barlow Semi Condensed',sans-serif",fontWeight:800,fontSize:24,color:'var(--navy)',marginBottom:8}}>Coupe du Monde 2026</div>
            <p style={{fontSize:15,maxWidth:'42ch',margin:'0 auto',lineHeight:1.6}}>
              Les données en direct seront disponibles dès le coup d'envoi. Revenez pour suivre les scores, classements et pronostics !
            </p>
          </div>
        )}

      </div>

      {/* Refresh FAB */}
      <button className="cdm-refresh-btn" onClick={handleRefresh} title="Actualiser les données ESPN" style={{transform:refreshing?'rotate(360deg)':'none',transition:'transform .6s ease'}}>
        ↻
      </button>
    </div>
  );
}

// ============================================================
//  ROOT APP
// ============================================================
function App(){
  const [route,setRoute]=useState(()=> location.hash==='#admin' ? 'admin' : 'site');
  const [nav,setNav]=useState('Home');
  const [openArticle,setOpenArticle]=useState(null);
  const [drawer,setDrawer]=useState(false);
  const [loading,setLoading]=useState(true);
  const [session,setSession]=useState(null);
  const [authChecked,setAuthChecked]=useState(false);
  const [userPerms,setUserPerms]=useState(null); // null = loading
  const [toast,toastNode]=useToast();
  const [showProfile,setShowProfile]=useState(false);
  const [profileTab,setProfileTab]=useState('profile');

  const [data,setData]=useState({ articles:[],standings:[],scores:[],fixtures:[],partners:[],ads:[],shows:[] });

  const loadPublic = useCallback(async ()=>{
    const [art,st,sc,fx,ads,sh]=await Promise.all([
      sb.from('articles').select('*').eq('published',true).order('created_at',{ascending:false}),
      sb.from('standings').select('*'),
      sb.from('scores').select('*').order('created_at',{ascending:false}),
      sb.from('fixtures').select('*'),
      sb.from('ads').select('*').eq('active',true).order('sort_order',{ascending:true}),
      sb.from('shows').select('*').order('sort_order',{ascending:true}),
    ]);
    setData(d=>({ ...d,
      articles:art.data||[], standings:st.data||[], scores:sc.data||[],
      fixtures:fx.data||[], ads:ads.data||[], shows:sh.data||[] }));
    setLoading(false);
  },[]);

  const loadAdmin = useCallback(async ()=>{
    const [art,st,sc,fx,pt,ads,sh]=await Promise.all([
      sb.from('articles').select('*').order('created_at',{ascending:false}),
      sb.from('standings').select('*'),
      sb.from('scores').select('*').order('created_at',{ascending:false}),
      sb.from('fixtures').select('*'),
      sb.from('partners').select('*').order('created_at',{ascending:false}),
      sb.from('ads').select('*').order('sort_order',{ascending:true}),
      sb.from('shows').select('*').order('sort_order',{ascending:true}),
    ]);
    setData({ articles:art.data||[], standings:st.data||[], scores:sc.data||[],
      fixtures:fx.data||[], partners:pt.data||[], ads:ads.data||[], shows:sh.data||[] });
  },[]);

  // auth bootstrap + role fetch
  useEffect(()=>{
    sb.auth.getSession().then(({data})=>{
      const s = data.session;
      setSession(s); setAuthChecked(true);
      if(s) fetchPerms(s.user.email);
    });
    const { data:sub }=sb.auth.onAuthStateChange((_e,s)=>{
      setSession(s);
      if(s) fetchPerms(s.user.email); else setUserPerms(null);
    });
    return ()=>sub.subscription.unsubscribe();
  },[]);

  async function fetchPerms(email){
    const { data }=await sb.from('user_roles').select('*').eq('email',email).maybeSingle();
    setUserPerms(data || { __full:true }); // no record = full access
  }

  useEffect(()=>{ loadPublic(); },[loadPublic]);
  useEffect(()=>{ if(route==='admin' && session) loadAdmin(); },[route,session,loadAdmin]);

  // hash routing
  useEffect(()=>{
    const onHash=()=>setRoute(location.hash==='#admin'?'admin':'site');
    window.addEventListener('hashchange',onHash); return ()=>window.removeEventListener('hashchange',onHash);
  },[]);
  const goAdmin=()=>{ location.hash='admin'; setRoute('admin'); };
  const goSite=()=>{ location.hash=''; setRoute('site'); };

  function navTo(n){ setNav(n); setOpenArticle(null); setDrawer(false); window.scrollTo({top:0,behavior:'smooth'}); }
  function open(a){ setOpenArticle(a); window.scrollTo({top:0,behavior:'smooth'}); }

  // ---------- ADMIN ROUTE ----------
  if(route==='admin'){
    if(!authChecked) return <div className="login-wrap"><div className="spinner" style={{borderTopColor:'#fff'}}/></div>;
    if(!session) return <><AdminLogin onAuthed={s=>{setSession(s);loadAdmin();}} onExit={goSite} />{toastNode}</>;
    if(userPerms===null) return <div className="login-wrap"><div className="spinner" style={{borderTopColor:'#fff'}}/></div>;
    return <>
      <Admin session={session} onExit={goSite} data={data} reload={loadAdmin} toast={toast} userPerms={userPerms} showProfile={(t)=>{ setProfileTab(t||'profile'); setShowProfile(true); }} />
      {showProfile && <MonEspace session={session} userPerms={userPerms} onClose={()=>setShowProfile(false)} toast={toast} initialTab={profileTab} />}
      {toastNode}
    </>;
  }

  // ---------- PARTNER ROUTE ----------
  const isPartner = nav==='Partner';

  // ---------- PUBLIC SITE ----------
  return (
    <div className="app-pad">
      <div className="util"><div className="wrap">
        <div className="left">
          <span></span>
        </div>
        <div className="right">
          <span onClick={()=>navTo('Shows')}>Grille des programmes</span>
          <span>Newsletter</span>
          <span className="signin" onClick={goAdmin}>Admin</span>
        </div>
      </div></div>

      <header><div className="wrap">
        <button className="menu-btn" onClick={()=>setDrawer(true)} aria-label="Open menu"><i></i><i></i><i></i></button>
        <Logo onClick={()=>navTo('Home')} />
        <nav className="main">
          {NAVS.map(n=><button key={n.key} className={(nav===n.key&&!isPartner)?'active':''} onClick={()=>navTo(n.key)}>{n.label}</button>)}
          <button className={`nav-link cdm-nav-btn${nav==='CDM'?' active':''}`} onClick={()=>navTo('CDM')}>⚽ <span>CDM 2026</span></button>
        </nav>
        <div className="grow"></div>
        <label className="search">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#9aa1b2" strokeWidth="2.4"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg>
          <input placeholder="Rechercher" />
        </label>
        <button className="btn-partner" onClick={()=>navTo('Partner')}>Devenir partenaire</button>
        <button className="listen" onClick={()=>{ document.querySelector('.play-btn')?.click(); toast('Connexion au '+STATION_FREQ); }}><span className="dot"></span>Écouter en direct</button>
      </div></header>

      {!isPartner && <Ticker scores={data.scores} />}

      {nav==='CDM' && !openArticle && <CDMPage articles={data.articles} toast={toast} session={session} />}
      {nav!=='CDM' && (loading ? <Spinner/> :
        isPartner ? <PartnerView onBack={()=>navTo('Home')} toast={toast} /> :
        openArticle ? <div className="wrap"><ArticleView article={openArticle} onBack={()=>setOpenArticle(null)} backLabel={navLabel(nav)} /></div> :
        <div className="wrap">
          {nav==='Home' && <Home articles={data.articles} standings={data.standings} fixtures={data.fixtures}
            ads={data.ads} onOpen={open} onNav={navTo} onTrial={()=>navTo('Partner')} />}
          {nav==='Standings' && <StandingsView standings={data.standings} />}
          {nav==='Articles' && <ArticlesPage articles={data.articles} onOpen={open} />}
          {nav==='Shows' && <CategoryView cat="Shows" articles={data.articles} onOpen={open} shows={data.shows||[]} />}
        </div>
      )}
      }

      <footer><div className="wrap">
        <Logo onClick={()=>navTo('Home')} footer />
        <div className="fnav">
          <span onClick={()=>navTo('Partner')}>Devenir partenaire</span>
          <span onClick={()=>navTo('Shows')}>Programmes</span>
          <span>Publicité</span><span>Contact</span>
        </div>
        <div className="copy">© 2026 SportFM</div>
      </div></footer>

      <Player liveScores={data.scores} />

      <div className={"drawer"+(drawer?" open":"")} onClick={e=>{if(e.target.className.includes('drawer'))setDrawer(false);}}>
        <div className="panel-d">
          {NAVS.map(n=><button key={n.key} onClick={()=>navTo(n.key)}>{n.label}</button>)}
          <button onClick={()=>navTo('CDM')} style={{background:'linear-gradient(135deg,#c8102e,#006b3f)',color:'#fff',borderRadius:10,marginTop:4,fontWeight:800}}>⚽ CDM 2026</button>
          <button onClick={()=>navTo('Partner')} style={{color:'var(--red)'}}>Devenir partenaire</button>
        </div>
      </div>

      {toastNode}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
