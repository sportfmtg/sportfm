<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SportFM</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,500;0,600;0,700;1,800&family=Barlow+Semi+Condensed:ital,wght@0,600;0,700;0,800;1,800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --navy:#0B245E; --navy-deep:#081A45; --red:#EF003F; --ink:#14182a;
    --paper:#eef0f4; --line:#e6e8ef; --muted:#8a90a2; --muted-2:#9aa1b2;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; background:var(--paper); }
  body{ font-family:'Barlow',system-ui,sans-serif; color:var(--ink); min-height:100vh; }
  ::selection{ background:var(--red); color:#fff; }
  a{ color:inherit; text-decoration:none; }
  button{ font-family:inherit; cursor:pointer; border:none; background:none; }
  input,textarea,select{ font-family:inherit; }
  .cond{ font-family:'Barlow Semi Condensed',sans-serif; }
  .wrap{ max-width:1240px; margin:0 auto; padding:0 24px; }
  .app-pad{ padding-bottom:84px; }

  @keyframes wf{ 0%,100%{ transform:scaleY(.32) } 50%{ transform:scaleY(1) } }
  @keyframes tickermove{ from{ transform:translateX(0) } to{ transform:translateX(-50%) } }
  @keyframes pulse{ 0%,100%{ opacity:1 } 50%{ opacity:.35 } }
  @keyframes fadein{ from{ opacity:0; transform:translateY(8px) } to{ opacity:1; transform:none } }
  @keyframes spin{ to{ transform:rotate(360deg) } }
  @media (prefers-reduced-motion: reduce){ *{ animation:none !important; transition:none !important; } }

  .spinner{ width:34px; height:34px; border:3px solid var(--line); border-top-color:var(--red);
    border-radius:50%; animation:spin .8s linear infinite; margin:60px auto; }

  /* utility bar */
  .util{ background:var(--navy-deep); color:#aeb8d6; }
  .util .wrap{ display:flex; justify-content:space-between; align-items:center; height:34px; font-size:12.5px; }
  .util .left{ display:flex; gap:18px; align-items:center; }
  .dot{ width:7px; height:7px; border-radius:50%; background:var(--red); display:inline-block; }
  .util .live{ display:inline-flex; align-items:center; gap:6px; }
  .util .right{ display:flex; gap:20px; align-items:center; }
  .util .right span{ cursor:pointer; } .util .right span:hover{ color:#fff; }

  /* header */
  header{ background:#fff; border-bottom:1px solid var(--line); position:sticky; top:0; z-index:40; }
  header .wrap{ display:flex; align-items:center; gap:30px; height:68px; }
  .logo{ display:flex; align-items:center; cursor:pointer; flex-shrink:0; }
  .logo img{ display:block; height:52px; width:auto; object-fit:contain; }
  .logo-footer img{ height:30px; }
  .logo-text{ font-family:'Barlow Semi Condensed',sans-serif; font-style:italic; font-weight:800;
    font-size:28px; letter-spacing:-.01em; color:var(--navy); align-items:center; line-height:1; }
  .logo-text .fm{ position:relative; padding-right:14px; }
  .logo-text .swoosh{ position:absolute; top:-2px; right:-7px; width:11px; height:11px;
    border:3.5px solid var(--red); border-left-color:transparent; border-bottom-color:transparent;
    border-top-right-radius:11px; transform:rotate(10deg); }
  nav.main{ display:flex; gap:24px; }
  nav.main button{ color:#27304a; font-weight:600; font-size:15px; padding:0; position:relative; }
  nav.main button:hover{ color:var(--red); }
  nav.main button.active{ color:var(--navy); }
  nav.main button.active::after{ content:''; position:absolute; left:0; right:0; bottom:-24px;
    height:3px; background:var(--red); border-radius:2px 2px 0 0; }
  .grow{ flex:1; }
  .search{ display:flex; align-items:center; gap:8px; background:#f1f2f6; border:1px solid var(--line);
    border-radius:8px; padding:8px 12px; width:180px; color:var(--muted-2); font-size:13.5px; }
  .search input{ border:none; background:none; outline:none; font-size:13.5px; color:var(--ink); width:100%; }
  .btn-partner{ background:var(--navy); color:#fff; font-weight:700; font-size:13.5px; padding:9px 14px;
    border-radius:8px; white-space:nowrap; }
  .btn-partner:hover{ background:#0d2a6f; }
  .listen{ display:flex; align-items:center; gap:8px; background:var(--red); color:#fff;
    font-weight:700; font-size:14px; padding:10px 16px; border-radius:8px;
    box-shadow:0 2px 10px rgba(239,0,63,.28); white-space:nowrap; }
  .listen .dot{ background:#fff; animation:pulse 1.6s ease-in-out infinite; }
  .listen:hover{ background:#d40038; }
  .menu-btn{ display:none; }

  /* ticker */
  .ticker{ background:var(--navy); color:#fff; overflow:hidden; }
  .ticker .wrap{ display:flex; align-items:stretch; padding:0; }
  .ticker .badge{ display:flex; align-items:center; gap:7px; background:var(--red); padding:0 16px;
    font-weight:800; font-size:12px; letter-spacing:.08em; flex:0 0 auto; }
  .ticker .badge .dot{ background:#fff; animation:pulse 1.4s ease-in-out infinite; }
  .ticker .track-wrap{ overflow:hidden; flex:1; }
  .ticker-track{ display:flex; width:max-content; animation:tickermove 36s linear infinite; }
  .ticker-track:hover{ animation-play-state:paused; }
  .tk{ display:flex; align-items:center; gap:9px; padding:9px 20px;
    border-right:1px solid rgba(255,255,255,.1); font-size:13px; white-space:nowrap; }
  .tk .score{ font-weight:800; background:rgba(255,255,255,.08); padding:1px 8px; border-radius:4px; }
  .tk .tag{ font-size:11px; font-weight:700; letter-spacing:.04em; }
  .tk .tag.live{ color:#ff5c84; } .tk .tag.ft{ color:#8ea0cf; }

  /* body grid */
  .body{ display:grid; grid-template-columns:1fr 326px; gap:30px; align-items:start;
    padding-top:26px; padding-bottom:60px; }
  .shot{ background:linear-gradient(135deg,#eaecf4 0%,#dde0ea 100%);
    position:relative; background-size:cover; background-position:center;
    display:flex; align-items:center; justify-content:center; }
  .shot.has-img{ background-image:var(--img); }
  .shot-icon::after{ content:'📷'; font-size:22px; opacity:.25; position:absolute; }

  /* card hover lift */
  .gcard{ transition:transform .18s ease; }
  .gcard:hover{ transform:translateY(-3px); }
  .secitem{ transition:transform .18s ease; }
  .secitem:hover{ transform:translateY(-2px); }
  .hero .img img,.hero .img .shot{ transition:transform .45s ease; }
  .hero:hover .img .shot{ transform:scale(1.03); }

  /* better image rendering */
  .img.shot,.img.has-img{ overflow:hidden; }

  /* ad block */
  .ad-block{ border-radius:12px; overflow:hidden; border:1px solid var(--line); background:#fff; }
  .ad-block .ad-label{ padding:7px 14px; font-size:10px; font-weight:700; letter-spacing:.07em; color:var(--muted-2); border-bottom:1px solid var(--line); text-transform:uppercase; }
  .ad-block .ad-body{ padding:12px; }
  .ad-block .ad-cta{ padding:0 14px 12px; font-size:12px; color:var(--red); font-weight:700; }
  .ad-block:hover .ad-cta{ text-decoration:underline; }

  /* better admin */
  .admin-table td{ vertical-align:middle; }
  .panel{ box-shadow:0 1px 4px rgba(8,20,55,.06); }
  .field input:hover,.field textarea:hover,.field select:hover{ border-color:#c8cad6; }

  .hero{ cursor:pointer; animation:fadein .4s ease both; }
  .hero .img{ aspect-ratio:16/8.4; border-radius:12px; overflow:hidden; position:relative; }
  .tagchip{ position:absolute; top:14px; left:14px; background:var(--red); color:#fff; font-weight:800;
    font-size:11px; letter-spacing:.07em; padding:5px 10px; border-radius:5px; }
  .imglabel{ position:absolute; bottom:10px; left:14px; font:11px ui-monospace,monospace; color:#9aa1b6; }
  .hero h1{ font-family:'Barlow Semi Condensed',sans-serif; font-weight:800; font-size:35px;
    line-height:1.04; letter-spacing:-.015em; margin:16px 0 0; color:var(--navy); text-wrap:balance; }
  .hero p{ font-size:16px; line-height:1.5; color:#4a5168; margin:10px 0 0; max-width:62ch; }
  .byline{ display:flex; align-items:center; gap:10px; margin-top:12px; font-size:13px; color:var(--muted); flex-wrap:wrap; }
  .byline .who{ font-weight:700; color:var(--navy); }
  .hero:hover h1{ color:var(--red); }
  .rule{ height:1px; background:#e3e5ec; margin:26px 0; }

  .seclist{ display:flex; flex-direction:column; gap:20px; }
  .secitem{ display:grid; grid-template-columns:188px 1fr; gap:18px; cursor:pointer; align-items:start; }
  .secitem .img{ aspect-ratio:16/10; border-radius:9px; overflow:hidden; }
  .eyebrow{ font-weight:800; font-size:11px; letter-spacing:.06em; color:var(--red); margin-bottom:6px; }
  .secitem h3{ font-family:'Barlow Semi Condensed',sans-serif; font-weight:700; font-size:21px;
    line-height:1.12; letter-spacing:-.01em; margin:0; color:var(--navy); }
  .secitem p{ font-size:14px; line-height:1.45; color:#5a6178; margin:7px 0 0; }
  .secitem .meta{ font-size:12.5px; color:var(--muted-2); margin-top:8px; }
  .secitem:hover h3{ color:var(--red); }

  .sechead{ display:flex; align-items:center; gap:12px; margin:32px 0 18px; }
  .sechead h2{ font-family:'Barlow Semi Condensed',sans-serif; font-weight:800; font-size:15px;
    letter-spacing:.06em; text-transform:uppercase; color:var(--navy); margin:0; }
  .sechead .line{ flex:1; height:2px; background:#e3e5ec; }

  .grid3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:18px; }
  .gcard{ cursor:pointer; }
  .gcard .img{ aspect-ratio:16/10; border-radius:9px; overflow:hidden; }
  .gcard .eyebrow{ font-size:10.5px; margin:10px 0 5px; }
  .gcard h4{ font-family:'Barlow Semi Condensed',sans-serif; font-weight:700; font-size:17px;
    line-height:1.15; letter-spacing:-.005em; margin:0; color:var(--navy); }
  .gcard .meta{ font-size:12px; color:var(--muted-2); margin-top:7px; }
  .gcard:hover h4{ color:var(--red); }

  /* rail */
  aside{ display:flex; flex-direction:column; gap:20px; position:sticky; top:84px; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:12px; overflow:hidden; }
  .card .head{ display:flex; align-items:center; justify-content:space-between; padding:13px 16px; border-bottom:1px solid #eef0f4; }
  .card .head .title{ display:flex; align-items:center; gap:8px; font-family:'Barlow Semi Condensed',sans-serif;
    font-weight:800; font-size:15px; letter-spacing:.04em; text-transform:uppercase; color:var(--navy); }
  .card .head .title .dot{ animation:pulse 1.8s ease-in-out infinite; }
  .card .head .more{ font-size:12px; font-weight:700; color:var(--muted); cursor:pointer; }
  .card .head .more:hover{ color:var(--red); }
  .tbl-head{ display:grid; grid-template-columns:24px 1fr 30px 34px; padding:7px 16px; font-size:10.5px;
    font-weight:700; letter-spacing:.05em; color:var(--muted-2); border-bottom:1px solid #eef0f4; }
  .tbl-head span:nth-child(3){ text-align:center; } .tbl-head span:nth-child(4){ text-align:right; }
  .trow{ display:grid; grid-template-columns:24px 1fr 30px 34px; align-items:center; padding:9px 16px;
    border-bottom:1px solid #f2f3f7; } .trow:last-child{ border-bottom:none; }
  .trow:hover{ background:#f7f8fb; }
  .trow .pos{ font-weight:700; font-size:13px; }
  .trow .club{ display:flex; align-items:center; gap:9px; min-width:0; }
  .crest{ width:22px; height:22px; border-radius:5px; color:#fff; font-weight:800; font-size:10px;
    display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
  .trow .name{ font-weight:600; font-size:13.5px; color:#1c2236; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .trow .pld{ text-align:center; font-size:13px; color:#6b7180; }
  .trow .pts{ text-align:right; font-weight:800; font-size:14px; color:var(--navy); }
  .fix{ display:flex; align-items:center; justify-content:space-between; padding:11px 16px; border-bottom:1px solid #f2f3f7; }
  .fix:last-child{ border-bottom:none; }
  .fix .teams{ display:flex; align-items:center; gap:8px; font-weight:700; font-size:13px; color:#1c2236; }
  .fix .teams .v{ color:#b9bdca; font-weight:600; }
  .fix .when{ text-align:right; } .fix .when .t{ font-weight:800; font-size:12.5px; color:var(--navy); }
  .fix .when .d{ font-size:11px; color:var(--muted-2); }

  .promo{ background:var(--navy); border-radius:12px; padding:20px; color:#fff; position:relative; overflow:hidden; }
  .promo .swoosh-big{ position:absolute; top:-30px; right:-30px; width:90px; height:90px;
    border:14px solid var(--red); border-left-color:transparent; border-bottom-color:transparent;
    border-top-right-radius:90px; transform:rotate(10deg); opacity:.9; }
  .promo .kicker{ font-family:'Barlow Semi Condensed',sans-serif; font-weight:800; font-size:13px; letter-spacing:.08em; color:#7e8cb5; }
  .promo .ptitle{ font-family:'Barlow Semi Condensed',sans-serif; font-weight:800; font-size:23px; line-height:1.1; margin:8px 0 6px; }
  .promo p{ font-size:13px; color:#b9c2dc; margin:0 0 14px; }
  .promo .cta{ display:inline-flex; background:var(--red); color:#fff; font-weight:700; font-size:13px; padding:9px 16px; border-radius:7px; }
  .promo .cta:hover{ background:#ff1a52; }

  /* article */
  .article{ animation:fadein .35s ease both; padding-top:26px; padding-bottom:60px; max-width:760px; }
  .back{ display:inline-flex; align-items:center; gap:8px; font-weight:700; font-size:13px; color:var(--muted); margin-bottom:18px; }
  .back:hover{ color:var(--red); }
  .article .tagchip{ position:static; display:inline-block; margin-bottom:14px; }
  .article h1{ font-family:'Barlow Semi Condensed',sans-serif; font-weight:800; font-size:42px;
    line-height:1.03; letter-spacing:-.02em; margin:0 0 14px; color:var(--navy); text-wrap:balance; }
  .article .standfirst{ font-size:19px; line-height:1.45; color:#3a4156; margin:0 0 18px; }
  .article .byline{ margin-bottom:20px; }
  .article .img{ aspect-ratio:16/9; border-radius:12px; overflow:hidden; margin-bottom:24px; }
  .article .prose p{ font-size:17px; line-height:1.65; color:#2b3142; margin:0 0 18px; }

  /* footer */
  footer{ background:var(--navy-deep); color:#9aa6c8; }
  footer .wrap{ padding:34px 24px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px; }
  footer .logo{ color:#fff; font-size:22px; }
  footer .fnav{ display:flex; gap:26px; font-size:13.5px; font-weight:600; }
  footer .fnav span{ cursor:pointer; } footer .fnav span:hover{ color:#fff; }
  footer .copy{ font-size:12px; color:#5e6c93; }

  /* player */
  .player{ position:fixed; left:0; right:0; bottom:0; z-index:60; background:var(--navy);
    color:#fff; box-shadow:0 -8px 30px rgba(8,20,55,.28); }
  .player .inner{ max-width:1240px; margin:0 auto; display:flex; align-items:center; gap:16px; padding:12px 24px; }
  .play-btn{ width:48px; height:48px; border-radius:50%; background:var(--red); flex:0 0 auto;
    display:flex; align-items:center; justify-content:center; box-shadow:0 4px 14px rgba(239,0,63,.4); }
  .play-btn:hover{ background:#ff1a52; }
  .play-btn .pause{ display:flex; gap:4px; } .play-btn .pause i{ width:4px; height:16px; background:#fff; border-radius:1px; display:block; }
  .play-btn .play-tri{ width:0; height:0; border-left:15px solid #fff; border-top:9px solid transparent; border-bottom:9px solid transparent; margin-left:4px; }
  .nowplaying{ min-width:0; flex:0 0 auto; width:230px; }
  .nowplaying .on{ display:flex; align-items:center; gap:7px; }
  .nowplaying .onair{ background:var(--red); font-weight:800; font-size:9.5px; letter-spacing:.06em; padding:2px 6px; border-radius:4px; }
  .nowplaying .freq{ font-size:11px; color:#9fb0d8; }
  .nowplaying .show{ font-family:'Barlow Semi Condensed',sans-serif; font-weight:700; font-size:16px; margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .nowplaying .hosts{ font-size:11.5px; color:#9fb0d8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .wave{ display:flex; align-items:flex-end; gap:3px; height:30px; width:46px; flex:0 0 auto; }
  .wave i{ flex:1; height:100%; background:var(--red); border-radius:2px; transform-origin:bottom; transform:scaleY(.32); opacity:.4; display:block; }
  .player.playing .wave i{ opacity:.92; }
  .player.playing .wave i:nth-child(1){ animation:wf .80s ease-in-out 0s infinite; }
  .player.playing .wave i:nth-child(2){ animation:wf .92s ease-in-out .07s infinite; }
  .player.playing .wave i:nth-child(3){ animation:wf 1.04s ease-in-out .14s infinite; }
  .player.playing .wave i:nth-child(4){ animation:wf 1.16s ease-in-out .21s infinite; }
  .player.playing .wave i:nth-child(5){ animation:wf 1.28s ease-in-out .28s infinite; }
  .player.playing .wave i:nth-child(6){ animation:wf 1.40s ease-in-out .35s infinite; }
  .player .progress{ flex:1; display:flex; align-items:center; gap:12px; min-width:0; }
  .player .vol{ display:flex; align-items:center; gap:8px; flex:0 0 auto; }
  .player .vol input[type=range]{ width:90px; accent-color:var(--red); cursor:pointer; }
  .player .listeners{ display:flex; align-items:center; gap:6px; color:#cdd6ec; font-size:12px; flex:0 0 auto; }
  .player .listeners .dot{ animation:pulse 1.5s ease-in-out infinite; }
  .player .live-pill{ font-size:11px; font-weight:700; color:#9fb0d8; }

  /* toast */
  .toast{ position:fixed; left:50%; bottom:96px; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#fff; font-size:13px; font-weight:600; padding:10px 18px;
    border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,.25); opacity:0; pointer-events:none;
    transition:opacity .25s, transform .25s; z-index:80; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  /* ---------- generic form controls ---------- */
  .field{ margin-bottom:16px; }
  .field label{ display:block; font-weight:700; font-size:13px; color:var(--navy); margin-bottom:6px; }
  .field input, .field textarea, .field select{ width:100%; padding:11px 13px; border:1px solid var(--line);
    border-radius:9px; font-size:14.5px; color:var(--ink); background:#fff; outline:none; }
  .field input:focus, .field textarea:focus, .field select:focus{ border-color:var(--red); box-shadow:0 0 0 3px rgba(239,0,63,.1); }
  .field textarea{ resize:vertical; min-height:90px; }
  .field .hint{ font-size:12px; color:var(--muted); margin-top:5px; }
  .btn-primary{ background:var(--red); color:#fff; font-weight:700; font-size:14.5px; padding:12px 22px; border-radius:9px; }
  .btn-primary:hover{ background:#d40038; } .btn-primary:disabled{ opacity:.55; cursor:default; }
  .btn-ghost{ background:#fff; color:var(--navy); font-weight:700; font-size:14px; padding:10px 18px; border-radius:9px; border:1px solid var(--line); }
  .btn-ghost:hover{ border-color:var(--navy); }
  .chip-grid{ display:flex; flex-wrap:wrap; gap:9px; }
  .chip{ padding:9px 15px; border:1.5px solid var(--line); border-radius:30px; font-weight:600; font-size:13.5px; color:#4a5168; }
  .chip.on{ border-color:var(--red); background:rgba(239,0,63,.06); color:var(--red); }

  /* ---------- partner page ---------- */
  .partner-hero{ background:var(--navy); color:#fff; position:relative; overflow:hidden; }
  .partner-hero .swoosh-big{ position:absolute; top:-60px; right:-40px; width:220px; height:220px;
    border:34px solid var(--red); border-left-color:transparent; border-bottom-color:transparent;
    border-top-right-radius:220px; transform:rotate(10deg); opacity:.85; }
  .partner-hero .wrap{ padding:54px 24px; position:relative; z-index:1; }
  .partner-hero .kicker{ font-family:'Barlow Semi Condensed',sans-serif; font-weight:800; font-size:14px;
    letter-spacing:.1em; color:#7e8cb5; text-transform:uppercase; }
  .partner-hero h1{ font-family:'Barlow Semi Condensed',sans-serif; font-weight:800; font-size:46px;
    line-height:1.02; letter-spacing:-.02em; margin:10px 0 14px; max-width:18ch; }
  .partner-hero p{ font-size:18px; color:#cfd6ea; max-width:60ch; line-height:1.5; margin:0; }
  .partner-stats{ display:flex; gap:36px; margin-top:30px; flex-wrap:wrap; }
  .partner-stats .st .n{ font-family:'Barlow Semi Condensed',sans-serif; font-weight:800; font-size:34px; }
  .partner-stats .st .l{ font-size:13px; color:#9fb0d8; margin-top:2px; }
  .partner-form{ background:#fff; border:1px solid var(--line); border-radius:16px; padding:30px;
    margin:-40px auto 60px; max-width:760px; position:relative; z-index:5; box-shadow:0 12px 40px rgba(8,20,55,.1); }
  .partner-form .step-dots{ display:flex; gap:8px; margin-bottom:24px; }
  .partner-form .step-dots .sd{ height:5px; flex:1; border-radius:3px; background:var(--line); }

// RadioKing — flux direct du player HTML5.
// Le .m3u (https://api.radioking.io/radio/512377/listen.m3u) est une playlist ;
// on utilise l'URL de flux direct, qui se lit dans une balise <audio>.
const RADIO_STREAM_URL = "https://listen.radioking.com/radio/512377/stream/570244";

function Logo({ onClick, footer }){

    <div className={footer?"logo logo-footer":"logo"} onClick={onClick} role="button" tabIndex={0}>

function Crest({ abbr, idx }){
  return <span className="crest" style={{background:crests[idx % crests.length]}}>{abbr}</span>;
}
function Spinner(){ return <div className="spinner" />; }

function useToast(){
  const [msg,setMsg]=useState(null); const t=useRef();
  const show=useCallback((m)=>{ setMsg(m); clearTimeout(t.current); t.current=setTimeout(()=>setMsg(null),2600); },[]);
  const node = <div className={"toast"+(msg?" show":"")}>{msg}</div>;
  return [show, node];
}

// ============================================================
//  RADIO PLAYER (RadioKing stream via <audio>)
// ============================================================
function Player({ liveScores }){
  const [playing,setPlaying]=useState(false);
  const [vol,setVol]=useState(0.7);
  const [err,setErr]=useState(false);
  const audioRef=useRef(null);
  const liveCount = liveScores.filter(s=>s.is_live).length;

  useEffect(()=>{ if(audioRef.current) audioRef.current.volume=vol; },[vol]);

  function toggle(){
    const a=audioRef.current; if(!a) return;
    if(playing){ a.pause(); setPlaying(false); }
    else{
      a.play().then(()=>{ setPlaying(true); setErr(false); })
        .catch(()=>{
          // si le flux direct échoue, on tente la playlist .m3u
          if(a.src!==RADIO_STREAM_FALLBACK){
            a.src=RADIO_STREAM_FALLBACK;
            a.play().then(()=>{ setPlaying(true); setErr(false); }).catch(()=>{ setErr(true); setPlaying(false); });
          } else { setErr(true); setPlaying(false); }
        });
    }
  }
  return (
    <div className={"player"+(playing?" playing":"")}>
      <audio ref={audioRef} src={RADIO_STREAM_URL} preload="none"
        onError={()=>{ setErr(true); setPlaying(false); }} />
      <div className="inner">
        <button className="play-btn" onClick={toggle} aria-label={playing?"Mettre en pause":"Écouter la radio"}>
          {playing ? <span className="pause"><i></i><i></i></span> : <span className="play-tri"></span>}
        </button>
        <div className="nowplaying">
          <div className="on"><span className="onair">EN DIRECT</span><span className="freq">{STATION_FREQ}</span></div>
          <div className="show">{STATION_NAME}</div>
          <div className="hosts">{err ? "Flux indisponible — vérifiez l'URL" : STATION_HOSTS}</div>
        </div>
        <div className="wave"><i></i><i></i><i></i><i></i><i></i><i></i></div>
        <div className="progress">
          <span className="listeners"><span className="dot"></span>{liveCount} personne{liveCount===1?'':'s'} en ligne</span>
        </div>
        <div className="vol">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9fb0d8" strokeWidth="2"><path d="M3 10v4h4l5 4V6L7 10H3z"></path><path d="M16 8a5 5 0 0 1 0 8"></path></svg>
          <input type="range" min="0" max="1" step="0.01" value={vol} onChange={e=>setVol(+e.target.value)} aria-label="Volume" />
        </div>
        <span className="live-pill">{playing?'● EN LECTURE':'EN PAUSE'}</span>
      </div>
    </div>
  );
}

  return (

      <div className="badge"><span className="dot"></span>LIVE</div>
      <div className="track-wrap"><div className="ticker-track">{one}{one}</div></div>

}

function recommendPackage({ budget, goals }){
  const g = goals||[];
  const has = (x)=>g.includes(x);

  if(budget==='Plus de 1 500 000 FCFA'){
    if(has('Sponsoring d\'émission')) return { pkg:'Sponsor Exclusif', why:'Avec votre budget, le Sponsor Exclusif vous offre la présence la plus forte à l\'antenne : 2–3 spots/jour, mentions animateur, visibilité digitale et une capsule vidéo mensuelle.' };
    return { pkg:'Impact 360', why:'Le pack le plus complet de notre offre : 30 spots radio, passages premium, publireportage, 4 publications sociales, vidéos YouTube et TikTok — une présence totale sur toutes nos plateformes.' };
  }
  if(budget==='750 000 – 1 500 000 FCFA'){
    if(has('Sponsoring d\'émission')) return { pkg:'Sponsor Officiel', why:'2 spots/jour + 3 à 5 mentions animateur par semaine + présence sur nos visuels — votre marque associée à une émission écoutée chaque semaine.' };
    if(has('Pack 360°')) return { pkg:'Visibilité 360', why:'20 spots radio + 2 tops horaires + 2 publications Facebook + 2 vidéos sponsorisées + 1 placement de produit par émission — une présence multiplateforme cohérente.' };
    return { pkg:'Pack Domination', why:'3 passages/jour + 2 tops horaires + 4 insertions premium — la présence radio la plus forte pour marquer l\'esprit des auditeurs.' };
  }
  if(budget==='300 000 – 750 000 FCFA'){
    if(has('Contenu digital / réseaux sociaux') || has('Bannière site web')) return { pkg:'Pack Web Visibilité', why:'Bannière en page d\'accueil + article sponsorisé + publication Facebook — visibilité digitale ciblée sur notre audience web.' };
    if(has('Publireportage / contenu de marque')) return { pkg:'Pack Marque Premium', why:'Interview radio + publireportage 5 min + vidéo courte sponsorisée — une association de contenu crédible et mémorable.' };
    if(has('Sponsoring d\'émission')) return { pkg:'Sponsor Associé', why:'Mention de soutien + 1 spot/jour lié à l\'émission de votre choix — une présence régulière auprès d\'une audience fidèle et ciblée.' };
    return { pkg:'Pack Impact', why:'2 passages/jour + 1 top horaire/jour pendant 1 mois — une présence soutenue qui installe votre marque dans les habitudes d\'écoute.' };
  }
  if(budget==='100 000 – 300 000 FCFA'){
    if(has('Pack 360°')) return { pkg:'Découverte 360', why:'10 spots radio + 1 publication Facebook + 1 mention vidéo courte — le meilleur point d\'entrée pour tester notre audience sur plusieurs canaux.' };
    return { pkg:'Pack Présence', why:'2 passages/jour en tranche ordinaire pendant 2 semaines — une exposition régulière pour installer votre message auprès des auditeurs.' };
  }
  return { pkg:'Pack Test', why:'1 passage/jour pendant 1 semaine — idéal pour découvrir notre audience et mesurer l\'impact avant un engagement plus long.' };
}

function dueDateInfo(date){
  if(!date) return { text:'—', color:'var(--muted-2)', weight:400 };
  const d=new Date(date+'T00:00:00'), now=new Date();
  now.setHours(0,0,0,0); d.setHours(0,0,0,0);
  const diff=Math.round((d-now)/(86400000));
  const fmt=d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
  if(diff<0) return { text:fmt+' · EN RETARD', color:'var(--red)', weight:700 };
  if(diff===0) return { text:"Aujourd'hui", color:'#e87820', weight:700 };
  if(diff===1) return { text:'Demain', color:'#e87820', weight:600 };
  if(diff<=7) return { text:fmt+' (dans '+diff+'j)', color:'#5a6178', weight:500 };
  return { text:fmt, color:'var(--muted-2)', weight:400 };
}

function AdminContent({ adminEmail, userRole, toast }){

  const [assigneeFilter,setAssigneeFilter]=useState('all');

  async function load(){
    const { data }=await sb.from('content_tasks').select('*').order('due_date',{ascending:true,nullsFirst:false});
    setTasks(data||[]); setLoading(false);
  }
  useEffect(()=>{ load(); },[]);

    await sb.from('content_tasks').update({status,updated_at:new Date().toISOString()}).eq('id',id);

function AdminLogin({ onAuthed, onExit }){
  const [email,setEmail]=useState(''); const [pw,setPw]=useState('');
  const [err,setErr]=useState(''); const [busy,setBusy]=useState(false);
  async function login(){
    setBusy(true); setErr('');
    const { data, error } = await sb.auth.signInWithPassword({ email, password:pw });
    setBusy(false);
    if(error){ setErr(error.message); return; }
    onAuthed(data.session);
  }
  return (
    <div className="login-wrap">
      <div className="login-card">
        <Logo onClick={()=>{}} />
        <div className="sub">Administration rédaction &amp; partenariats</div>
        {err && <div className="err">{err}</div>}
        <div className="field"><label>E-mail</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&login()} placeholder="redaction@sportfm.com" /></div>
        <div className="field"><label>Mot de passe</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&login()} placeholder="••••••••" /></div>
        <button className="btn-primary" style={{width:'100%'}} disabled={busy} onClick={login}>{busy?'Connexion…':'Se connecter'}</button>
        <button className="btn-ghost" style={{width:'100%',marginTop:10}} onClick={onExit}>← Retour au site</button>
        <p style={{fontSize:12,color:'var(--muted)',textAlign:'center',marginTop:16,lineHeight:1.5}}>
          Créez un administrateur dans Supabase → Authentication → Users, puis connectez-vous ici.
        </p>
      </div>
    </div>
  );
}

const EMPTY_ARTICLE = { title:'',tag:'ACTU',category:'Football',dek:'',body:'',author:'Rédaction SportFM',read_time:'5 min de lecture',image_url:'',is_hero:false,published:true };

function ArticleEditor({ initial, onSave, onCancel, toast }){
  const [a,setA]=useState(initial||EMPTY_ARTICLE);
  const [busy,setBusy]=useState(false);
  const [uploading,setUploading]=useState(false);
  const imgRef=useRef(null);
  const set=(k,v)=>setA(p=>({...p,[k]:v}));

  async function handleImgUpload(e){
    const file=e.target.files?.[0]; if(!file) return;
    if(!file.type.startsWith('image/')){ toast('Fichier invalide — image uniquement'); return; }
    if(file.size>8*1024*1024){ toast('Image trop lourde (max 8 Mo)'); return; }
    setUploading(true);
    try{
      const ext=file.name.split('.').pop().toLowerCase();
      const path=`articles/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
      const { error }=await sb.storage.from('article-images').upload(path,file,{contentType:file.type});
      if(error) throw error;
      const { data }=sb.storage.from('article-images').getPublicUrl(path);
      set('image_url',data.publicUrl); toast('Image téléchargée ✓');
    } catch(err){
      const msg = err.message?.includes('Bucket not found')
        ? 'Bucket introuvable — créez le bucket "article-images" dans Supabase → Storage'
        : 'Erreur upload : '+err.message;
      toast(msg);
    }
    finally{ setUploading(false); }
  }
  async function save(){
    if(!a.title){ toast('Le titre est obligatoire'); return; }
    setBusy(true);
    let res;
    const payload={ title:a.title,tag:a.tag,category:a.category,dek:a.dek,body:a.body,author:a.author,read_time:a.read_time,image_url:a.image_url||null,is_hero:a.is_hero,published:a.published,updated_at:new Date().toISOString() };
    if(a.id){ res=await sb.from('articles').update(payload).eq('id',a.id); }
    else { res=await sb.from('articles').insert([payload]); }
    setBusy(false);
    if(res.error){ toast('Échec de l\'enregistrement — '+res.error.message); return; }
    toast(a.id?'Article mis à jour':'Article publié');
    onSave(a.title);
  }
  return (
    <div className="panel">
      <h3>{a.id?'Modifier l\'article':'Nouvel article'}</h3>
      <div className="field"><label>Titre *</label><input value={a.title} onChange={e=>set('title',e.target.value)} placeholder="Les Hawks dominent United…" /></div>
      <div className="grid2">
        <div className="field"><label>Étiquette (sur-titre)</label><input value={a.tag} onChange={e=>set('tag',e.target.value)} placeholder="COMPTE-RENDU" /></div>
        <div className="field"><label>Catégorie</label>
          <select value={a.category} onChange={e=>set('category',e.target.value)}>
            <option value="Football">Football</option><option value="Basketball">Basket</option><option value="Shows">Émissions</option></select></div>
      </div>
      <div className="field"><label>Chapô (résumé)</label><textarea style={{minHeight:60}} value={a.dek} onChange={e=>set('dek',e.target.value)} /></div>
      <div className="field"><label>Contenu</label><textarea style={{minHeight:200}} value={a.body} onChange={e=>set('body',e.target.value)} placeholder="Rédigez l'article. Laissez une ligne vide entre les paragraphes." /><div className="hint">Séparez les paragraphes par une ligne vide.</div></div>
      <div className="grid2">
        <div className="field"><label>Auteur</label><input value={a.author} onChange={e=>set('author',e.target.value)} /></div>
        <div className="field"><label>Temps de lecture</label><input value={a.read_time} onChange={e=>set('read_time',e.target.value)} placeholder="6 min de lecture" /></div>
      </div>
      <div className="field">
        <label>Image principale <span style={{fontWeight:400,color:'var(--muted)',fontSize:12}}>(optionnel)</span></label>
        <input hidden ref={imgRef} type="file" accept="image/*" onChange={handleImgUpload} />
        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          <input value={a.image_url||''} onChange={e=>set('image_url',e.target.value)}
            placeholder="https://…/photo.jpg ou cliquez Choisir"
            style={{flex:1,padding:'11px 13px',border:'1px solid var(--line)',borderRadius:9,fontSize:14,outline:'none'}} />
          <button type="button" className="btn-ghost" onClick={()=>imgRef.current?.click()} disabled={uploading}
            style={{whiteSpace:'nowrap',flexShrink:0}}>
            {uploading?'Envoi…':'📁 Choisir un fichier'}
          </button>
        </div>
        {a.image_url && (
          <div style={{marginTop:10,position:'relative',display:'inline-block'}}>
            <img src={a.image_url} alt="" style={{maxHeight:140,maxWidth:'100%',borderRadius:8,objectFit:'cover',display:'block'}} />
            <button type="button" onClick={()=>set('image_url','')}
              style={{position:'absolute',top:4,right:4,background:'rgba(0,0,0,.5)',color:'#fff',border:'none',
                borderRadius:'50%',width:22,height:22,fontSize:12,cursor:'pointer',lineHeight:'22px',textAlign:'center'}}>✕</button>
          </div>
        )}
      </div>
      <div style={{display:'flex',gap:20,alignItems:'center',marginBottom:18,flexWrap:'wrap'}}>
        <label style={{display:'flex',gap:8,alignItems:'center',fontWeight:600,fontSize:14}}><input type="checkbox" checked={a.is_hero} onChange={e=>set('is_hero',e.target.checked)} /> Mettre à la une</label>
        <label style={{display:'flex',gap:8,alignItems:'center',fontWeight:600,fontSize:14}}><input type="checkbox" checked={a.published} onChange={e=>set('published',e.target.checked)} /> Publié</label>
      </div>
      <div style={{display:'flex',gap:10}}>
        <button className="btn-primary" disabled={busy} onClick={save}>{busy?'Enregistrement…':(a.id?'Enregistrer':'Publier l\'article')}</button>
        <button className="btn-ghost" onClick={onCancel}>Annuler</button>
      </div>
    </div>
  );
}

function AdminArticles({ articles, reload, toast, adminEmail }){
  const [editing,setEditing]=useState(null);
  async function del(a){
    if(!confirm(`Supprimer « ${a.title} » ?`)) return;
    const { error }=await sb.from('articles').delete().eq('id',a.id);
    if(error){ toast('Échec de la suppression'); return; }
    await logAction(adminEmail,'Suppression article',a.title);
    toast('Article supprimé'); reload();
  }
  if(editing!==null) return <ArticleEditor initial={editing} onSave={async(msg)=>{await logAction(adminEmail,editing.id?'Modification article':'Nouvel article',editing.title||msg);setEditing(null);reload();}} onCancel={()=>setEditing(null)} toast={toast} />;
  return (
    <div className="panel">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
        <h3 style={{margin:0}}>Articles ({articles.length})</h3>
        <button className="btn-primary" onClick={()=>setEditing(EMPTY_ARTICLE)}>+ Nouvel article</button>
      </div>
      {articles.length===0 ? <div className="empty">Aucun article. Publiez votre premier sujet.</div> :
      <table className="admin-table"><thead><tr>
        <th>Titre</th><th>Catégorie</th><th>Statut</th><th>Modifié</th><th></th>
      </tr></thead><tbody>
        {articles.map(a=>(
          <tr key={a.id}>
            <td style={{fontWeight:600,maxWidth:380}}>{a.is_hero && <span style={{color:'var(--red)',marginRight:6}}>★</span>}{a.title}</td>
            <td>{a.category==='Basketball'?'Basket':a.category==='Shows'?'Émissions':a.category}</td>
            <td><span className={"pill "+(a.published?'pub':'draft')}>{a.published?'Publié':'Brouillon'}</span></td>
            <td style={{color:'var(--muted)'}}>{timeAgo(a.updated_at||a.created_at)}</td>
            <td style={{textAlign:'right',whiteSpace:'nowrap'}}>
              <button className="icon-btn" onClick={()=>setEditing(a)}>Modifier</button>
              <button className="icon-btn del" onClick={()=>del(a)}>Supprimer</button>
            </td>
          </tr>
        ))}
      </tbody></table>}
    </div>
  );
}

function AdminScores({ scores, standings, fixtures, reload, toast, adminEmail }){
  const [ns,setNs]=useState({home:'',away:'',score:'0 - 0',status:"0'",is_live:true});
  const [nf,setNf]=useState({home:'',away:'',kickoff_time:'',kickoff_day:'',sort_order:0});

  async function addScore(){
    if(!ns.home||!ns.away){ toast('Renseignez les deux équipes'); return; }
    const { error }=await sb.from('scores').insert([ns]);
    if(error){ toast('Échec : '+error.message); return; }
    await logAction(adminEmail,'Score ajouté',`${ns.home} vs ${ns.away}`);
    setNs({home:'',away:'',score:'0 - 0',status:"0'",is_live:true}); toast('Score ajouté'); reload();
  }
  async function updScore(id,patch){
    const { error }=await sb.from('scores').update(patch).eq('id',id);
    if(error) toast('Échec de la mise à jour'); else reload();
  }
  async function delScore(id,label){
    const { error }=await sb.from('scores').delete().eq('id',id);
    if(error) toast('Échec de la suppression');
    else { await logAction(adminEmail,'Score supprimé',label); toast('Supprimé'); reload(); }
  }
  async function updStanding(id,patch,team){
    const { error }=await sb.from('standings').update(patch).eq('id',id);
    if(error) toast('Échec de la mise à jour');
    else { await logAction(adminEmail,'Classement modifié',team+' — '+JSON.stringify(patch)); reload(); }
  }

  async function addFixture(){
    if(!nf.home||!nf.away){ toast('Renseignez les deux équipes'); return; }
    const { error }=await sb.from('fixtures').insert([nf]);
    if(error){ toast('Échec : '+error.message); return; }
    await logAction(adminEmail,'Match ajouté',`${nf.home} vs ${nf.away} — ${nf.kickoff_day}`);
    setNf({home:'',away:'',kickoff_time:'',kickoff_day:'',sort_order:0}); toast('Match ajouté'); reload();
  }
  async function updFixture(id,patch){
    const { error }=await sb.from('fixtures').update(patch).eq('id',id);
    if(error) toast('Échec de la mise à jour'); else reload();
  }
  async function delFixture(id,label){
    const { error }=await sb.from('fixtures').delete().eq('id',id);
    if(error) toast('Échec de la suppression');
    else { await logAction(adminEmail,'Match supprimé',label); toast('Supprimé'); reload(); }
  }

  const rows=[...standings].sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
  const fixRows=[...fixtures].sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));

  return (
    <>
      <div className="panel">
        <h3>Scores en direct (bandeau)</h3>
        <table className="admin-table"><thead><tr><th>Domicile</th><th>Score</th><th>Extérieur</th><th>Statut</th><th>Direct</th><th></th></tr></thead>
        <tbody>
          {scores.map(s=>(
            <tr key={s.id}>
              <td><input className="inline-edit wide" defaultValue={s.home} onBlur={e=>updScore(s.id,{home:e.target.value})} /></td>
              <td><input className="inline-edit" defaultValue={s.score} onBlur={e=>updScore(s.id,{score:e.target.value})} /></td>
              <td><input className="inline-edit wide" defaultValue={s.away} onBlur={e=>updScore(s.id,{away:e.target.value})} /></td>
              <td><input className="inline-edit" defaultValue={s.status} onBlur={e=>updScore(s.id,{status:e.target.value})} /></td>
              <td><input type="checkbox" defaultChecked={s.is_live} onChange={e=>updScore(s.id,{is_live:e.target.checked})} /></td>
              <td style={{textAlign:'right'}}><button className="icon-btn del" onClick={()=>delScore(s.id,`${s.home} vs ${s.away}`)}>Retirer</button></td>
            </tr>
          ))}
          <tr style={{background:'#fafbfc'}}>
            <td><input className="inline-edit wide" placeholder="RIV" value={ns.home} onChange={e=>setNs({...ns,home:e.target.value})} /></td>
            <td><input className="inline-edit" placeholder="0 - 0" value={ns.score} onChange={e=>setNs({...ns,score:e.target.value})} /></td>
            <td><input className="inline-edit wide" placeholder="OAK" value={ns.away} onChange={e=>setNs({...ns,away:e.target.value})} /></td>
            <td><input className="inline-edit" placeholder="78'" value={ns.status} onChange={e=>setNs({...ns,status:e.target.value})} /></td>
            <td><input type="checkbox" checked={ns.is_live} onChange={e=>setNs({...ns,is_live:e.target.checked})} /></td>
            <td style={{textAlign:'right'}}><button className="icon-btn" onClick={addScore}>+ Ajouter</button></td>
          </tr>
        </tbody></table>
        <div className="hint" style={{marginTop:10,fontSize:12,color:'var(--muted)'}}>Les modifications sont enregistrées dès que vous quittez une cellule.</div>
      </div>

      <div className="panel">
        <h3>Prochains matchs</h3>
        <table className="admin-table"><thead><tr><th>Domicile</th><th>Extérieur</th><th>Heure</th><th>Jour</th><th>Ordre</th><th></th></tr></thead>
        <tbody>
          {fixRows.map(f=>(
            <tr key={f.id}>
              <td><input className="inline-edit wide" defaultValue={f.home} onBlur={e=>updFixture(f.id,{home:e.target.value})} /></td>
              <td><input className="inline-edit wide" defaultValue={f.away} onBlur={e=>updFixture(f.id,{away:e.target.value})} /></td>
              <td><input className="inline-edit" defaultValue={f.kickoff_time} onBlur={e=>updFixture(f.id,{kickoff_time:e.target.value})} placeholder="20h30" /></td>
              <td><input className="inline-edit wide" defaultValue={f.kickoff_day} onBlur={e=>updFixture(f.id,{kickoff_day:e.target.value})} placeholder="Sam 28 juin" /></td>
              <td><input className="inline-edit" style={{width:46}} type="number" defaultValue={f.sort_order||0} onBlur={e=>updFixture(f.id,{sort_order:+e.target.value})} /></td>
              <td style={{textAlign:'right'}}><button className="icon-btn del" onClick={()=>delFixture(f.id,`${f.home} vs ${f.away}`)}>Retirer</button></td>
            </tr>
          ))}
          <tr style={{background:'#fafbfc'}}>
            <td><input className="inline-edit wide" placeholder="Hawks FC" value={nf.home} onChange={e=>setNf({...nf,home:e.target.value})} /></td>
            <td><input className="inline-edit wide" placeholder="United SC" value={nf.away} onChange={e=>setNf({...nf,away:e.target.value})} /></td>
            <td><input className="inline-edit" placeholder="20h30" value={nf.kickoff_time} onChange={e=>setNf({...nf,kickoff_time:e.target.value})} /></td>
            <td><input className="inline-edit wide" placeholder="Sam 28 juin" value={nf.kickoff_day} onChange={e=>setNf({...nf,kickoff_day:e.target.value})} /></td>
            <td><input className="inline-edit" style={{width:46}} type="number" value={nf.sort_order} onChange={e=>setNf({...nf,sort_order:+e.target.value})} /></td>
            <td style={{textAlign:'right'}}><button className="icon-btn" onClick={addFixture}>+ Ajouter</button></td>
          </tr>
        </tbody></table>
        <div className="hint" style={{marginTop:10,fontSize:12,color:'var(--muted)'}}>Les modifications sont enregistrées dès que vous quittez une cellule. L'ordre d'affichage suit la colonne Ordre.</div>
      </div>

      <div className="panel">
        <h3>Classement du championnat</h3>
        <table className="admin-table"><thead><tr><th>#</th><th>Équipe</th><th>Abrév.</th><th>J</th><th>G</th><th>N</th><th>P</th><th>PTS</th></tr></thead>
        <tbody>
          {rows.map((t,i)=>(
            <tr key={t.id}>
              <td style={{color:'var(--muted)'}}>{i+1}</td>
              <td><input className="inline-edit wide" defaultValue={t.team} onBlur={e=>updStanding(t.id,{team:e.target.value},t.team)} /></td>
              <td><input className="inline-edit" style={{width:50}} defaultValue={t.abbr} onBlur={e=>updStanding(t.id,{abbr:e.target.value},t.team)} /></td>
              <td><input className="inline-edit" style={{width:46}} type="number" defaultValue={t.played} onBlur={e=>updStanding(t.id,{played:+e.target.value},t.team)} /></td>
              <td><input className="inline-edit" style={{width:46}} type="number" defaultValue={t.won} onBlur={e=>updStanding(t.id,{won:+e.target.value},t.team)} /></td>
              <td><input className="inline-edit" style={{width:46}} type="number" defaultValue={t.drawn} onBlur={e=>updStanding(t.id,{drawn:+e.target.value},t.team)} /></td>
              <td><input className="inline-edit" style={{width:46}} type="number" defaultValue={t.lost} onBlur={e=>updStanding(t.id,{lost:+e.target.value},t.team)} /></td>
              <td><input className="inline-edit" style={{width:50}} type="number" defaultValue={t.points} onBlur={e=>updStanding(t.id,{points:+e.target.value},t.team)} /></td>
            </tr>
          ))}
        </tbody></table>
        <div className="hint" style={{marginTop:10,fontSize:12,color:'var(--muted)'}}>L'ordre suit la colonne sort_order. Modifiez les points et le classement public se met à jour au prochain chargement.</div>
      </div>
    </>
  );
}

const PARTNER_STATUSES = [
  { key:'new',         label:'Nouveau',           cls:'new' },
  { key:'contacted',   label:'Contacté',          cls:'contacted' },
  { key:'in_discussion', label:'En discussion',   cls:'contacted' },
  { key:'declined',    label:'A décliné',         cls:'draft' },
  { key:'follow_up',   label:'Relance prévue',    cls:'pill' },
  { key:'won',         label:'Gagné ✓',           cls:'won' },
  { key:'archived',    label:'Archivé',           cls:'ft' },
];

function PartnerCRM({ p, onClose, toast, reload, adminEmail }){
  const [status,setStatusL]=useState(p.status||'new');
  const [declineReason,setDeclineReason]=useState(p.decline_reason||'');
  const [followUp,setFollowUp]=useState(p.follow_up_date||'');
  const [notes,setNotes]=useState(p.admin_notes||'');
  const [saving,setSaving]=useState(false);

  const pkg = PACKAGES[p.recommended] || null;

  async function save(){
    setSaving(true);
    const patch = { status, decline_reason:declineReason||null, follow_up_date:followUp||null, admin_notes:notes||null };
    const { error }=await sb.from('partners').update(patch).eq('id',p.id);
    setSaving(false);
    if(error){ toast('Erreur : '+error.message); return; }
    await logAction(adminEmail,'CRM partenaire → '+status, p.company+(declineReason?' — '+declineReason:''));
    toast('Mis à jour'); reload(); onClose();
  }

  return (
    <div style={{background:'#f6f7fb',border:'1px solid var(--line)',borderRadius:12,padding:22,marginBottom:16}}>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:18}}>
        <div>
          <div style={{fontFamily:"'Barlow Semi Condensed',sans-serif",fontWeight:800,fontSize:20,color:'var(--navy)'}}>{p.company}</div>
          <div style={{fontSize:13,color:'var(--muted)',marginTop:2}}>{p.contact_name} · {p.email} {p.phone&&'· '+p.phone}</div>
        </div>
        <button className="icon-btn" onClick={onClose}>✕ Fermer</button>
      </div>

      {/* Recommended pack with price (admin only) */}
      {pkg && (
        <div style={{background:'var(--navy)',borderRadius:10,padding:'14px 18px',marginBottom:18,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
          <div>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:'.07em',color:'#7e8cb5',marginBottom:4}}>PACK RECOMMANDÉ</div>
            <div style={{fontFamily:"'Barlow Semi Condensed',sans-serif",fontWeight:800,fontSize:22,color:'#fff'}}>{p.recommended}</div>
            <div style={{fontSize:12.5,color:'#b9c2dc',marginTop:3}}>{pkg.desc}</div>
          </div>
          <div style={{background:'var(--red)',borderRadius:8,padding:'8px 16px',fontFamily:"'Barlow Semi Condensed',sans-serif",fontWeight:800,fontSize:20,color:'#fff',whiteSpace:'nowrap'}}>
            {pkg.price}
          </div>
        </div>
      )}

      {/* Client details */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'8px 20px',fontSize:13,marginBottom:18,background:'#fff',borderRadius:8,padding:14,border:'1px solid var(--line)'}}>
        <div><span style={{color:'var(--muted)',fontSize:11,fontWeight:700,letterSpacing:'.04em'}}>BUDGET</span><br/><strong>{p.budget||'—'}</strong></div>
        <div><span style={{color:'var(--muted)',fontSize:11,fontWeight:700,letterSpacing:'.04em'}}>SECTEUR</span><br/>{p.industry||'—'}</div>
        <div><span style={{color:'var(--muted)',fontSize:11,fontWeight:700,letterSpacing:'.04em'}}>ÉCHÉANCE</span><br/>{p.timeline||'—'}</div>
        <div style={{gridColumn:'1/-1'}}><span style={{color:'var(--muted)',fontSize:11,fontWeight:700,letterSpacing:'.04em'}}>OBJECTIFS</span><br/>{(p.goals||[]).join(' · ')||'—'}</div>
        {p.message && <div style={{gridColumn:'1/-1'}}><span style={{color:'var(--muted)',fontSize:11,fontWeight:700,letterSpacing:'.04em'}}>MESSAGE</span><br/><em style={{color:'#5a6178'}}>{p.message}</em></div>}
      </div>

      {/* CRM controls */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
        <div className="field" style={{margin:0}}>
          <label>Statut</label>
          <select value={status} onChange={e=>setStatusL(e.target.value)} style={{width:'100%',padding:'10px 12px',border:'1px solid var(--line)',borderRadius:9,fontSize:14,outline:'none'}}>
            {PARTNER_STATUSES.map(s=><option key={s.key} value={s.key}>{s.label}</option>)}
          </select>
        </div>
        <div className="field" style={{margin:0}}>
          <label>Date de relance</label>
          <input type="date" value={followUp} onChange={e=>setFollowUp(e.target.value)}
            style={{width:'100%',padding:'10px 12px',border:'1px solid var(--line)',borderRadius:9,fontSize:14,outline:'none'}} />
        </div>
      </div>

      {status==='declined' && (
        <div className="field">
          <label>Raison du refus <span style={{fontWeight:400,color:'var(--muted)',fontSize:12}}>(à noter pour la relance)</span></label>
          <input value={declineReason} onChange={e=>setDeclineReason(e.target.value)} placeholder="Ex : Budget insuffisant, mauvais timing, concurrent déjà partenaire…" />
        </div>
      )}

      <div className="field">
        <label>Notes internes <span style={{fontWeight:400,color:'var(--muted)',fontSize:12}}>(visibles admin uniquement)</span></label>
        <textarea value={notes} onChange={e=>setNotes(e.target.value)} style={{minHeight:72}} placeholder="Compte-rendu d'appel, conditions négociées, prochaine étape…" />
      </div>

      <div style={{display:'flex',gap:10,alignItems:'center'}}>
        <button className="btn-primary" disabled={saving} onClick={save}>{saving?'Enregistrement…':'Enregistrer'}</button>
        <a className="btn-ghost" href={`mailto:${p.email}?subject=Votre demande de partenariat SportFM`} style={{display:'inline-flex',alignItems:'center',gap:6,textDecoration:'none'}}>
          ✉ Envoyer un e-mail
        </a>
        {p.phone && <a className="btn-ghost" href={`tel:${p.phone}`} style={{display:'inline-flex',alignItems:'center',gap:6,textDecoration:'none'}}>📞 Appeler</a>}
      </div>
    </div>
  );
}

function AdminPartners({ partners, reload, toast, adminEmail }){
  const [open,setOpen]=useState(null);
  const [filter,setFilter]=useState('all');

  const statusInfo=(s)=>PARTNER_STATUSES.find(x=>x.key===s)||{label:s,cls:'ft'};

  const counts = PARTNER_STATUSES.reduce((acc,s)=>{
    acc[s.key]=(partners.filter(p=>p.status===s.key)).length; return acc;
  },{});
  counts.all=partners.length;

  const visible = filter==='all' ? partners : partners.filter(p=>p.status===filter);

  return (
    <div>
      {/* KPI bar */}
      <div style={{display:'flex',gap:12,marginBottom:20,flexWrap:'wrap'}}>
        {[{key:'all',label:'Tous',n:counts.all},
          {key:'new',label:'Nouveaux',n:counts.new},
          {key:'contacted',label:'Contactés',n:counts.contacted},
          {key:'in_discussion',label:'En discussion',n:counts.in_discussion},
          {key:'follow_up',label:'Relance',n:counts.follow_up},
          {key:'won',label:'Gagnés',n:counts.won},
          {key:'declined',label:'Déclinés',n:counts.declined},
        ].map(k=>(
          <button key={k.key} onClick={()=>setFilter(k.key)}
            style={{padding:'7px 14px',borderRadius:20,fontSize:13,fontWeight:700,cursor:'pointer',border:'2px solid',
              borderColor:filter===k.key?'var(--navy)':'var(--line)',
              background:filter===k.key?'var(--navy)':'#fff',
              color:filter===k.key?'#fff':'#4a5168'}}>
            {k.label} <span style={{opacity:.7}}>({k.n})</span>
          </button>
        ))}
      </div>

      {visible.length===0 ? <div className="panel"><div className="empty">Aucune demande dans cette catégorie.</div></div> :
      visible.map(p=>(
        <React.Fragment key={p.id}>
          {open===p.id
            ? <PartnerCRM p={p} onClose={()=>setOpen(null)} toast={toast} reload={reload} adminEmail={adminEmail} />
            : (
              <div className="panel" style={{marginBottom:12,display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
                    <span style={{fontWeight:700,fontSize:15,color:'var(--navy)'}}>{p.company}</span>
                    <span className={'pill '+statusInfo(p.status||'new').cls}>{statusInfo(p.status||'new').label}</span>
                    {p.follow_up_date && <span style={{fontSize:11.5,color:'var(--muted)',fontWeight:600}}>🔔 Relance {new Date(p.follow_up_date).toLocaleDateString('fr-FR')}</span>}
                  </div>
                  <div style={{fontSize:12.5,color:'var(--muted)',marginTop:3}}>
                    {p.contact_name&&p.contact_name+' · '}{p.budget} · Pack : <strong>{p.recommended||'—'}</strong>
                    {PACKAGES[p.recommended]&&<span style={{color:'var(--red)',fontWeight:700}}> ({PACKAGES[p.recommended].price})</span>}
                    {' · '}{timeAgo(p.created_at)}
                  </div>
                  {p.admin_notes && <div style={{fontSize:12,color:'#5a6178',marginTop:4,fontStyle:'italic'}}>📝 {p.admin_notes.slice(0,100)}{p.admin_notes.length>100?'…':''}</div>}
                </div>
                <button className="btn-ghost" style={{flexShrink:0}} onClick={()=>setOpen(p.id)}>Ouvrir le dossier →</button>
              </div>
            )
          }
        </React.Fragment>
      ))}
    </div>
  );
}

const PAY_PERIODS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const CURRENT_YEAR = new Date().getFullYear();

function PaystubForm({ stub, employees, onSave, onCancel, adminEmail, toast }){
  const [form,setForm]=useState(stub || { employee_id:'', period_month:'', period_year:String(CURRENT_YEAR), gross:'', net:'', note:'' });
  const [file,setFile]=useState(null);
  const [busy,setBusy]=useState(false);
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));

  async function save(){
    if(!form.employee_id){ toast('Sélectionnez un employé'); return; }
    if(!form.period_month){ toast('Sélectionnez le mois'); return; }
    if(!stub && !file){ toast('Fichier PDF requis pour une nouvelle fiche'); return; }
    setBusy(true);

    let file_url = stub?.file_url || null;
    if(file){
      const ext = file.name.split('.').pop();
      const path = `paystubs/${Date.now()}_${form.employee_id}.${ext}`;
      const { error: upErr } = await sb.storage.from('paystubs').upload(path, file, { upsert:true });
      if(upErr){ toast('Erreur upload : '+upErr.message); setBusy(false); return; }
      const { data: urlData } = sb.storage.from('paystubs').getPublicUrl(path);
      file_url = urlData.publicUrl;
    }

    const payload = { employee_id:form.employee_id, period_month:form.period_month, period_year:Number(form.period_year),
      gross:form.gross||null, net:form.net||null, note:form.note||null, file_url, updated_at:new Date().toISOString() };
    let res;
    if(stub?.id){ res = await sb.from('paystubs').update(payload).eq('id',stub.id); }
    else { res = await sb.from('paystubs').insert([{...payload, created_by:adminEmail}]); }
    setBusy(false);
    if(res.error){ toast('Erreur : '+res.error.message); return; }
    const emp = employees.find(e=>e.id===form.employee_id);
    await logAction(adminEmail, stub?'Fiche modifiée':'Fiche créée', `${emp?.name||emp?.email} — ${form.period_month} ${form.period_year}`);
    toast(stub?'Mis à jour':'Fiche créée'); onSave();
  }

  return (
    <div className="panel">
      <h3 style={{marginBottom:20}}>{stub?'Modifier la fiche de paie':'Nouvelle fiche de paie'}</h3>

      <div className="field"><label>Employé *</label>
        <select value={form.employee_id} onChange={e=>set('employee_id',e.target.value)}>
          <option value="">— Sélectionner —</option>
          {employees.map(e=><option key={e.id} value={e.id}>{e.name||e.email} {e.name?`(${e.email})`:''}</option>)}
        </select></div>

      <div className="grid2">
        <div className="field"><label>Mois *</label>
          <select value={form.period_month} onChange={e=>set('period_month',e.target.value)}>
            <option value="">— Mois —</option>
            {PAY_PERIODS.map(m=><option key={m}>{m}</option>)}
          </select></div>
        <div className="field"><label>Année *</label>
          <input type="number" value={form.period_year} onChange={e=>set('period_year',e.target.value)} min="2020" max="2099" /></div>
      </div>

      <div className="grid2">
        <div className="field"><label>Salaire brut (FCFA) <span style={{fontWeight:400,color:'var(--muted)',fontSize:12}}>(optionnel)</span></label>
          <input value={form.gross||''} onChange={e=>set('gross',e.target.value)} placeholder="Ex : 350 000" /></div>
        <div className="field"><label>Salaire net (FCFA) <span style={{fontWeight:400,color:'var(--muted)',fontSize:12}}>(optionnel)</span></label>
          <input value={form.net||''} onChange={e=>set('net',e.target.value)} placeholder="Ex : 280 000" /></div>
      </div>

      <div className="field"><label>Fiche de paie (PDF) {stub&&<span style={{fontWeight:400,color:'var(--muted)',fontSize:12}}>— laisser vide pour garder l'existant</span>}</label>
        <input type="file" accept=".pdf,application/pdf" onChange={e=>setFile(e.target.files[0]||null)}
          style={{padding:'9px 0',fontSize:13.5}} />
        {stub?.file_url && !file && <div style={{marginTop:6,fontSize:12.5}}><a href={stub.file_url} target="_blank" style={{color:'var(--navy)'}}>📄 Voir la fiche actuelle</a></div>}
      </div>

      <div className="field"><label>Note interne <span style={{fontWeight:400,color:'var(--muted)',fontSize:12}}>(optionnel)</span></label>
        <input value={form.note||''} onChange={e=>set('note',e.target.value)} placeholder="Prime, ajustement, congés…" /></div>

function EmployeeForm({ emp, onSave, onCancel, adminEmail, toast }){
  const [form,setForm]=useState(emp||{name:'',email:'',department:'',position:'',phone:''});
  const [busy,setBusy]=useState(false);
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  async function save(){
    if(!form.name.trim()||!form.email.trim()){ toast('Nom et e-mail requis'); return; }
    setBusy(true);
    let res;
    if(emp?.id){ res=await sb.from('employees').update({...form,updated_at:new Date().toISOString()}).eq('id',emp.id); }
    else { res=await sb.from('employees').insert([form]); }
    setBusy(false);
    if(res.error){ toast('Erreur : '+res.error.message); return; }
    await logAction(adminEmail, emp?'Employé modifié':'Employé ajouté', form.name);
    toast(emp?'Mis à jour':'Employé ajouté'); onSave();
  }
  return (
    <div className="panel">
      <h3 style={{marginBottom:20}}>{emp?'Modifier l\'employé':'Ajouter un employé'}</h3>
      <div className="grid2">
        <div className="field"><label>Nom complet *</label><input value={form.name} onChange={e=>set('name',e.target.value)} placeholder="Jean Dupont" /></div>
        <div className="field"><label>E-mail *</label><input type="email" value={form.email} onChange={e=>set('email',e.target.value)} placeholder="jean@sportfm.com" /></div>
      </div>
      <div className="grid2">
        <div className="field"><label>Département</label><input value={form.department||''} onChange={e=>set('department',e.target.value)} placeholder="Rédaction, Finance, Direction…" /></div>
        <div className="field"><label>Poste</label><input value={form.position||''} onChange={e=>set('position',e.target.value)} placeholder="Journaliste web, Comptable…" /></div>
      </div>
      <div className="field"><label>Téléphone <span style={{fontWeight:400,color:'var(--muted)',fontSize:12}}>(optionnel)</span></label><input value={form.phone||''} onChange={e=>set('phone',e.target.value)} placeholder="+228 90 00 00 00" /></div>
      <div style={{display:'flex',gap:10,marginTop:4}}>
        <button className="btn-primary" disabled={busy} onClick={save}>{busy?'…':(emp?'Enregistrer':'Ajouter')}</button>

  );
}

function sendPaystubEmail(emp, stub){
  const subject = encodeURIComponent(`Votre fiche de paie — ${stub.period_month} ${stub.period_year} | SportFM`);
  const body = encodeURIComponent(
`Bonjour ${emp.name||emp.email},

Veuillez trouver ci-dessous le lien vers votre fiche de paie pour le mois de ${stub.period_month} ${stub.period_year}.

📄 Télécharger votre fiche de paie :
${stub.file_url}

${stub.gross?`Salaire brut : ${stub.gross} FCFA\n`:''}${stub.net?`Salaire net  : ${stub.net} FCFA\n`:''}${stub.note?`Note : ${stub.note}\n`:''}
Ce document est strictement confidentiel.

Cordialement,
La Direction — SportFM 91.9 FM`
  );
  window.open(`mailto:${emp.email}?subject=${subject}&body=${body}`);
}
