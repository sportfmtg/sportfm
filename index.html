function fmtFCFA(n){ if(!n&&n!==0) return '—'; return Number(n).toLocaleString('fr-FR')+ ' FCFA'; }

function EntryForm({ entry, onSave, onCancel, adminEmail, toast }){
  const defaultType = entry?.type || 'AR';
  const [form,setForm]=useState({
    type: defaultType, category: entry?.category||'', label: entry?.label||'',
    amount: entry?.amount||'', date: entry?.date||new Date().toISOString().slice(0,10),
    due_date: entry?.due_date||'', status: entry?.status||'En attente',
    reference: entry?.reference||'', notes: entry?.notes||'', ...(entry||{})
  });
  const [busy,setBusy]=useState(false);
  const set=(k,v)=>setForm(p=>({...p,[k]:v, ...(k==='type'?{category:''}:{})}));

  async function save(){
    if(!form.label.trim()){ toast('Libellé requis'); return; }
    if(!form.amount||isNaN(Number(form.amount))){ toast('Montant invalide'); return; }
    if(!form.date){ toast('Date requise'); return; }
    setBusy(true);
    const payload = {...form, amount:Number(form.amount), updated_at:new Date().toISOString()};
    let res;
    if(entry?.id){ res = await sb.from('accounting_entries').update(payload).eq('id',entry.id); }
    else { res = await sb.from('accounting_entries').insert([{...payload, created_by:adminEmail}]); }
    setBusy(false);
    if(res.error){ toast('Erreur : '+res.error.message); return; }
    await logAction(adminEmail, entry?'Écriture modifiée':'Écriture créée', `${form.type} — ${form.label} — ${fmtFCFA(form.amount)}`);
    toast(entry?'Mis à jour':'Écriture enregistrée'); onSave();
  }

  return (
    <div className="panel">
      <h3 style={{marginBottom:20}}>{entry?'Modifier l\'écriture':'Nouvelle écriture comptable'}</h3>

      <div style={{display:'flex',gap:10,marginBottom:18}}>
        {['AR','AP'].map(t=>(
          <button key={t} onClick={()=>set('type',t)}
            style={{flex:1,padding:'12px',border:`2px solid ${form.type===t?(t==='AR'?'#1f7a48':'#c0392b'):'var(--line)'}`,
              borderRadius:10,background:form.type===t?(t==='AR'?'#e3f6ea':'#fce8e8'):'#fff',
              fontWeight:800,fontSize:15,color:form.type===t?(t==='AR'?'#1f7a48':'#c0392b'):'var(--muted)',cursor:'pointer'}}>
            {t==='AR'?'💚 Recette (AR)':'🔴 Dépense (AP)'}
          </button>
        ))}
      </div>

      <div className="grid2">
        <div className="field"><label>Catégorie</label>
          <select value={form.category} onChange={e=>set('category',e.target.value)}>
            <option value="">— Catégorie —</option>
            {(ENTRY_CATEGORIES[form.type]||[]).map(c=><option key={c}>{c}</option>)}
          </select></div>
        <div className="field"><label>Libellé *</label>
          <input value={form.label} onChange={e=>set('label',e.target.value)} placeholder="Ex : Facture MTN Mobile Money" /></div>
      </div>

      <div className="grid2">
        <div className="field"><label>Montant (FCFA) *</label>
          <input type="number" value={form.amount} onChange={e=>set('amount',e.target.value)} placeholder="0" min="0" /></div>
        <div className="field"><label>Statut</label>
          <select value={form.status} onChange={e=>set('status',e.target.value)}>
            {ENTRY_STATUSES.map(s=><option key={s}>{s}</option>)}
          </select></div>
      </div>

      <div className="grid2">
        <div className="field"><label>Date *</label>
          <input type="date" value={form.date} onChange={e=>set('date',e.target.value)} /></div>
        <div className="field"><label>Date d'échéance <span style={{fontWeight:400,color:'var(--muted)',fontSize:12}}>(optionnel)</span></label>
          <input type="date" value={form.due_date||''} onChange={e=>set('due_date',e.target.value)} /></div>
      </div>

      <div className="grid2">
        <div className="field"><label>Référence / N° facture <span style={{fontWeight:400,color:'var(--muted)',fontSize:12}}>(optionnel)</span></label>
          <input value={form.reference||''} onChange={e=>set('reference',e.target.value)} placeholder="INV-2026-001" /></div>
        <div className="field"><label>Notes internes <span style={{fontWeight:400,color:'var(--muted)',fontSize:12}}>(optionnel)</span></label>
          <input value={form.notes||''} onChange={e=>set('notes',e.target.value)} placeholder="Remarques…" /></div>
      </div>

      <div style={{display:'flex',gap:10,marginTop:4}}>
        <button className="btn-primary" disabled={busy} onClick={save}>{busy?'…':(entry?'Enregistrer':'Créer')}</button>
        <button className="btn-ghost" onClick={onCancel}>Annuler</button>
      </div>
    </div>
  );
}

function MiniBarChart({ data, color }){
  if(!data||data.length===0) return null;
  const max = Math.max(...data.map(d=>d.v),1);
  return (
    <div style={{display:'flex',alignItems:'flex-end',gap:3,height:48,marginTop:8}}>
      {data.map((d,i)=>(
        <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
          <div style={{width:'100%',background:color,borderRadius:'3px 3px 0 0',height:Math.max(2,Math.round((d.v/max)*44))+'px',opacity:.85}} />
          <div style={{fontSize:9,color:'var(--muted)',whiteSpace:'nowrap'}}>{d.l}</div>
        </div>
      ))}
    </div>
  );
}

function AdminAccounting({ adminEmail, toast }){
  const [entries,setEntries]=useState([]);
  const [loading,setLoading]=useState(true);
  const [editing,setEditing]=useState(null);
  const [tab,setTab]=useState('dashboard'); // dashboard | ar | ap
  const [filterStatus,setFilterStatus]=useState('all');
  const [filterMonth,setFilterMonth]=useState('all');
  const [filterYear,setFilterYear]=useState(String(new Date().getFullYear()));

  async function load(){
    const { data }=await sb.from('accounting_entries').select('*').order('date',{ascending:false});
    setEntries(data||[]); setLoading(false);
  }
  useEffect(()=>{ load(); },[]);

  async function deleteEntry(id,label){
    if(!confirm(`Supprimer "${label}" ?`)) return;
    await sb.from('accounting_entries').delete().eq('id',id);
    await logAction(adminEmail,'Écriture supprimée',label);
    toast('Supprimé'); load();
  }

  if(editing!==null) return <EntryForm entry={editing.id?editing:null}
    onSave={()=>{setEditing(null);load();}} onCancel={()=>setEditing(null)}
    adminEmail={adminEmail} toast={toast} />;

  // ---- Computed metrics ----
  const now = new Date();
  const thisMonth = now.getMonth();
  const thisYear  = now.getFullYear();
  const yearEntries = entries.filter(e=>new Date(e.date).getFullYear()===thisYear);
  const totalAR   = yearEntries.filter(e=>e.type==='AR').reduce((s,e)=>s+Number(e.amount||0),0);
  const totalAP   = yearEntries.filter(e=>e.type==='AP').reduce((s,e)=>s+Number(e.amount||0),0);
  const net       = totalAR - totalAP;
  const pendingAR = entries.filter(e=>e.type==='AR'&&e.status==='En attente').reduce((s,e)=>s+Number(e.amount||0),0);
  const pendingAP = entries.filter(e=>e.type==='AP'&&e.status==='En attente').reduce((s,e)=>s+Number(e.amount||0),0);
  const overdueAP = entries.filter(e=>e.type==='AP'&&e.status==='En retard').reduce((s,e)=>s+Number(e.amount||0),0);

  // Monthly AR/AP for current year (chart)
  const monthlyData = Array.from({length:12},(_,m)=>({
    l: MONTHS_FR[m],
    ar: yearEntries.filter(e=>e.type==='AR'&&new Date(e.date).getMonth()===m).reduce((s,e)=>s+Number(e.amount||0),0),
    ap: yearEntries.filter(e=>e.type==='AP'&&new Date(e.date).getMonth()===m).reduce((s,e)=>s+Number(e.amount||0),0),
  }));

  // Category breakdown
  const catAP = {};
  yearEntries.filter(e=>e.type==='AP').forEach(e=>{ catAP[e.category||'Autre']=(catAP[e.category||'Autre']||0)+Number(e.amount||0); });
  const catAPSorted = Object.entries(catAP).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const catAPMax = catAPSorted[0]?.[1]||1;

  // Filtered list entries
  const years = [...new Set(entries.map(e=>new Date(e.date).getFullYear()))].sort((a,b)=>b-a);
  if(!years.includes(thisYear)) years.unshift(thisYear);
  const listType = tab==='ar'?'AR':tab==='ap'?'AP':null;
  const filtered = entries.filter(e=>{
    const d=new Date(e.date);
    return (!listType||e.type===listType)
      && (filterStatus==='all'||e.status===filterStatus)
      && (filterYear==='all'||d.getFullYear()===Number(filterYear))
      && (filterMonth==='all'||d.getMonth()===Number(filterMonth));
  });

  return (
    <div>
      {/* Sub-tabs */}
      <div style={{display:'flex',gap:0,marginBottom:24,borderBottom:'2px solid var(--line)'}}>
        {[{k:'dashboard',l:'📊 Tableau de bord'},{k:'ar',l:'💚 Recettes (AR)'},{k:'ap',l:'🔴 Dépenses (AP)'}].map(t=>(
          <button key={t.k} onClick={()=>setTab(t.k)}
            style={{padding:'10px 20px',border:'none',borderBottom:tab===t.k?'2px solid var(--navy)':'2px solid transparent',
              background:'none',fontWeight:700,fontSize:13.5,color:tab===t.k?'var(--navy)':'var(--muted)',cursor:'pointer',marginBottom:'-2px'}}>
            {t.l}
          </button>
        ))}
        <div style={{flex:1}} />
        <button className="btn-primary" style={{marginBottom:6,marginRight:0}} onClick={()=>setEditing({})}>+ Nouvelle écriture</button>
      </div>

      {loading ? <Spinner/> : tab==='dashboard' ? (
        /* ===== DASHBOARD ===== */
        <div>
          {/* KPI row */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:12,marginBottom:24}}>
            {[
              {l:'Recettes YTD',     n:totalAR,  c:'#1f7a48', bg:'#e3f6ea', sign:'+'},
              {l:'Dépenses YTD',     n:totalAP,  c:'#c0392b', bg:'#fce8e8', sign:'-'},
              {l:'Résultat net',     n:net,       c:net>=0?'#1f7a48':'#c0392b', bg:net>=0?'#e3f6ea':'#fce8e8', sign:net>=0?'+':'-'},
              {l:'AR en attente',    n:pendingAR, c:'#9a6a00', bg:'#fff4e0', sign:''},
              {l:'AP en attente',    n:pendingAP, c:'#9a6a00', bg:'#fff4e0', sign:''},
              {l:'AP en retard',     n:overdueAP, c:'#c0392b', bg:'#fce8e8', sign:'⚠'},
            ].map((k,i)=>(
              <div key={i} style={{background:k.bg,border:`1px solid ${k.c}22`,borderRadius:10,padding:'14px 16px'}}>
                <div style={{fontSize:10.5,fontWeight:700,letterSpacing:'.05em',color:k.c,opacity:.8,marginBottom:4}}>{k.l.toUpperCase()}</div>
                <div style={{fontFamily:"'Barlow Semi Condensed',sans-serif",fontWeight:800,fontSize:22,color:k.c,lineHeight:1}}>
                  {k.sign==='⚠'&&k.n>0?'⚠ ':''}{Number(k.n).toLocaleString('fr-FR')}
                </div>
                <div style={{fontSize:10,color:k.c,opacity:.7,marginTop:2}}>FCFA</div>
              </div>
            ))}
          </div>

          {/* Charts row */}
          <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16,marginBottom:20}}>
            {/* Monthly bar chart */}
            <div className="panel" style={{padding:'18px 20px'}}>
              <div style={{fontWeight:700,fontSize:14,color:'var(--navy)',marginBottom:4}}>Évolution mensuelle {thisYear}</div>
              <div style={{display:'flex',gap:12,marginBottom:8}}>
                <span style={{fontSize:11,color:'#1f7a48',fontWeight:700}}>■ Recettes</span>
                <span style={{fontSize:11,color:'#c0392b',fontWeight:700}}>■ Dépenses</span>
              </div>
              <div style={{display:'flex',alignItems:'flex-end',gap:4,height:80}}>
                {monthlyData.map((d,i)=>{
                  const maxVal=Math.max(...monthlyData.map(x=>Math.max(x.ar,x.ap)),1);
                  return (
                    <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:1}}>
                      <div style={{width:'100%',display:'flex',gap:1,alignItems:'flex-end',height:66}}>
                        <div style={{flex:1,background:'#1f7a48',borderRadius:'2px 2px 0 0',height:Math.max(2,Math.round((d.ar/maxVal)*64))+'px',opacity:.8}} />
                        <div style={{flex:1,background:'#c0392b',borderRadius:'2px 2px 0 0',height:Math.max(2,Math.round((d.ap/maxVal)*64))+'px',opacity:.8}} />
                      </div>
                      <div style={{fontSize:8.5,color:'var(--muted)'}}>{d.l}</div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Top expense categories */}
            <div className="panel" style={{padding:'18px 20px'}}>
              <div style={{fontWeight:700,fontSize:14,color:'var(--navy)',marginBottom:14}}>Top dépenses {thisYear}</div>
              {catAPSorted.length===0 ? <div style={{color:'var(--muted)',fontSize:13}}>Aucune dépense enregistrée.</div> :
                catAPSorted.map(([cat,amt],i)=>(
                  <div key={i} style={{marginBottom:10}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                      <span style={{fontSize:12,fontWeight:600,color:'var(--navy)'}}>{cat}</span>
                      <span style={{fontSize:12,color:'#c0392b',fontWeight:700}}>{Number(amt).toLocaleString('fr-FR')}</span>
                    </div>
                    <div style={{height:5,background:'#f0f0f0',borderRadius:3}}>
                      <div style={{height:'100%',background:'#c0392b',borderRadius:3,width:(amt/catAPMax*100)+'%',opacity:.7}} />
                    </div>
                  </div>
                ))
              }
            </div>
          </div>

          {/* Recent entries */}
          <div className="panel" style={{padding:0,overflow:'hidden'}}>
            <div style={{padding:'14px 18px',fontWeight:700,fontSize:14,color:'var(--navy)',borderBottom:'1px solid var(--line)'}}>Dernières écritures</div>
            <table className="admin-table"><thead><tr>
              <th>Date</th><th>Type</th><th>Catégorie</th><th>Libellé</th><th>Montant</th><th>Statut</th><th style={{textAlign:'right',paddingRight:16}}></th>
            </tr></thead><tbody>
              {entries.slice(0,8).map(e=>(
                <tr key={e.id}>
                  <td style={{fontSize:12.5,color:'var(--muted)'}}>{e.date}</td>
                  <td><span style={{fontSize:11,fontWeight:800,padding:'2px 8px',borderRadius:20,background:e.type==='AR'?'#e3f6ea':'#fce8e8',color:e.type==='AR'?'#1f7a48':'#c0392b'}}>{e.type}</span></td>
                  <td style={{fontSize:12.5}}>{e.category||'—'}</td>
                  <td style={{fontWeight:600,fontSize:13}}>{e.label}</td>
                  <td style={{fontWeight:700,color:e.type==='AR'?'#1f7a48':'#c0392b'}}>{Number(e.amount).toLocaleString('fr-FR')} FCFA</td>
                  <td><span style={{fontSize:11,fontWeight:700,padding:'2px 9px',borderRadius:20,background:STATUS_BG[e.status]||'#f0f0f0',color:STATUS_COLORS[e.status]||'#888'}}>{e.status}</span></td>
                  <td style={{textAlign:'right',paddingRight:16}}>
                    <button className="icon-btn" onClick={()=>setEditing(e)}>Modifier</button>
                    <button className="icon-btn del" onClick={()=>deleteEntry(e.id,e.label)}>✕</button>
                  </td>
                </tr>
              ))}
            </tbody></table>
          </div>
        </div>
      ) : (
        /* ===== AR / AP LIST ===== */
        <div>
          <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
            <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}
              style={{padding:'9px 12px',border:'1px solid var(--line)',borderRadius:9,fontSize:13.5,background:'#fff',outline:'none'}}>
              <option value="all">Tous les statuts</option>
              {ENTRY_STATUSES.map(s=><option key={s}>{s}</option>)}
            </select>
            <select value={filterYear} onChange={e=>setFilterYear(e.target.value)}
              style={{padding:'9px 12px',border:'1px solid var(--line)',borderRadius:9,fontSize:13.5,background:'#fff',outline:'none'}}>
              <option value="all">Toutes les années</option>
              {years.map(y=><option key={y} value={y}>{y}</option>)}
            </select>
            <select value={filterMonth} onChange={e=>setFilterMonth(e.target.value)}
              style={{padding:'9px 12px',border:'1px solid var(--line)',borderRadius:9,fontSize:13.5,background:'#fff',outline:'none'}}>
              <option value="all">Tous les mois</option>
              {MONTHS_FR.map((m,i)=><option key={i} value={i}>{m}</option>)}
            </select>
            <div style={{marginLeft:'auto',fontWeight:700,fontSize:13.5,color:tab==='ar'?'#1f7a48':'#c0392b'}}>
              Total filtré : {filtered.reduce((s,e)=>s+Number(e.amount||0),0).toLocaleString('fr-FR')} FCFA
            </div>
          </div>

          {filtered.length===0 ? <div className="panel"><div className="empty">Aucune écriture pour ce filtre.</div></div> : (
            <div className="panel" style={{padding:0,overflow:'hidden'}}>
              <table className="admin-table" style={{tableLayout:'fixed',width:'100%'}}>
                <thead><tr>
                  <th style={{paddingLeft:16,width:'10%'}}>Date</th>
                  <th style={{width:'16%'}}>Catégorie</th>
                  <th style={{width:'22%'}}>Libellé</th>
                  <th style={{width:'8%'}}>Réf.</th>

                </tr></thead>
                <tbody>
                  {filtered.map(e=>{
                    const overdue = e.status==='En attente'&&e.due_date&&new Date(e.due_date)<new Date();
                    return (
                      <tr key={e.id} style={{background:overdue?'#fff8f8':''}}>
                        <td style={{paddingLeft:16,fontSize:12.5,color:'var(--muted)'}}>{e.date}</td>
                        <td style={{fontSize:12.5}}>{e.category||'—'}</td>
                        <td style={{fontWeight:600}}>
                          {overdue&&<span style={{color:'#c0392b',marginRight:5,fontSize:12}}>⚠</span>}
                          {e.label}
                          {e.notes&&<div style={{fontSize:11,color:'var(--muted)',fontWeight:400}}>{e.notes}</div>}
                        </td>
                        <td style={{fontSize:11.5,color:'var(--muted)'}}>{e.reference||'—'}</td>
                        <td style={{textAlign:'right',fontWeight:700,fontSize:13.5,color:tab==='ar'?'#1f7a48':'#c0392b'}}>{Number(e.amount).toLocaleString('fr-FR')}</td>
                        <td style={{fontSize:12,color:overdue?'#c0392b':'var(--muted)',fontWeight:overdue?700:400}}>{e.due_date||'—'}</td>
                        <td>
                          <select value={e.status}
                            onChange={async ev=>{ await sb.from('accounting_entries').update({status:ev.target.value}).eq('id',e.id); load(); }}
                            style={{fontSize:11,padding:'3px 7px',border:'1px solid var(--line)',borderRadius:6,background:STATUS_BG[e.status]||'#f0f0f0',color:STATUS_COLORS[e.status]||'#888',fontWeight:700,cursor:'pointer'}}>
                            {ENTRY_STATUSES.map(s=><option key={s}>{s}</option>)}
                          </select>
                        </td>
                        <td style={{textAlign:'right',paddingRight:16,whiteSpace:'nowrap'}}>
                          <button className="icon-btn" onClick={()=>setEditing(e)}>Modifier</button>
                          <button className="icon-btn del" onClick={()=>deleteEntry(e.id,e.label)}>✕</button>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function Admin({ session, onExit, data, reload, toast, userRole }){
  const isAdmin   = userRole==='admin';
  const isFinance = userRole==='finance';
  const [tab,setTab]=useState(isFinance?'finance':'articles');
  const adminEmail = session.user.email;
  async function logout(){ await sb.auth.signOut(); onExit(); }

  const ROLE_LABELS = { admin:'ADMINISTRATEUR', journalist:'JOURNALISTE', animateur:'ANIMATEUR', media:'MÉDIA', securite:'SÉCURITÉ', finance:'FINANCE' };

  const isEditorialRole = ['journalist','animateur','media'].includes(userRole);
  const isSecurite = userRole==='securite';

  // Redirect to allowed tab if landing on a restricted one
  const FINANCE_TABS = ['finance','accounting','partners','ads'];
  useEffect(()=>{
    if(isFinance && !FINANCE_TABS.includes(tab)) setTab('accounting');
    if(isSecurite && tab!=='content') setTab('content');
    if(isEditorialRole && (tab==='partners'||tab==='ads'||tab==='users'||tab==='logs'||tab==='finance'||tab==='accounting')) setTab('articles');
  },[isAdmin,isFinance,isSecurite,isEditorialRole,tab]);

  return (
    <div className="admin">
      <div className="admin-top"><div className="wrap">
        <Logo onClick={()=>{}} /><span className="tag">ADMIN</span><div className="grow"></div>
        <span style={{fontSize:13,color:'#cfd6ea'}}>{adminEmail}</span>
        <span style={{fontSize:11,background:'rgba(255,255,255,.12)',color:'#cfd6ea',padding:'3px 8px',borderRadius:5,fontWeight:700,letterSpacing:'.04em'}}>
          {ROLE_LABELS[userRole]||'JOURNALISTE'}
        </span>
        <button className="exit" onClick={onExit}>Voir le site →</button>
        <button className="exit" onClick={logout}>Déconnexion</button>
      </div></div>
      <div className="admin-tabs"><div className="wrap">
        {(isAdmin||isEditorialRole||isSecurite) && !isFinance && <button className={tab==='articles'?'active':''} onClick={()=>setTab('articles')}>Articles</button>}
        {(isAdmin||isEditorialRole) && <button className={tab==='scores'?'active':''} onClick={()=>setTab('scores')}>Scores &amp; Classement</button>}
        {(isAdmin||isFinance) && <button className={tab==='partners'?'active':''} onClick={()=>setTab('partners')}>Partenaires</button>}
        {(isAdmin||isFinance) && <button className={tab==='ads'?'active':''} onClick={()=>setTab('ads')}>Publicités</button>}
        {isAdmin && <button className={tab==='users'?'active':''} onClick={()=>setTab('users')}>Équipe</button>}
        {isAdmin && <button className={tab==='logs'?'active':''} onClick={()=>setTab('logs')}>Journal</button>}
        {!isFinance && <button className={tab==='content'?'active':''} onClick={()=>setTab('content')}>📋 Contenu</button>}
        {(isAdmin||isFinance) && <button className={tab==='finance'?'active':''} onClick={()=>setTab('finance')}>💰 Paie</button>}
        {(isAdmin||isFinance) && <button className={tab==='accounting'?'active':''} onClick={()=>setTab('accounting')}>📊 Comptabilité</button>}
      </div></div>
      <div className="admin-body"><div className="wrap">
        {tab==='articles' && <AdminArticles articles={data.articles} reload={reload} toast={toast} adminEmail={adminEmail} />}
        {tab==='scores' && <AdminScores scores={data.scores} standings={data.standings} fixtures={data.fixtures} reload={reload} toast={toast} adminEmail={adminEmail} />}
        {tab==='partners' && (isAdmin||isFinance) && <AdminPartners partners={data.partners} reload={reload} toast={toast} adminEmail={adminEmail} />}
        {tab==='ads' && (isAdmin||isFinance) && <AdminAds ads={data.ads||[]} reload={reload} toast={toast} adminEmail={adminEmail} />}
        {tab==='users' && isAdmin && <AdminUsers adminEmail={adminEmail} toast={toast} />}
        {tab==='logs' && isAdmin && <AdminLogs />}
        {tab==='content' && <AdminContent adminEmail={adminEmail} userRole={userRole} toast={toast} />}
        {tab==='finance' && (isAdmin||isFinance) && <AdminFinance adminEmail={adminEmail} userRole={userRole} toast={toast} />}
        {tab==='accounting' && (isAdmin||isFinance) && <AdminAccounting adminEmail={adminEmail} toast={toast} />}
      </div></div>
    </div>
  );
}

function AdBlock({ ad }){
  if(!ad) return null;
  const isYT = ad.video_url && (ad.video_url.includes('youtube.com')||ad.video_url.includes('youtu.be'));
  const ytId = (url)=>{ const m=url.match(/(?:v=|youtu\.be\/)([^&\s]+)/); return m?m[1]:null; };
  const body = ad.type==='video'
    ? (isYT
        ? <iframe width="100%" style={{aspectRatio:'16/9',border:'none',borderRadius:8,display:'block'}}
            src={`https://www.youtube.com/embed/${ytId(ad.video_url)}`} allowFullScreen />
        : <video src={ad.video_url} controls style={{width:'100%',borderRadius:8,display:'block'}} />)
    : (ad.image_url
        ? <img src={ad.image_url} alt={ad.title} style={{width:'100%',display:'block',borderRadius:8}} />
        : null);
  if(!body) return null;
  const card=(
    <div className="ad-block">
      <div className="ad-label">Partenaire</div>
      <div className="ad-body">{body}</div>
      {ad.link_url && <div className="ad-cta">En savoir plus →</div>}
    </div>
  );
  return ad.link_url
    ? <a href={ad.link_url} target="_blank" rel="noopener noreferrer" style={{display:'block',textDecoration:'none'}}>{card}</a>
    : card;
}

const EMPTY_AD = { title:'', type:'banner', image_url:'', video_url:'', link_url:'', active:true, position:'sidebar', sort_order:0 };

function AdminAds({ ads, reload, toast, adminEmail }){
  const [editing,setEditing]=useState(null);
  const [uploading,setUploading]=useState(false);
  const adImgRef=useRef(null);

  async function handleAdImg(e){
    const file=e.target.files?.[0]; if(!file) return;
    if(!file.type.startsWith('image/')){ toast('Image uniquement'); return; }
    setUploading(true);
    try{
      const ext=file.name.split('.').pop().toLowerCase();
      const path=`ads/${Date.now()}.${ext}`;
      const { error }=await sb.storage.from('article-images').upload(path,file,{contentType:file.type});
      if(error) throw error;
      const { data }=sb.storage.from('article-images').getPublicUrl(path);
      setEditing(p=>({...p,image_url:data.publicUrl})); toast('Image téléchargée ✓');
    } catch(err){ toast('Erreur : '+err.message); }
    finally{ setUploading(false); }
  }

  async function saveAd(){
    if(!editing.title){ toast('Le titre est obligatoire'); return; }
    const payload={ title:editing.title, type:editing.type, image_url:editing.image_url||null,
      video_url:editing.video_url||null, link_url:editing.link_url||null,
      active:editing.active, position:editing.position, sort_order:editing.sort_order||0 };
    const res = editing.id
      ? await sb.from('ads').update(payload).eq('id',editing.id)
      : await sb.from('ads').insert([payload]);
    if(res.error){ toast('Erreur : '+res.error.message); return; }
    await logAction(adminEmail, editing.id?'Pub modifiée':'Pub créée', editing.title);
    toast(editing.id?'Publicité mise à jour':'Publicité créée');
    setEditing(null); reload();
  }

  async function toggleAd(ad){
    await sb.from('ads').update({active:!ad.active}).eq('id',ad.id);
    await logAction(adminEmail, ad.active?'Pub désactivée':'Pub activée', ad.title);
    reload();
  }

  async function delAd(ad){
    if(!confirm(`Supprimer "${ad.title}" ?`)) return;
    await sb.from('ads').delete().eq('id',ad.id);
    await logAction(adminEmail,'Pub supprimée',ad.title);
    toast('Supprimée'); reload();
  }

  if(editing!==null) return (
    <div className="panel">
      <h3 style={{marginBottom:20}}>{editing.id?'Modifier':'Nouvelle'} publicité</h3>
      <div className="field"><label>Titre interne *</label>
        <input value={editing.title} onChange={e=>setEditing(p=>({...p,title:e.target.value}))} placeholder="Ex : Bannière sponsor juin" /></div>
      <div className="grid2">
        <div className="field"><label>Type</label>
          <select value={editing.type} onChange={e=>setEditing(p=>({...p,type:e.target.value}))}>
            <option value="banner">Bannière image</option>
            <option value="video">Vidéo</option>
          </select></div>
        <div className="field"><label>Emplacement</label>
          <select value={editing.position} onChange={e=>setEditing(p=>({...p,position:e.target.value}))}>
            <option value="sidebar">Barre latérale</option>
            <option value="fullwidth">Pleine largeur (sous hero)</option>
          </select></div>
      </div>
      {editing.type==='banner' && (
        <div className="field">
          <label>Image de bannière</label>
          <input hidden ref={adImgRef} type="file" accept="image/*" onChange={handleAdImg} />
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            <input value={editing.image_url||''} onChange={e=>setEditing(p=>({...p,image_url:e.target.value}))}
              placeholder="https://… ou choisir un fichier"
              style={{flex:1,padding:'11px 13px',border:'1px solid var(--line)',borderRadius:9,fontSize:14,outline:'none'}} />
            <button type="button" className="btn-ghost" onClick={()=>adImgRef.current?.click()} disabled={uploading} style={{whiteSpace:'nowrap',flexShrink:0}}>
              {uploading?'Envoi…':'📁 Choisir'}
            </button>
          </div>
          {editing.image_url && (
            <div style={{marginTop:10,position:'relative',display:'inline-block'}}>
              <img src={editing.image_url} alt="" style={{maxHeight:120,maxWidth:'100%',borderRadius:8,objectFit:'cover',display:'block'}} />
              <button type="button" onClick={()=>setEditing(p=>({...p,image_url:''}))}
                style={{position:'absolute',top:4,right:4,background:'rgba(0,0,0,.5)',color:'#fff',border:'none',
                  borderRadius:'50%',width:22,height:22,fontSize:12,cursor:'pointer',lineHeight:'22px',textAlign:'center'}}>✕</button>
            </div>
          )}
        </div>
      )}
      {editing.type==='video' && (
        <div className="field"><label>URL vidéo <span style={{fontWeight:400,color:'var(--muted)',fontSize:12}}>(YouTube, Vimeo ou .mp4)</span></label>
          <input value={editing.video_url||''} onChange={e=>setEditing(p=>({...p,video_url:e.target.value}))} placeholder="https://youtube.com/watch?v=…" /></div>
      )}
      <div className="field"><label>Lien de destination <span style={{fontWeight:400,color:'var(--muted)',fontSize:12}}>(optionnel — clic utilisateur)</span></label>
        <input value={editing.link_url||''} onChange={e=>setEditing(p=>({...p,link_url:e.target.value}))} placeholder="https://votresite.com" /></div>
      <div style={{display:'flex',gap:20,alignItems:'center',marginBottom:18}}>
        <label style={{display:'flex',gap:8,alignItems:'center',fontWeight:600,fontSize:14,cursor:'pointer'}}>
          <input type="checkbox" checked={editing.active} onChange={e=>setEditing(p=>({...p,active:e.target.checked}))} />
          Activer immédiatement
        </label>
      </div>
      <div style={{display:'flex',gap:10}}>
        <button className="btn-primary" onClick={saveAd}>{editing.id?'Enregistrer les modifications':'Créer la publicité'}</button>
        <button className="btn-ghost" onClick={()=>setEditing(null)}>Annuler</button>
      </div>
    </div>
  );

  return (
    <div className="panel">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
        <h3 style={{margin:0}}>Publicités &amp; bannières ({ads.length})</h3>
        <button className="btn-primary" onClick={()=>setEditing({...EMPTY_AD})}>+ Nouvelle publicité</button>
      </div>
      {ads.length===0 ? <div className="empty">Aucune publicité. Créez votre première bannière ou vidéo partenaire.</div> :
      <table className="admin-table"><thead><tr>
        <th>Titre</th><th>Type</th><th>Emplacement</th><th>Statut</th><th></th>
      </tr></thead><tbody>
        {ads.map(ad=>(
          <tr key={ad.id}>
            <td style={{fontWeight:600}}>{ad.title}</td>
            <td>{ad.type==='banner'?'Bannière':'Vidéo'}</td>
            <td>{ad.position==='sidebar'?'Latérale':'Pleine largeur'}</td>
            <td><span className={'pill '+(ad.active?'pub':'draft')}>{ad.active?'Actif':'Inactif'}</span></td>
            <td style={{textAlign:'right',whiteSpace:'nowrap'}}>
              <button className="icon-btn" onClick={()=>setEditing({...ad})}>Modifier</button>
              <button className="icon-btn" onClick={()=>toggleAd(ad)}>{ad.active?'Désactiver':'Activer'}</button>
              <button className="icon-btn del" onClick={()=>delAd(ad)}>Supprimer</button>
            </td>
          </tr>
        ))}
      </tbody></table>}
    </div>
  );
}

// ============================================================
//  HELPERS
// ============================================================
async function logAction(adminEmail, action, details=''){
  try {
    await sb.from('admin_logs').insert([{ admin_email:adminEmail, action, details:details||null }]);
  } catch(e){}
}

function AdminLogs(){
  const [logs,setLogs]=useState([]);
  const [busy,setBusy]=useState(true);
  useEffect(()=>{
    sb.from('admin_logs').select('*').order('created_at',{ascending:false}).limit(200)
      .then(({data})=>{ setLogs(data||[]); setBusy(false); });
  },[]);
  if(busy) return <Spinner/>;
  return (
    <div className="panel">
      <h3>Journal d'activité ({logs.length})</h3>
      {logs.length===0 ? <div className="empty">Aucune action enregistrée pour l'instant.</div> :
      <table className="admin-table"><thead><tr>
        <th>Admin</th><th>Action</th><th>Détails</th><th>Date</th>
      </tr></thead><tbody>
        {logs.map(l=>(
          <tr key={l.id}>
            <td style={{fontWeight:600,fontSize:12.5,color:'var(--navy)'}}>{l.admin_email}</td>
            <td><span className="pill pub" style={{whiteSpace:'nowrap'}}>{l.action}</span></td>
            <td style={{fontSize:12.5,color:'var(--muted)',maxWidth:340}}>{l.details||'—'}</td>
            <td style={{color:'var(--muted)',fontSize:12.5,whiteSpace:'nowrap'}}>{timeAgo(l.created_at)}</td>
          </tr>
        ))}
      </tbody></table>}
    </div>
  );
}

function timeAgo(ts){
  if(!ts) return '';
  const d=new Date(ts), now=new Date(), s=Math.floor((now-d)/1000);
  if(s<60) return "à l'instant";
  const m=Math.floor(s/60); if(m<60) return 'il y a '+m+' min';
  const h=Math.floor(m/60); if(h<24) return 'il y a '+h+' h';
  const days=Math.floor(h/24); if(days<7) return 'il y a '+days+' j';
  return d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
}

// ============================================================
//  ROOT APP
// ============================================================
function App(){
  const [route,setRoute]=useState(()=> location.hash==='#admin' ? 'admin' : 'site');
  const [nav,setNav]=useState('Home');
  const [openArticle,setOpenArticle]=useState(null);
  const [drawer,setDrawer]=useState(false);
  const [loading,setLoading]=useState(true);
  const [session,setSession]=useState(null);
  const [authChecked,setAuthChecked]=useState(false);
  const [userRole,setUserRole]=useState(null); // null = loading, 'admin' | 'journalist'
  const [toast,toastNode]=useToast();

  const [data,setData]=useState({ articles:[],standings:[],scores:[],fixtures:[],partners:[],ads:[] });

  const loadPublic = useCallback(async ()=>{
    const [art,st,sc,fx,ads]=await Promise.all([
      sb.from('articles').select('*').eq('published',true).order('created_at',{ascending:false}),
      sb.from('standings').select('*'),
      sb.from('scores').select('*').order('created_at',{ascending:false}),
      sb.from('fixtures').select('*'),
      sb.from('ads').select('*').eq('active',true).order('sort_order',{ascending:true}),
    ]);
    setData(d=>({ ...d,
      articles:art.data||[], standings:st.data||[], scores:sc.data||[],
      fixtures:fx.data||[], ads:ads.data||[] }));
    setLoading(false);
  },[]);

  const loadAdmin = useCallback(async ()=>{
    const [art,st,sc,fx,pt,ads]=await Promise.all([
      sb.from('articles').select('*').order('created_at',{ascending:false}),
      sb.from('standings').select('*'),
      sb.from('scores').select('*').order('created_at',{ascending:false}),
      sb.from('fixtures').select('*'),
      sb.from('partners').select('*').order('created_at',{ascending:false}),
      sb.from('ads').select('*').order('sort_order',{ascending:true}),
    ]);
    setData({ articles:art.data||[], standings:st.data||[], scores:sc.data||[],
      fixtures:fx.data||[], partners:pt.data||[], ads:ads.data||[] });
  },[]);

  // auth bootstrap + role fetch
  useEffect(()=>{
    sb.auth.getSession().then(({data})=>{
      const s = data.session;
      setSession(s); setAuthChecked(true);
      if(s) fetchRole(s.user.email);
    });
    const { data:sub }=sb.auth.onAuthStateChange((_e,s)=>{
      setSession(s);
      if(s) fetchRole(s.user.email); else setUserRole(null);
    });
    return ()=>sub.subscription.unsubscribe();
  },[]);

  async function fetchRole(email){
    const { data }=await sb.from('user_roles').select('role').eq('email',email).maybeSingle();
    // No record → treat as admin (backward compat for existing users)
    setUserRole(data?.role || 'admin');
  }

  useEffect(()=>{ loadPublic(); },[loadPublic]);
  useEffect(()=>{ if(route==='admin' && session) loadAdmin(); },[route,session,loadAdmin]);

  // hash routing
  useEffect(()=>{
    const onHash=()=>setRoute(location.hash==='#admin'?'admin':'site');
    window.addEventListener('hashchange',onHash); return ()=>window.removeEventListener('hashchange',onHash);
  },[]);
  const goAdmin=()=>{ location.hash='admin'; setRoute('admin'); };
  const goSite=()=>{ location.hash=''; setRoute('site'); };

  function navTo(n){ setNav(n); setOpenArticle(null); setDrawer(false); window.scrollTo({top:0,behavior:'smooth'}); }
  function open(a){ setOpenArticle(a); window.scrollTo({top:0,behavior:'smooth'}); }

  // ---------- ADMIN ROUTE ----------
  if(route==='admin'){
    if(!authChecked) return <div className="login-wrap"><div className="spinner" style={{borderTopColor:'#fff'}}/></div>;
    if(!session) return <><AdminLogin onAuthed={s=>{setSession(s);loadAdmin();}} onExit={goSite} />{toastNode}</>;
    if(userRole===null) return <div className="login-wrap"><div className="spinner" style={{borderTopColor:'#fff'}}/></div>;
    return <><Admin session={session} onExit={goSite} data={data} reload={loadAdmin} toast={toast} userRole={userRole} />{toastNode}</>;
  }

  // ---------- PARTNER ROUTE ----------
  const isPartner = nav==='Partner';

  // ---------- PUBLIC SITE ----------
  return (
    <div className="app-pad">
      <div className="util"><div className="wrap">
        <div className="left">
          <span></span>
        </div>
        <div className="right">
          <span onClick={()=>navTo('Shows')}>Grille des programmes</span>
          <span>Newsletter</span>
          <span className="signin" onClick={goAdmin}>Admin</span>
        </div>
      </div></div>

      <header><div className="wrap">
        <button className="menu-btn" onClick={()=>setDrawer(true)} aria-label="Open menu"><i></i><i></i><i></i></button>
        <Logo onClick={()=>navTo('Home')} />
        <nav className="main">
          {NAVS.map(n=><button key={n.key} className={(nav===n.key&&!isPartner)?'active':''} onClick={()=>navTo(n.key)}>{n.label}</button>)}
        </nav>
        <div className="grow"></div>
        <label className="search">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#9aa1b2" strokeWidth="2.4"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg>
          <input placeholder="Rechercher" />
        </label>
        <button className="btn-partner" onClick={()=>navTo('Partner')}>Devenir partenaire</button>
        <button className="listen" onClick={()=>{ document.querySelector('.play-btn')?.click(); toast('Connexion au '+STATION_FREQ); }}><span className="dot"></span>Écouter en direct</button>
      </div></header>

      {!isPartner && <Ticker scores={data.scores} />}

      {loading ? <Spinner/> :
        isPartner ? <PartnerView onBack={()=>navTo('Home')} toast={toast} /> :
        openArticle ? <div className="wrap"><ArticleView article={openArticle} onBack={()=>setOpenArticle(null)} backLabel={navLabel(nav)} /></div> :
        <div className="wrap">
          {nav==='Home' && <Home articles={data.articles} standings={data.standings} fixtures={data.fixtures}
            ads={data.ads} onOpen={open} onNav={navTo} onTrial={()=>navTo('Partner')} />}
          {nav==='Standings' && <StandingsView standings={data.standings} />}
          {(nav==='Football'||nav==='Basketball'||nav==='Shows') && <CategoryView cat={nav} articles={data.articles} onOpen={open} />}
        </div>
      }

      <footer><div className="wrap">
        <Logo onClick={()=>navTo('Home')} footer />
        <div className="fnav">
          <span onClick={()=>navTo('Partner')}>Devenir partenaire</span>
          <span onClick={()=>navTo('Shows')}>Programmes</span>
          <span>Publicité</span><span>Contact</span>
        </div>
        <div className="copy">© 2026 SportFM</div>
      </div></footer>

      <Player liveScores={data.scores} />

      <div className={"drawer"+(drawer?" open":"")} onClick={e=>{if(e.target.className.includes('drawer'))setDrawer(false);}}>
        <div className="panel-d">
          {NAVS.map(n=><button key={n.key} onClick={()=>navTo(n.key)}>{n.label}</button>)}
          <button onClick={()=>navTo('Partner')} style={{color:'var(--red)'}}>Devenir partenaire</button>
        </div>
      </div>

      {toastNode}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
