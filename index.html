const PARTNER_STATUSES = [
  { key:'new',         label:'Nouveau',           cls:'new' },
  { key:'contacted',   label:'Contacté',          cls:'contacted' },
  { key:'in_discussion', label:'En discussion',   cls:'contacted' },
  { key:'declined',    label:'A décliné',         cls:'draft' },
  { key:'follow_up',   label:'Relance prévue',    cls:'pill' },
  { key:'won',         label:'Gagné ✓',           cls:'won' },
  { key:'archived',    label:'Archivé',           cls:'ft' },
];

function PartnerCRM({ p, onClose, toast, reload, adminEmail }){
  const [status,setStatusL]=useState(p.status||'new');
  const [declineReason,setDeclineReason]=useState(p.decline_reason||'');
  const [followUp,setFollowUp]=useState(p.follow_up_date||'');
  const [notes,setNotes]=useState(p.admin_notes||'');
  const [saving,setSaving]=useState(false);

  const pkg = PACKAGES[p.recommended] || null;

  async function save(){
    setSaving(true);
    const patch = { status, decline_reason:declineReason||null, follow_up_date:followUp||null, admin_notes:notes||null };
    const { error }=await sb.from('partners').update(patch).eq('id',p.id);
    setSaving(false);
    if(error){ toast('Erreur : '+error.message); return; }
    await logAction(adminEmail,'CRM partenaire → '+status, p.company+(declineReason?' — '+declineReason:''));
    toast('Mis à jour'); reload(); onClose();
  }

  return (
    <div style={{background:'#f6f7fb',border:'1px solid var(--line)',borderRadius:12,padding:22,marginBottom:16}}>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:18}}>
        <div>
          <div style={{fontFamily:"'Barlow Semi Condensed',sans-serif",fontWeight:800,fontSize:20,color:'var(--navy)'}}>{p.company}</div>
          <div style={{fontSize:13,color:'var(--muted)',marginTop:2}}>{p.contact_name} · {p.email} {p.phone&&'· '+p.phone}</div>
        </div>
        <button className="icon-btn" onClick={onClose}>✕ Fermer</button>
      </div>

      {/* Recommended pack with price (admin only) */}
      {pkg && (
        <div style={{background:'var(--navy)',borderRadius:10,padding:'14px 18px',marginBottom:18,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
          <div>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:'.07em',color:'#7e8cb5',marginBottom:4}}>PACK RECOMMANDÉ</div>
            <div style={{fontFamily:"'Barlow Semi Condensed',sans-serif",fontWeight:800,fontSize:22,color:'#fff'}}>{p.recommended}</div>
            <div style={{fontSize:12.5,color:'#b9c2dc',marginTop:3}}>{pkg.desc}</div>
          </div>
          <div style={{background:'var(--red)',borderRadius:8,padding:'8px 16px',fontFamily:"'Barlow Semi Condensed',sans-serif",fontWeight:800,fontSize:20,color:'#fff',whiteSpace:'nowrap'}}>
            {pkg.price}
          </div>
        </div>
      )}

      {/* Client details */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'8px 20px',fontSize:13,marginBottom:18,background:'#fff',borderRadius:8,padding:14,border:'1px solid var(--line)'}}>
        <div><span style={{color:'var(--muted)',fontSize:11,fontWeight:700,letterSpacing:'.04em'}}>BUDGET</span><br/><strong>{p.budget||'—'}</strong></div>
        <div><span style={{color:'var(--muted)',fontSize:11,fontWeight:700,letterSpacing:'.04em'}}>SECTEUR</span><br/>{p.industry||'—'}</div>
        <div><span style={{color:'var(--muted)',fontSize:11,fontWeight:700,letterSpacing:'.04em'}}>ÉCHÉANCE</span><br/>{p.timeline||'—'}</div>
        <div style={{gridColumn:'1/-1'}}><span style={{color:'var(--muted)',fontSize:11,fontWeight:700,letterSpacing:'.04em'}}>OBJECTIFS</span><br/>{(p.goals||[]).join(' · ')||'—'}</div>
        {p.message && <div style={{gridColumn:'1/-1'}}><span style={{color:'var(--muted)',fontSize:11,fontWeight:700,letterSpacing:'.04em'}}>MESSAGE</span><br/><em style={{color:'#5a6178'}}>{p.message}</em></div>}
      </div>

      {/* CRM controls */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
        <div className="field" style={{margin:0}}>
          <label>Statut</label>
          <select value={status} onChange={e=>setStatusL(e.target.value)} style={{width:'100%',padding:'10px 12px',border:'1px solid var(--line)',borderRadius:9,fontSize:14,outline:'none'}}>
            {PARTNER_STATUSES.map(s=><option key={s.key} value={s.key}>{s.label}</option>)}
          </select>
        </div>
        <div className="field" style={{margin:0}}>
          <label>Date de relance</label>
          <input type="date" value={followUp} onChange={e=>setFollowUp(e.target.value)}
            style={{width:'100%',padding:'10px 12px',border:'1px solid var(--line)',borderRadius:9,fontSize:14,outline:'none'}} />
        </div>
      </div>

      {status==='declined' && (
        <div className="field">
          <label>Raison du refus <span style={{fontWeight:400,color:'var(--muted)',fontSize:12}}>(à noter pour la relance)</span></label>
          <input value={declineReason} onChange={e=>setDeclineReason(e.target.value)} placeholder="Ex : Budget insuffisant, mauvais timing, concurrent déjà partenaire…" />
        </div>
      )}

      <div className="field">
        <label>Notes internes <span style={{fontWeight:400,color:'var(--muted)',fontSize:12}}>(visibles admin uniquement)</span></label>
        <textarea value={notes} onChange={e=>setNotes(e.target.value)} style={{minHeight:72}} placeholder="Compte-rendu d'appel, conditions négociées, prochaine étape…" />
      </div>

      <div style={{display:'flex',gap:10,alignItems:'center'}}>
        <button className="btn-primary" disabled={saving} onClick={save}>{saving?'Enregistrement…':'Enregistrer'}</button>
        <a className="btn-ghost" href={`mailto:${p.email}?subject=Votre demande de partenariat SportFM`} style={{display:'inline-flex',alignItems:'center',gap:6,textDecoration:'none'}}>
          ✉ Envoyer un e-mail
        </a>
        {p.phone && <a className="btn-ghost" href={`tel:${p.phone}`} style={{display:'inline-flex',alignItems:'center',gap:6,textDecoration:'none'}}>📞 Appeler</a>}
      </div>
    </div>
  );
}

    acc[s.key]=(partners.filter(p=>p.status===s.key)).length; return acc;

            {k.label} <span style={{opacity:.7}}>({k.n})</span>
          </button>
        ))}

      {visible.length===0 ? <div className="panel"><div className="empty">Aucune demande dans cette catégorie.</div></div> :

                  <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
                    <span style={{fontWeight:700,fontSize:15,color:'var(--navy)'}}>{p.company}</span>
                    <span className={'pill '+statusInfo(p.status||'new').cls}>{statusInfo(p.status||'new').label}</span>

                  </div>
                  <div style={{fontSize:12.5,color:'var(--muted)',marginTop:3}}>
                    {p.contact_name&&p.contact_name+' · '}{p.budget} · Pack : <strong>{p.recommended||'—'}</strong>
                    {PACKAGES[p.recommended]&&<span style={{color:'var(--red)',fontWeight:700}}> ({PACKAGES[p.recommended].price})</span>}
                    {' · '}{timeAgo(p.created_at)}
                  </div>
                  {p.admin_notes && <div style={{fontSize:12,color:'#5a6178',marginTop:4,fontStyle:'italic'}}>📝 {p.admin_notes.slice(0,100)}{p.admin_notes.length>100?'…':''}</div>}
                </div>
                <button className="btn-ghost" style={{flexShrink:0}} onClick={()=>setOpen(p.id)}>Ouvrir le dossier →</button>

        </React.Fragment>
      ))}
    </div>

}

const PAY_PERIODS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const CURRENT_YEAR = new Date().getFullYear();

function PaystubForm({ stub, employees, onSave, onCancel, adminEmail, toast }){
  const [form,setForm]=useState(stub || { employee_id:'', period_month:'', period_year:String(CURRENT_YEAR), gross:'', cotisations:'', impot:'', prime:'', deduction:'', net:'', note:'' });
  const [file,setFile]=useState(null);
  const [busy,setBusy]=useState(false);
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));

  // When employee changes, populate all fixed details from employee record
  function onEmployeeChange(empId){
    const emp = employees.find(e=>e.id===empId);
    if(!emp){ set('employee_id', empId); return; }
    const brut = Number(emp.salaire_brut) || 0;
    // Use stored fixed FCFA amounts directly
    const cnss = Number(emp.cnss_taux)          || 0;
    const tcs  = Number(emp.tcs_taux)           || 0;
    const ts   = Number(emp.ts_taux)            || 0;
    const net  = brut ? String(brut - cnss - tcs - ts) : '';
    setForm(p=>({...p,
      employee_id: empId,
      gross:       brut ? String(brut) : p.gross,
      cotisations: String(cnss),
      impot:       String(tcs),
      deduction:   String(ts),
      net,
    }));
  }

  // Get selected employee
  const selEmp = employees.find(e=>e.id===form.employee_id);

  // Auto-compute net when gross/deductions change
  const computedNet = ()=>{
    const g=Number(form.gross)||0, c=Number(form.cotisations)||0,
      i=Number(form.impot)||0, d=Number(form.deduction)||0, pr=Number(form.prime)||0;
    return g>0 ? String(g - c - i - d + pr) : form.net;
  };

  async function save(){
    if(!form.employee_id){ toast('Sélectionnez un employé'); return; }
    if(!form.period_month){ toast('Sélectionnez le mois'); return; }
    setBusy(true);

    let file_url = stub?.file_url || null;
    if(file){
      const ext = file.name.split('.').pop();
      const path = `paystubs/${Date.now()}_${form.employee_id}.${ext}`;
      const { error: upErr } = await sb.storage.from('paystubs').upload(path, file, { upsert:true });
      if(upErr){ toast('Erreur upload : '+upErr.message); setBusy(false); return; }
      const { data: urlData } = sb.storage.from('paystubs').getPublicUrl(path);
      file_url = urlData.publicUrl;
    }

    const netFinal = form.net || computedNet();
    const payload = { employee_id:form.employee_id, period_month:form.period_month, period_year:Number(form.period_year),
      gross:form.gross||null, cotisations:form.cotisations||null, impot:form.impot||null,
      prime:form.prime||null, deduction:form.deduction||null,
      net:netFinal||null, note:form.note||null, file_url, updated_at:new Date().toISOString() };
    let res;
    if(stub?.id){ res = await sb.from('paystubs').update(payload).eq('id',stub.id); }
    else { res = await sb.from('paystubs').insert([{...payload, created_by:adminEmail}]); }
    setBusy(false);
    if(res.error){ toast('Erreur : '+res.error.message); return; }
    const emp = employees.find(e=>e.id===form.employee_id);
    await logAction(adminEmail, stub?'Fiche modifiée':'Fiche créée', `${emp?.name||emp?.email} — ${form.period_month} ${form.period_year}`);
    if(!stub && emp?.linked_user_email){
      await notify(emp.linked_user_email, 'paystub', 'Nouvelle fiche de paie', `${form.period_month} ${form.period_year} — disponible dans Mon Espace`);
    }
    toast(stub?'Mis à jour':'Fiche créée'); onSave();
  }

  const opt = {fontWeight:400,color:'var(--muted)',fontSize:12};

  return (
    <div className="panel">
      <h3 style={{marginBottom:20}}>{stub?'Modifier la fiche de paie':'Nouvelle fiche de paie'}</h3>

      <div className="field"><label>Employé *</label>
        <select value={form.employee_id} onChange={e=>onEmployeeChange(e.target.value)}>
          <option value="">— Sélectionner —</option>
          {employees.map(e=><option key={e.id} value={e.id}>{e.name||e.email} {e.name?`(${e.email})`:''}</option>)}
        </select></div>

      <div className="grid2">
        <div className="field"><label>Mois *</label>
          <select value={form.period_month} onChange={e=>set('period_month',e.target.value)}>
            <option value="">— Mois —</option>
            {PAY_PERIODS.map(m=><option key={m}>{m}</option>)}
          </select></div>
        <div className="field"><label>Année *</label>
          <input type="number" value={form.period_year} onChange={e=>set('period_year',e.target.value)} min="2020" max="2099" /></div>
      </div>

      <div style={{borderTop:'1px solid var(--line)',margin:'10px 0 14px',paddingTop:14}}>
        <div style={{fontSize:12,fontWeight:700,letterSpacing:'.05em',color:'var(--muted)',marginBottom:10}}>DÉTAIL DE LA RÉMUNÉRATION</div>

        {/* Gains */}
        <div style={{fontSize:11,fontWeight:700,color:'#1f7a48',letterSpacing:'.04em',marginBottom:6,textTransform:'uppercase'}}>+ Gains</div>
        <div className="grid2">
          <div className="field"><label>Salaire brut (FCFA)</label>
            <input type="number" value={form.gross||''} onChange={e=>set('gross',e.target.value)} placeholder="Ex : 130 000" min="0" /></div>
          <div className="field"><label>Prime / Bonus <span style={opt}>(variable)</span></label>
            <input type="number" value={form.prime||''} onChange={e=>set('prime',e.target.value)} placeholder="Ex : 0" min="0" /></div>
        </div>

        {/* Retenues salarié */}
        <div style={{fontSize:11,fontWeight:700,color:'#c0392b',letterSpacing:'.04em',margin:'10px 0 6px',textTransform:'uppercase'}}>− Retenues salarié</div>
        <div className="grid2">
          <div className="field">
            <label>CNSS Salarié</label>
            <input type="number" value={form.cotisations||''} onChange={e=>set('cotisations',e.target.value)} placeholder="0" min="0" />
          </div>
          <div className="field">
            <label>TCS</label>
            <input type="number" value={form.impot||''} onChange={e=>set('impot',e.target.value)} placeholder="0" min="0" />
          </div>
        </div>
        <div className="grid2">
          <div className="field">
            <label>TS</label>
            <input type="number" value={form.deduction||''} onChange={e=>set('deduction',e.target.value)} placeholder="0" min="0" />
          </div>
          <div className="field">
            <label>Net à payer (FCFA)
              {form.gross && <button type="button" onClick={()=>set('net',computedNet())}
                style={{marginLeft:8,fontSize:11,padding:'1px 8px',background:'var(--navy)',color:'#fff',border:'none',borderRadius:5,cursor:'pointer'}}>
                Calculer
              </button>}
            </label>
            <input type="number" value={form.net||''} onChange={e=>set('net',e.target.value)}
              placeholder="Ex : 125 275" min="0"
              style={{fontWeight:700,borderColor:form.net?'var(--navy)':'var(--line)'}} />
          </div>
        </div>

        {/* Charges employeur — informational */}
        {selEmp && form.gross && (
          <div style={{background:'#f7f8fb',border:'1px solid var(--line)',borderRadius:8,padding:'12px 16px',marginTop:8}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',letterSpacing:'.04em',marginBottom:8,textTransform:'uppercase'}}>ℹ Charges employeur (pour information — non déduites du net)</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:16}}>
              <div>
                <div style={{fontSize:11,color:'var(--muted)'}}>CNSS Employeur ({selEmp.cnss_employeur_taux??22.5}%)</div>
                <div style={{fontWeight:700,fontSize:14,color:'var(--navy)'}}>{fmtFCFA(Math.round(Number(form.gross)*(Number(selEmp.cnss_employeur_taux)||22.5)/100))}</div>
              </div>
              <div>
                <div style={{fontSize:11,color:'var(--muted)'}}>Coût total employeur</div>
                <div style={{fontWeight:700,fontSize:14,color:'var(--navy)'}}>
                  {fmtFCFA(Math.round(Number(form.gross)*(1+(Number(selEmp.cnss_employeur_taux)||22.5)/100)))}
                </div>
              </div>
            </div>
          </div>
        )}
      </div>

      <div className="field"><label>Fiche de paie (PDF) <span style={opt}>{stub?'— laisser vide pour garder l\'existant':'— optionnel, un PDF sera généré automatiquement'}</span></label>
        <input type="file" accept=".pdf,application/pdf" onChange={e=>setFile(e.target.files[0]||null)}
          style={{padding:'9px 0',fontSize:13.5}} />
        {stub?.file_url && !file && <div style={{marginTop:6,fontSize:12.5}}><a href={stub.file_url} target="_blank" style={{color:'var(--navy)'}}>📄 Voir la fiche actuelle</a></div>}
      </div>

      <div className="field"><label>Note interne <span style={opt}>(optionnel)</span></label>
        <input value={form.note||''} onChange={e=>set('note',e.target.value)} placeholder="Prime exceptionnelle, congés payés, ajustement…" /></div>

      <div style={{display:'flex',gap:10,marginTop:4}}>
        <button className="btn-primary" disabled={busy} onClick={save}>{busy?'…':(stub?'Enregistrer':'Créer')}</button>
        <button className="btn-ghost" onClick={onCancel}>Annuler</button>
      </div>
    </div>
  );
}

function EmployeeForm({ emp, onSave, onCancel, adminEmail, toast }){
  const [form,setForm]=useState(emp||{name:'',email:'',department:'',position:'',phone:'',
    salaire_brut:'',cnss_taux:9,tcs_taux:0,cnss_employeur_taux:22.5,ts_taux:3,linked_user_email:''});
  const [busy,setBusy]=useState(false);
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  async function save(){
    if(!form.name.trim()||!form.email.trim()){ toast('Nom et e-mail requis'); return; }
    setBusy(true);
    let res;
    if(emp?.id){ res=await sb.from('employees').update({...form,updated_at:new Date().toISOString()}).eq('id',emp.id); }
    else { res=await sb.from('employees').insert([form]); }
    if(res.error){ setBusy(false); toast('Erreur : '+res.error.message); return; }
    // If linked_user_email provided, upsert into user_roles
    if(form.linked_user_email&&form.linked_user_email.trim()){
      await sb.from('user_roles').upsert([{email:form.linked_user_email.trim().toLowerCase(),
        name:form.name, job_title:form.position}],{onConflict:'email',ignoreDuplicates:true});
    }
    setBusy(false);
    await logAction(adminEmail, emp?'Employé modifié':'Employé ajouté', form.name);
    toast(emp?'Mis à jour':'Employé ajouté'); onSave();
  }
  return (
    <div className="panel">
      <h3 style={{marginBottom:20}}>{emp?'Modifier l\'employé':'Ajouter un employé'}</h3>
      <div className="grid2">
        <div className="field"><label>Nom complet *</label><input value={form.name} onChange={e=>set('name',e.target.value)} placeholder="Jean Dupont" /></div>
        <div className="field"><label>E-mail *</label><input type="email" value={form.email} onChange={e=>set('email',e.target.value)} placeholder="jean@sportfm.com" /></div>
      </div>
      <div className="grid2">
        <div className="field"><label>Département</label><input value={form.department||''} onChange={e=>set('department',e.target.value)} placeholder="Rédaction, Finance, Direction…" /></div>
        <div className="field"><label>Poste</label><input value={form.position||''} onChange={e=>set('position',e.target.value)} placeholder="Journaliste web, Comptable…" /></div>
      </div>
      <div className="field"><label>Téléphone <span style={{fontWeight:400,color:'var(--muted)',fontSize:12}}>(optionnel)</span></label><input value={form.phone||''} onChange={e=>set('phone',e.target.value)} placeholder="+228 90 00 00 00" /></div>

      <div style={{borderTop:'1px solid var(--line)',margin:'14px 0',paddingTop:14}}>
        <div style={{fontSize:12,fontWeight:700,letterSpacing:'.05em',color:'var(--muted)',marginBottom:10}}>DÉTAIL SALARIAL</div>
        <div className="grid2">
          <div className="field"><label>Salaire Brut (FCFA)</label><input type="number" value={form.salaire_brut||''} onChange={e=>set('salaire_brut',e.target.value)} placeholder="Ex : 130 000" min="0" /></div>
          <div className="field"><label>CNSS Salarié — montant fixe (FCFA)</label><input type="number" value={form.cnss_taux||''} onChange={e=>set('cnss_taux',e.target.value)} placeholder="Ex : 4 725" min="0" /></div>
        </div>
        <div className="grid2">
          <div className="field"><label>TCS — montant fixe (FCFA)</label><input type="number" value={form.tcs_taux||''} onChange={e=>set('tcs_taux',e.target.value)} placeholder="Ex : 0" min="0" /></div>
          <div className="field"><label>Charges employeur CNSS — montant fixe (FCFA)</label><input type="number" value={form.cnss_employeur_taux||''} onChange={e=>set('cnss_employeur_taux',e.target.value)} placeholder="Ex : 29 250" min="0" /></div>
        </div>
        <div className="grid2">
          <div className="field"><label>TS — montant fixe (FCFA)</label><input type="number" value={form.ts_taux||''} onChange={e=>set('ts_taux',e.target.value)} placeholder="Ex : 0" min="0" /></div>
          <div className="field"><label>E-mail compte SportFM <span style={{fontWeight:400,color:'var(--muted)',fontSize:12}}>(lie au portail)</span></label><input type="email" value={form.linked_user_email||''} onChange={e=>set('linked_user_email',e.target.value)} placeholder="jean@sportfm.com" /></div>
        </div>
      </div>

      <div style={{display:'flex',gap:10,marginTop:4}}>
        <button className="btn-primary" disabled={busy} onClick={save}>{busy?'…':(emp?'Enregistrer':'Ajouter')}</button>
        <button className="btn-ghost" onClick={onCancel}>Annuler</button>
      </div>
    </div>
  );
}

function generatePaystubPDF(emp, stub){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'mm', format:'a4' });
  const navy  = [13, 27, 77];
  const red   = [239, 0, 63];
  const gray  = [100, 100, 110];
  const light = [245, 246, 250];
  const W = 210, M = 18;

  // Header background
  doc.setFillColor(...navy);
  doc.rect(0, 0, W, 40, 'F');

  // Company name
  doc.setTextColor(255,255,255);
  doc.setFontSize(22); doc.setFont('helvetica','bold');
  doc.text('SportFM', M, 16);
  doc.setFontSize(10); doc.setFont('helvetica','normal');
  doc.text('91.9 FM — Radio & Multimédia', M, 23);

  // Title right side
  doc.setFontSize(13); doc.setFont('helvetica','bold');
  doc.text('FICHE DE PAIE', W - M, 16, {align:'right'});
  doc.setFontSize(10); doc.setFont('helvetica','normal');
  doc.text(`${stub.period_month} ${stub.period_year}`, W - M, 23, {align:'right'});

  // Red accent bar
  doc.setFillColor(...red);
  doc.rect(0, 40, W, 2, 'F');

  // Employee info box
  let y = 52;
  doc.setFillColor(...light);
  doc.roundedRect(M, y, W - M*2, 28, 3, 3, 'F');
  doc.setTextColor(...navy); doc.setFontSize(9); doc.setFont('helvetica','bold');
  doc.text('EMPLOYÉ', M+6, y+8);
  doc.setTextColor(30,30,30); doc.setFontSize(13); doc.setFont('helvetica','bold');
  doc.text(emp.name || emp.email, M+6, y+16);
  doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(...gray);
  const empMeta = [emp.position, emp.department].filter(Boolean).join(' — ');
  if(empMeta) doc.text(empMeta, M+6, y+22);
  doc.text(emp.email, M+6, y+27);

  // Ref right
  doc.setTextColor(...navy); doc.setFontSize(8); doc.setFont('helvetica','bold');
  doc.text(`Période : ${stub.period_month} ${stub.period_year}`, W-M-6, y+16, {align:'right'});
  doc.setFont('helvetica','normal'); doc.setTextColor(...gray); doc.setFontSize(8);
  if(stub.reference) doc.text(`Réf : ${stub.reference}`, W-M-6, y+22, {align:'right'});

  // Salary table
  y += 38;
  doc.setFillColor(...navy);
  doc.rect(M, y, W-M*2, 9, 'F');
  doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont('helvetica','bold');
  doc.text('DÉSIGNATION', M+5, y+6);
  doc.text('MONTANT (FCFA)', W-M-5, y+6, {align:'right'});
  y += 9;

  // Use plain space as thousands separator — toLocaleString('fr-FR') produces narrow no-break space which jsPDF renders as /
  const fmt = n => Math.round(Number(n)||0).toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ');

  // Stored fixed FCFA amounts (not rates)
  const cnssAmt    = Number(emp.cnss_taux)          || 0;
  const tcsAmt     = Number(emp.tcs_taux)           || 0;
  const tsAmt      = Number(emp.ts_taux)            || 0;
  const empFixeAmt = Number(emp.cnss_employeur_taux)|| 0;

  // Section: Gains
  const gainsRows = [];
  if(stub.gross) gainsRows.push(['Salaire de base brut', fmt(stub.gross)]);
  if(stub.prime) gainsRows.push(['Prime / Bonus', fmt(stub.prime)]);

  // Section: Retenues salarié
  const retRows = [];
  if(stub.cotisations) retRows.push(['Cotisations CNSS salarié', fmt(stub.cotisations)]);
  if(stub.impot)       retRows.push(['TCS — Taxe complementaire salariale', fmt(stub.impot)]);
  if(stub.deduction)   retRows.push(['TS — Taxe sur salaire', fmt(stub.deduction)]);

  // Section: Charges employeur (info only)
  const empRows = [];
  const empDisplayAmt = empFixeAmt || (stub.gross ? Math.round(Number(stub.gross)*0.225) : 0);
  if(empDisplayAmt) empRows.push(['CNSS Employeur', fmt(empDisplayAmt)]);

  function drawSectionHeader(label, color){
    y += 3;
    doc.setFillColor(...color);
    doc.rect(M, y, W-M*2, 7, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(8); doc.setFont('helvetica','bold');
    doc.text(label, M+5, y+5);
    y += 7;
  }

  function drawRows(rows, textColor){
    rows.forEach((row, i) => {
      doc.setFillColor(i%2===0?255:248, i%2===0?255:249, i%2===0?255:252);
      doc.rect(M, y, W-M*2, 8, 'F');
      doc.setTextColor(...textColor); doc.setFontSize(9); doc.setFont('helvetica','normal');
      doc.text(row[0], M+5, y+5.5);
      doc.setFont('helvetica','bold');
      doc.text(row[1], W-M-5, y+5.5, {align:'right'});
      y += 8;
    });
  }

  drawSectionHeader('GAINS', [31, 122, 72]);
  drawRows(gainsRows, [30,30,30]);

  if(retRows.length){
    drawSectionHeader('RETENUES SALARIÉ', [192, 57, 43]);
    drawRows(retRows, [192,57,43]);
  }

  if(empRows.length){
    drawSectionHeader('CHARGES EMPLOYEUR (information)', [80, 80, 100]);
    drawRows(empRows, [80,80,100]);
  }

  // Net pay box
  y += 10;
  doc.setFillColor(...red);
  doc.roundedRect(M, y, W-M*2, 14, 3, 3, 'F');
  doc.setTextColor(255,255,255); doc.setFontSize(10); doc.setFont('helvetica','bold');
  doc.text('NET A PAYER', M+6, y+9);
  const netAmt = stub.net ? fmt(stub.net)+' FCFA' : '—';
  doc.setFontSize(12);
  doc.text(netAmt, W-M-6, y+9, {align:'right'});

  // Note
  if(stub.note){
    y += 22;
    doc.setTextColor(...gray); doc.setFontSize(8.5); doc.setFont('helvetica','italic');
    doc.text('Note : '+stub.note, M, y);
  }

  // Footer
  doc.setFillColor(...light);
  doc.rect(0, 275, W, 22, 'F');
  doc.setTextColor(...gray); doc.setFontSize(7.5); doc.setFont('helvetica','normal');
  doc.text('Ce document est une fiche de paie officielle de SportFM. Confidentiel — ne pas diffuser.', W/2, 282, {align:'center'});
  doc.text(`Généré le ${new Date().toLocaleDateString('fr-FR')}`, W/2, 288, {align:'center'});

  const filename = `fiche-paie_${(emp.name||'employe').replace(/\s+/g,'-')}_${stub.period_month}-${stub.period_year}.pdf`;
  doc.save(filename);
  return filename;
}

`Bonjour ${emp.name||emp.email},

function PayrollReports({ stubs, employees, empMap }){
  const [rMonth,setRMonth]=useState('all');
  const [rEmp,setREmp]=useState('all');
  const [rYear,setRYear]=useState('all');

  const reportYears=[...new Set(stubs.map(s=>String(s.period_year)))].sort((a,b)=>b-a);
  if(!reportYears.includes(String(CURRENT_YEAR))) reportYears.unshift(String(CURRENT_YEAR));

  const reportStubs=stubs.filter(s=>
    (rEmp==='all'||s.employee_id===rEmp)&&
    (rMonth==='all'||s.period_month===rMonth)&&
    (rYear==='all'||String(s.period_year)===rYear)
  );
  const totalBrutR=reportStubs.reduce((a,s)=>a+Number(s.gross||0),0);
  const totalNetR=reportStubs.reduce((a,s)=>a+Number(s.net||0),0);

  function exportReportPDF(){
    const { jsPDF }=window.jspdf;
    const doc=new jsPDF({unit:'mm',format:'a4'});
    const navy=[13,27,77],red=[239,0,63],gray=[100,100,110];
    const W=210,M=18;
    doc.setFillColor(...navy); doc.rect(0,0,W,30,'F');
    doc.setTextColor(255,255,255); doc.setFontSize(18); doc.setFont('helvetica','bold');
    doc.text('SportFM — Rapport de Paie',M,18);
    doc.setFontSize(9); doc.setFont('helvetica','normal');
    doc.text(`Généré le ${new Date().toLocaleDateString('fr-FR')}`,W-M,18,{align:'right'});
    doc.setFillColor(...red); doc.rect(0,30,W,2,'F');
    let y=42;
    const headers=['Employé','Brut','CNSS Sal.','CNSS Emp.','TCS','TS','Net','Période'];
    const colW=[44,22,20,22,16,16,22,28];
    let x=M;
    doc.setFillColor(240,242,248); doc.rect(M,y-5,W-M*2,9,'F');
    doc.setTextColor(...navy); doc.setFontSize(8); doc.setFont('helvetica','bold');
    headers.forEach((h,i)=>{ doc.text(h,x+1,y); x+=colW[i]; });
    y+=6;
    doc.setFont('helvetica','normal'); doc.setTextColor(30,30,30);
    let totalBrut=0,totalNet=0;
    reportStubs.forEach((s,ri)=>{
      const emp=empMap[s.employee_id];
      const brut=Number(s.gross||0);
      const cnss=Number(s.cotisations||0);
      const cnssEmp=Number(emp?.cnss_employeur_taux||0);
      const tcs=Number(s.impot||0);
      const ts=Number(s.deduction||0);
      const net=Number(s.net||0);
      totalBrut+=brut; totalNet+=net;
      const fmt=n=>n?n.toLocaleString('fr-FR'):'—';
      if(ri%2===0){ doc.setFillColor(250,251,253); doc.rect(M,y-4,W-M*2,8,'F'); }
      x=M;
      [emp?.name||'?',fmt(brut),fmt(cnss),fmt(cnssEmp),fmt(tcs),fmt(ts),fmt(net),`${s.period_month} ${s.period_year}`]
        .forEach((v,i)=>{ doc.setFontSize(7.5); doc.text(String(v),x+1,y); x+=colW[i]; });
      y+=8; if(y>270){ doc.addPage(); y=20; }
    });
    doc.setFillColor(...navy); doc.rect(M,y-4,W-M*2,9,'F');
    doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(8);
    doc.text('TOTAL',M+1,y+1);
    doc.text(totalBrut.toLocaleString('fr-FR'),M+45,y+1);
    doc.text(totalNet.toLocaleString('fr-FR'),M+145,y+1);
    doc.setFillColor(245,246,250); doc.rect(0,278,W,20,'F');
    doc.setTextColor(...gray); doc.setFontSize(7); doc.setFont('helvetica','normal');
    doc.text('Rapport confidentiel — SportFM 91.9 FM',W/2,285,{align:'center'});
    doc.save(`rapport-paie_${new Date().toISOString().slice(0,10)}.pdf`);
  }

  return (
    <div>
      <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
        <select value={rMonth} onChange={e=>setRMonth(e.target.value)}
          style={{padding:'9px 12px',border:'1px solid var(--line)',borderRadius:9,fontSize:13.5,background:'#fff',outline:'none'}}>
          <option value="all">Tous les mois</option>
          {PAY_PERIODS.map(m=><option key={m}>{m}</option>)}
        </select>
        <select value={rYear} onChange={e=>setRYear(e.target.value)}
          style={{padding:'9px 12px',border:'1px solid var(--line)',borderRadius:9,fontSize:13.5,background:'#fff',outline:'none'}}>
          <option value="all">Toutes les années</option>
          {reportYears.map(y=><option key={y} value={y}>{y}</option>)}
        </select>
        <select value={rEmp} onChange={e=>setREmp(e.target.value)}
          style={{padding:'9px 12px',border:'1px solid var(--line)',borderRadius:9,fontSize:13.5,background:'#fff',outline:'none'}}>
          <option value="all">Tous les employés</option>
          {employees.map(e=><option key={e.id} value={e.id}>{e.name||e.email}</option>)}
        </select>
        <button className="btn-primary" onClick={exportReportPDF} style={{marginLeft:'auto'}}>📄 Exporter PDF</button>
      </div>
      {reportStubs.length===0 ? <div className="panel"><div className="empty">Aucune fiche pour ce filtre.</div></div> : (
        <div className="panel" style={{padding:0,overflow:'hidden'}}>
          <table className="admin-table" style={{tableLayout:'fixed',width:'100%'}}>
            <thead><tr>
              <th style={{paddingLeft:16}}>Employé</th>
              <th>Brut</th><th>CNSS Sal.</th><th>CNSS Emp.</th><th>TCS</th><th>TS</th>
              <th>Net</th><th>Période</th>
            </tr></thead>
            <tbody>
              {reportStubs.map(s=>{
                const emp=empMap[s.employee_id];
                return (
                  <tr key={s.id}>
                    <td style={{paddingLeft:16,fontWeight:700,color:'var(--navy)'}}>{emp?.name||'—'}</td>
                    <td style={{fontWeight:600}}>{Number(s.gross||0).toLocaleString('fr-FR')}</td>
                    <td style={{color:'#c0392b'}}>{Number(s.cotisations||0).toLocaleString('fr-FR')}</td>
                    <td style={{color:'#c0392b'}}>{Number(emp?.cnss_employeur_taux||0).toLocaleString('fr-FR')}</td>
                    <td style={{color:'#c0392b'}}>{Number(s.impot||0).toLocaleString('fr-FR')}</td>
                    <td style={{color:'#c0392b'}}>{Number(s.deduction||0).toLocaleString('fr-FR')}</td>
                    <td style={{fontWeight:700,color:'#1f7a48'}}>{Number(s.net||0).toLocaleString('fr-FR')}</td>
                    <td style={{fontSize:12.5,color:'var(--muted)'}}>{s.period_month} {s.period_year}</td>
                  </tr>
                );
              })}
              <tr style={{background:'var(--navy)'}}>
                <td style={{paddingLeft:16,fontWeight:800,color:'#fff'}}>TOTAL</td>
                <td style={{fontWeight:800,color:'#fff'}}>{totalBrutR.toLocaleString('fr-FR')}</td>
                <td></td><td></td><td></td><td></td>
                <td style={{fontWeight:800,color:'#7effc0'}}>{totalNetR.toLocaleString('fr-FR')}</td>
                <td></td>
              </tr>
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function AdminFinance({ adminEmail, userRole, toast }){
  const [tab,setTab]=useState('stubs'); // 'stubs' | 'employees'
  const [employees,setEmployees]=useState([]);
  const [stubs,setStubs]=useState([]);
  const [loading,setLoading]=useState(true);
  const [editingEmp,setEditingEmp]=useState(null);   // null=list, {}=new, obj=edit
  const [editingStub,setEditingStub]=useState(null);
  const [filterEmp,setFilterEmp]=useState('all');
  const [filterYear,setFilterYear]=useState(String(CURRENT_YEAR));
  const [sending,setSending]=useState(null);

  async function load(){
    const [eRes,sRes]=await Promise.all([
      sb.from('employees').select('*').order('name'),
      sb.from('paystubs').select('*').order('period_year',{ascending:false}).order('created_at',{ascending:false}),
    ]);
    setEmployees(eRes.data||[]); setStubs(sRes.data||[]); setLoading(false);
  }
  useEffect(()=>{ load(); },[]);

  async function deleteStub(id,label){
    if(!confirm('Supprimer cette fiche de paie ?')) return;
    await sb.from('paystubs').delete().eq('id',id);
    await logAction(adminEmail,'Fiche supprimée',label); toast('Supprimé'); load();
  }
  async function deleteEmp(id,name){
    if(!confirm(`Supprimer ${name} ? Ses fiches de paie seront également supprimées.`)) return;
    await sb.from('paystubs').delete().eq('employee_id',id);
    await sb.from('employees').delete().eq('id',id);
    await logAction(adminEmail,'Employé supprimé',name); toast('Supprimé'); load();
  }

  const visibleStubs = stubs.filter(s=>
    (filterEmp==='all'||s.employee_id===filterEmp) &&
    (!filterYear||String(s.period_year)===filterYear)
  );
  const empMap = Object.fromEntries(employees.map(e=>[e.id,e]));
  const years = [...new Set(stubs.map(s=>s.period_year))].sort((a,b)=>b-a);
  if(years.length===0) years.push(CURRENT_YEAR);

  if(editingStub!==null) return <PaystubForm stub={editingStub.id?editingStub:null} employees={employees}
    onSave={()=>{setEditingStub(null);load();}} onCancel={()=>setEditingStub(null)}
    adminEmail={adminEmail} toast={toast} />;
  if(editingEmp!==null) return <EmployeeForm emp={editingEmp.id?editingEmp:null}
    onSave={()=>{setEditingEmp(null);load();}} onCancel={()=>setEditingEmp(null)}
    adminEmail={adminEmail} toast={toast} />;

  // KPI
  const sentCount = stubs.filter(s=>s.sent_at).length;

  return (
    <div>
      {/* KPI */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:12,marginBottom:22}}>
        {[
          {label:'Employés',n:employees.length,color:'var(--navy)',bg:'#fff'},
          {label:'Fiches créées',n:stubs.length,color:'#2a5bd0',bg:'#e7eefc'},
          {label:'Envoyées',n:sentCount,color:'#1f7a48',bg:'#e3f6ea'},
          {label:'En attente',n:stubs.length-sentCount,color:'#9a6a00',bg:'#fff4e0'},
        ].map((k,i)=>(
          <div key={i} style={{background:k.bg,border:'1px solid var(--line)',borderRadius:10,padding:'12px 16px'}}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:'.05em',color:k.color,opacity:.8}}>{k.label.toUpperCase()}</div>
            <div style={{fontFamily:"'Barlow Semi Condensed',sans-serif",fontWeight:800,fontSize:26,color:k.color,marginTop:2}}>{k.n}</div>
          </div>
        ))}
      </div>

      {/* Sub-tabs */}
      <div style={{display:'flex',gap:8,marginBottom:20,borderBottom:'1px solid var(--line)',paddingBottom:0}}>
        {[{k:'stubs',l:'📄 Fiches de paie'},{k:'employees',l:'👥 Employés'},{k:'reports',l:'📊 Rapports'}].map(t=>(
          <button key={t.k} onClick={()=>setTab(t.k)}
            style={{padding:'10px 18px',border:'none',borderBottom:tab===t.k?'2px solid var(--navy)':'2px solid transparent',
              background:'none',fontWeight:700,fontSize:14,color:tab===t.k?'var(--navy)':'var(--muted)',cursor:'pointer',marginBottom:'-1px'}}>
            {t.l}
          </button>
        ))}
      </div>

      {loading ? <Spinner/> : tab==='reports' ? (
        <PayrollReports stubs={stubs} employees={employees} empMap={empMap} />
      ) : tab==='employees' ? (

// ============================================================
//  CDM — Coupe du Monde tab
// ============================================================
function AdminCDM({ articles, reload, toast, adminEmail }){
  const [subTab,setSubTab]=useState('live'); // 'live' | 'articles'
  const [liveData,setLiveData]=useState(null);
  const [standings,setStandings]=useState(null);
  const [leaders,setLeaders]=useState(null);
  const [loadingLive,setLoadingLive]=useState(false);
  const [liveErr,setLiveErr]=useState('');

  const cdmArticles = (articles||[]).filter(a=>a.category==='CDM');

  function fetchLive(){
    setLoadingLive(true); setLiveErr('');
    Promise.all([
      fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/FIFA.WORLD/scoreboard').then(r=>r.json()).catch(()=>null),
      fetch('https://site.api.espn.com/apis/v2/sports/soccer/FIFA.WORLD/standings').then(r=>r.json()).catch(()=>null),
      fetch('https://site.api.espn.com/apis/v2/sports/soccer/FIFA.WORLD/leaders').then(r=>r.json()).catch(()=>null),
    ]).then(([score,stand,lead])=>{
      setLiveData(score); setStandings(stand); setLeaders(lead);
      setLoadingLive(false);
      if(!score) setLiveErr('Impossible de charger les données ESPN. Vérifiez votre connexion.');
    });
  }

  useEffect(()=>{ if(subTab==='live') fetchLive(); },[subTab]);

  // Parse scoreboard events
  function parseEvents(data){
    if(!data?.events) return [];
    return data.events.map(ev=>{
      const comp = ev.competitions?.[0]||{};
      const teams = (comp.competitors||[]).map(c=>({
        name: c.team?.displayName||'?',
        score: c.score||'0',
        homeAway: c.homeAway,
      }));
      const home = teams.find(t=>t.homeAway==='home')||teams[0]||{};
      const away = teams.find(t=>t.homeAway==='away')||teams[1]||{};
      const status = comp.status?.type?.description||'';
      const clock = comp.status?.displayClock||'';
      const isLive = comp.status?.type?.state==='in';
      const isFt = comp.status?.type?.completed===true;
      return { home:home.name, away:away.name, homeScore:home.score, awayScore:away.score, status, clock, isLive, isFt };
    });
  }

  const [editingCdm,setEditingCdm]=useState(null);
  const EMPTY_CDM = { title:'',tag:'CDM',category:'CDM',dek:'',body:'',author:'Rédaction SportFM',read_time:'3 min de lecture',image_url:'',is_hero:false,published:true };

  async function deleteCdmArticle(a){
    if(!confirm(`Supprimer « ${a.title} » ?`)) return;
    await sb.from('articles').delete().eq('id',a.id);
    await logAction(adminEmail,'Suppression article CDM',a.title);
    toast('Article supprimé'); reload();
  }

  const subStyle=(k)=>({padding:'10px 18px',border:'none',borderBottom:subTab===k?'2px solid var(--navy)':'2px solid transparent',
    background:'none',fontWeight:700,fontSize:13.5,color:subTab===k?'var(--navy)':'var(--muted)',cursor:'pointer',marginBottom:'-1px'});

  if(editingCdm!==null) return <ArticleEditor initial={editingCdm}
    onSave={async(msg)=>{ await logAction(adminEmail,editingCdm.id?'Modification article CDM':'Nouvel article CDM',editingCdm.title||msg); setEditingCdm(null); reload(); }}
    onCancel={()=>setEditingCdm(null)} toast={toast} />;

  const events = parseEvents(liveData);

  return (
    <div>
      <div style={{display:'flex',gap:0,marginBottom:24,borderBottom:'2px solid var(--line)'}}>
        <button onClick={()=>setSubTab('live')} style={subStyle('live')}>📡 Données live</button>
        <button onClick={()=>setSubTab('articles')} style={subStyle('articles')}>📝 Articles CDM ({cdmArticles.length})</button>
      </div>

      {subTab==='live' && (
        <div>
          <div style={{display:'flex',gap:10,marginBottom:18,alignItems:'center'}}>
            <div style={{fontFamily:"'Barlow Semi Condensed',sans-serif",fontWeight:800,fontSize:20,color:'var(--navy)'}}>⚽ Coupe du Monde 2026 — Données ESPN</div>
            <button className="btn-ghost" onClick={fetchLive} disabled={loadingLive} style={{marginLeft:'auto'}}>🔄 Rafraîchir</button>
          </div>

          {loadingLive ? <Spinner/> : liveErr ? (
            <div className="panel"><div className="empty">{liveErr}</div></div>
          ) : (
            <>
              {/* Matches */}
              <div className="panel" style={{marginBottom:20}}>
                <h3>Matchs du jour</h3>
                {events.length===0
                  ? <div className="empty">Aucun match disponible pour l'instant.</div>
                  : events.map((ev,i)=>(
                    <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 0',borderBottom:'1px solid var(--line)',gap:12,flexWrap:'wrap'}}>
                      <div style={{display:'flex',alignItems:'center',gap:10,flex:1,justifyContent:'flex-end'}}>
                        <span style={{fontWeight:700,fontSize:14,color:'var(--navy)'}}>{ev.home}</span>
                      </div>
                      <div style={{textAlign:'center',minWidth:100}}>
                        <div style={{fontWeight:800,fontSize:20,color:ev.isLive?'var(--red)':'var(--navy)'}}>{ev.homeScore} — {ev.awayScore}</div>
                        <div style={{fontSize:11,fontWeight:700,marginTop:3,
                          color:ev.isLive?'var(--red)':ev.isFt?'#1f7a48':'var(--muted)'}}>
                          {ev.isLive?`🔴 ${ev.clock}`:ev.isFt?'FT':ev.status}
                        </div>
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:10,flex:1}}>
                        <span style={{fontWeight:700,fontSize:14,color:'var(--navy)'}}>{ev.away}</span>
                      </div>
                    </div>
                  ))
                }
              </div>

              {/* Top scorers */}
              {leaders?.leaders?.length>0 && (
                <div className="panel" style={{marginBottom:20}}>
                  <h3>Meilleurs buteurs</h3>
                  {(leaders.leaders[0]?.leaders||[]).slice(0,10).map((l,i)=>(
                    <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'8px 0',borderBottom:'1px solid var(--line)'}}>
                      <span style={{fontWeight:800,fontSize:14,color:'var(--navy)',width:24,textAlign:'center'}}>{i+1}</span>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:700,fontSize:13.5,color:'var(--navy)'}}>{l.athlete?.displayName||'—'}</div>
                        <div style={{fontSize:11.5,color:'var(--muted)'}}>{l.athlete?.flag?.alt||l.team?.displayName||''}</div>
                      </div>
                      <span style={{fontWeight:800,fontSize:18,color:'var(--red)'}}>{l.value}</span>
                    </div>
                  ))}
                </div>
              )}

              {/* Standings groups */}
              {standings?.standings?.entries?.length>0 && (
                <div className="panel">
                  <h3>Classement des groupes</h3>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:16}}>
                    {(standings.standings.entries||[]).slice(0,8).map((entry,gi)=>(
                      <div key={gi} style={{border:'1px solid var(--line)',borderRadius:10,overflow:'hidden'}}>
                        <div style={{background:'var(--navy)',color:'#fff',padding:'8px 14px',fontWeight:800,fontSize:13}}>
                          {entry.team?.displayName||`Équipe ${gi+1}`}
                        </div>
                        <div style={{padding:'8px 14px',display:'flex',justifyContent:'space-between',fontSize:12.5}}>
                          {(entry.stats||[]).slice(0,4).map((s,si)=>(
                            <div key={si} style={{textAlign:'center'}}>
                              <div style={{fontSize:10,color:'var(--muted)',fontWeight:700}}>{s.shortDisplayName||s.name}</div>
                              <div style={{fontWeight:800,color:'var(--navy)'}}>{s.displayValue||s.value}</div>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      )}

      {subTab==='articles' && (
        <div className="panel">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
            <h3 style={{margin:0}}>Articles CDM ({cdmArticles.length})</h3>
            <button className="btn-primary" onClick={()=>setEditingCdm({...EMPTY_CDM})}>+ Nouvel article CDM</button>
          </div>
          {cdmArticles.length===0
            ? <div className="empty">Aucun article CDM. Publiez votre premier article sur la Coupe du Monde.</div>
            : <table className="admin-table"><thead><tr>
                <th>Titre</th><th>Statut</th><th>Modifié</th><th></th>
              </tr></thead><tbody>
              {cdmArticles.map(a=>(
                <tr key={a.id}>
                  <td style={{fontWeight:600,maxWidth:380}}>{a.is_hero&&<span style={{color:'var(--red)',marginRight:6}}>★</span>}{a.title}</td>
                  <td><span className={"pill "+(a.published?'pub':'draft')}>{a.published?'Publié':'Brouillon'}</span></td>
                  <td style={{color:'var(--muted)'}}>{timeAgo(a.updated_at||a.created_at)}</td>
                  <td style={{textAlign:'right',whiteSpace:'nowrap'}}>
                    <button className="icon-btn" onClick={()=>setEditingCdm(a)}>Modifier</button>
                    <button className="icon-btn del" onClick={()=>deleteCdmArticle(a)}>Supprimer</button>
                  </td>
                </tr>
              ))}
            </tbody></table>}
        </div>
      )}
    </div>
  );
}

// ============================================================
//  MON ESPACE — Employee Profile Portal
// ============================================================
function MonEspace({ session, userPerms, onClose, toast, initialTab }){
  const email = session?.user?.email || '';
  const [tab,setTab]=useState(initialTab||'profile');
  const [profile,setProfile]=useState(null);
  const [newPw,setNewPw]=useState(''); const [confirmPw,setConfirmPw]=useState('');
  const [pwBusy,setPwBusy]=useState(false);
  const [paystubs,setPaystubs]=useState([]);
  const [linkedEmp,setLinkedEmp]=useState(null);
  const [announcements,setAnnouncements]=useState([]);
  const [notifications,setNotifications]=useState([]);
  const [uploading,setUploading]=useState(false);
  const [annTitle,setAnnTitle]=useState(''); const [annBody,setAnnBody]=useState('');
  const [annPinned,setAnnPinned]=useState(false); const [annBusy,setAnnBusy]=useState(false);
  const imgRef=useRef(null);
  // messages state
  const [teamList,setTeamList]=useState([]);
  const [inbox,setInbox]=useState([]);
  const [sent,setSent]=useState([]);
  const [msgView,setMsgView]=useState('inbox'); // 'inbox'|'sent'|'compose'|'thread'
  const [openThread,setOpenThread]=useState(null); // message object
  const [replyBody,setReplyBody]=useState('');
  const [compTo,setCompTo]=useState(''); const [compSubj,setCompSubj]=useState(''); const [compBody,setCompBody]=useState('');
  const [msgBusy,setMsgBusy]=useState(false);

  const canAnnounce = !!(userPerms?.__full || userPerms?.can_announcements);

  async function loadMessages(){
    const [{ data:inc },{ data:snt }]=await Promise.all([
      sb.from('direct_messages').select('*').eq('to_email',email).order('created_at',{ascending:false}),
      sb.from('direct_messages').select('*').eq('from_email',email).order('created_at',{ascending:false}),
    ]);
    setInbox(inc||[]); setSent(snt||[]);
  }

  useEffect(()=>{
    sb.from('user_roles').select('*').eq('email',email).maybeSingle().then(({data})=>setProfile(data||{}));
    sb.from('employees').select('*').eq('linked_user_email',email).maybeSingle().then(({data})=>{
      if(data?.id){
        setLinkedEmp(data);
        sb.from('paystubs').select('*').eq('employee_id',data.id).order('period_year',{ascending:false}).order('period_month',{ascending:false}).then(({data:s})=>setPaystubs(s||[]));
      }
    });
    sb.from('announcements').select('*').order('pinned',{ascending:false}).order('created_at',{ascending:false}).limit(30)
      .then(({data})=>setAnnouncements(data||[]));
    sb.from('notifications').select('*').eq('recipient_email',email).order('created_at',{ascending:false}).limit(30)
      .then(({data})=>setNotifications(data||[]));
    sb.from('user_roles').select('email,name,job_title').order('name').then(({data})=>setTeamList((data||[]).filter(u=>u.email!==email)));
    loadMessages();
  },[email]);

  async function sendMessage(){
    if(!compTo||!compBody.trim()){ toast('Destinataire et message requis'); return; }
    setMsgBusy(true);
    const { error }=await sb.from('direct_messages').insert([{
      from_email:email, from_name:profile?.name||email,
      to_email:compTo, subject:compSubj.trim()||'(sans objet)', body:compBody.trim(), read:false
    }]);
    setMsgBusy(false);
    if(error){ toast('Erreur : '+error.message); return; }
    toast('Message envoyé ✓'); setCompTo(''); setCompSubj(''); setCompBody('');
    setMsgView('sent'); loadMessages();
  }

  async function markRead(msg){
    if(!msg.read) await sb.from('direct_messages').update({read:true}).eq('id',msg.id);
    setOpenThread(msg); setMsgView('thread'); loadMessages();
  }

  async function sendReply(){
    if(!replyBody.trim()) return;
    setMsgBusy(true);
    await sb.from('direct_messages').insert([{
      from_email:email, from_name:profile?.name||email,
      to_email:openThread.from_email, subject:'Re: '+(openThread.subject||''), body:replyBody.trim(), read:false
    }]);
    setMsgBusy(false);
    toast('Réponse envoyée ✓'); setReplyBody(''); loadMessages();
  }

  async function uploadPhoto(e){
    const file=e.target.files?.[0]; if(!file) return;
    if(!file.type.startsWith('image/')){ toast('Image uniquement'); return; }
    setUploading(true);
    try{
      const ext=file.name.split('.').pop().toLowerCase();
      const path=`profiles/${email.replace('@','_')}_${Date.now()}.${ext}`;
      const { error }=await sb.storage.from('profiles').upload(path,file,{contentType:file.type,upsert:true});
      if(error) throw error;
      const { data:u }=sb.storage.from('profiles').getPublicUrl(path);
      await sb.from('user_roles').update({profile_image_url:u.publicUrl}).eq('email',email);
      setProfile(p=>({...p,profile_image_url:u.publicUrl}));
      toast('Photo mise à jour ✓');
    } catch(err){ toast('Erreur upload : '+err.message); }
    finally{ setUploading(false); }
  }

  async function changePassword(){
    if(!newPw){ toast('Saisissez un mot de passe'); return; }
    if(newPw!==confirmPw){ toast('Les mots de passe ne correspondent pas'); return; }
    if(newPw.length<6){ toast('Minimum 6 caractères'); return; }
    setPwBusy(true);
    const { error }=await sb.auth.updateUser({password:newPw});
    setPwBusy(false);
    if(error){ toast('Erreur : '+error.message); return; }
    toast('Mot de passe changé ✓'); setNewPw(''); setConfirmPw('');
  }

  async function publishAnnouncement(){
    if(!annTitle.trim()||!annBody.trim()){ toast('Titre et contenu requis'); return; }
    setAnnBusy(true);
    const { error }=await sb.from('announcements').insert([{
      author_email:email, author_name:profile?.name||email,
      title:annTitle, body:annBody, pinned:annPinned
    }]);
    setAnnBusy(false);
    if(error){ toast('Erreur : '+error.message); return; }
    toast('Annonce publiée ✓'); setAnnTitle(''); setAnnBody(''); setAnnPinned(false);
    // notify all team members
    sb.from('user_roles').select('email').then(({data})=>{
      (data||[]).filter(u=>u.email!==email).forEach(u=>{
        notify(u.email, 'announcement', annTitle, (profile?.name||email)+' a publié une annonce');
      });
    });
    sb.from('announcements').select('*').order('pinned',{ascending:false}).order('created_at',{ascending:false}).limit(30)
      .then(({data})=>setAnnouncements(data||[]));
  }

  const tabStyle=(k)=>({padding:'10px 18px',border:'none',borderBottom:tab===k?'2px solid var(--navy)':'2px solid transparent',
    background:'none',fontWeight:700,fontSize:13.5,color:tab===k?'var(--navy)':'var(--muted)',cursor:'pointer',marginBottom:'-1px'});

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',zIndex:1000,overflowY:'auto'}}>
      <div style={{background:'#f6f7f9',minHeight:'100vh',maxWidth:780,margin:'0 auto',padding:'0 0 60px'}}>
        {/* Header */}
        <div style={{background:'var(--navy)',color:'#fff',padding:'18px 24px',display:'flex',alignItems:'center',gap:14}}>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Barlow Semi Condensed',sans-serif",fontWeight:800,fontSize:22}}>👤 Mon Espace</div>
            <div style={{fontSize:12.5,color:'#9fb0d8',marginTop:2}}>{email}{profile?.job_title&&<span style={{marginLeft:8,fontWeight:600}}>{profile.job_title}</span>}</div>
          </div>
          <button onClick={onClose} style={{color:'#cfd6ea',fontWeight:700,fontSize:14,background:'none',border:'1px solid rgba(255,255,255,.2)',borderRadius:7,padding:'7px 14px',cursor:'pointer'}}>✕ Fermer</button>
        </div>

        {/* Tabs */}
        <div style={{background:'#fff',borderBottom:'1px solid var(--line)',display:'flex',gap:0,paddingLeft:24,overflowX:'auto'}}>
          {[['profile','Profil'],['password','Mot de passe'],['notifs','Notifications'],['messages','Messages'+(inbox.filter(m=>!m.read).length>0?` (${inbox.filter(m=>!m.read).length})`:'')],['paystubs','Mes fiches'],['board','Annonces']].map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)} style={tabStyle(k)}>{l}</button>
          ))}
        </div>

        <div style={{padding:'24px'}}>

          {/* PROFILE TAB */}
          {tab==='profile' && (
            <div className="panel">
              <h3>Photo de profil</h3>
              <div style={{display:'flex',gap:20,alignItems:'flex-start',flexWrap:'wrap'}}>
                <div style={{textAlign:'center'}}>
                  {profile?.profile_image_url
                    ? <img src={profile.profile_image_url} alt="Profil" style={{width:100,height:100,borderRadius:'50%',objectFit:'cover',border:'3px solid var(--navy)',display:'block'}} />
                    : <div style={{width:100,height:100,borderRadius:'50%',background:'var(--navy)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,color:'#fff'}}>👤</div>}
                  <input hidden ref={imgRef} type="file" accept="image/*" onChange={uploadPhoto} />
                  <button className="btn-ghost" style={{marginTop:10,fontSize:12.5,padding:'7px 14px'}} onClick={()=>imgRef.current?.click()} disabled={uploading}>
                    {uploading?'Envoi…':'📁 Changer la photo'}
                  </button>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:18,fontWeight:800,color:'var(--navy)',marginBottom:4}}>{profile?.name||email}</div>
                  {profile?.job_title&&<div style={{fontSize:13.5,color:'#4a5168',marginBottom:4}}>{profile.job_title}</div>}
                  <div style={{fontSize:13,color:'var(--muted)'}}>{email}</div>
                </div>
              </div>
            </div>
          )}

          {/* PASSWORD TAB */}
          {tab==='password' && (
            <div className="panel">
              <h3>Changer le mot de passe</h3>
              <div className="field"><label>Nouveau mot de passe</label>
                <input type="password" value={newPw} onChange={e=>setNewPw(e.target.value)} placeholder="••••••••" /></div>
              <div className="field"><label>Confirmer le mot de passe</label>
                <input type="password" value={confirmPw} onChange={e=>setConfirmPw(e.target.value)} placeholder="••••••••" /></div>
              <button className="btn-primary" disabled={pwBusy} onClick={changePassword}>{pwBusy?'…':'Changer le mot de passe'}</button>
            </div>
          )}

          {/* NOTIFICATIONS TAB */}
          {tab==='notifs' && (
            <div className="panel">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                <h3 style={{margin:0}}>Notifications</h3>
                {notifications.some(n=>!n.read) && (
                  <button className="btn-ghost" style={{fontSize:12,padding:'5px 12px'}} onClick={async()=>{
                    await sb.from('notifications').update({read:true}).eq('recipient_email',email).eq('read',false);
                    sb.from('notifications').select('*').eq('recipient_email',email).order('created_at',{ascending:false}).limit(30)
                      .then(({data})=>setNotifications(data||[]));
                  }}>Tout marquer lu</button>
                )}
              </div>
              {notifications.length===0
                ? <div className="empty">Aucune notification.</div>
                : notifications.map((n,i)=>{
                    const icon = n.type==='task_assigned'?'📋':n.type==='paystub'?'💰':n.type==='announcement'?'📢':'🔔';
                    return (
                      <div key={n.id||i} style={{display:'flex',gap:12,padding:'12px 0',borderBottom:'1px solid var(--line)',alignItems:'flex-start',background:n.read?'transparent':'rgba(42,91,208,.03)'}}>
                        <span style={{fontSize:20,flexShrink:0,marginTop:1}}>{icon}</span>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:n.read?600:800,fontSize:13.5,color:'var(--navy)',marginBottom:2}}>{n.title}</div>
                          {n.body&&<div style={{fontSize:12.5,color:'#5a6178'}}>{n.body}</div>}
                          <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>{new Date(n.created_at).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</div>
                        </div>
                        {!n.read && <div style={{width:8,height:8,borderRadius:'50%',background:'var(--red)',flexShrink:0,marginTop:6}}/>}
                      </div>
                    );
                  })
              }
            </div>
          )}

          {/* PAYSTUBS TAB */}
          {tab==='paystubs' && (
            <div>
              {paystubs.length===0
                ? <div className="panel"><div className="empty">Aucune fiche de paie disponible.</div></div>
                : paystubs.map(s=>{
                    const fmt=n=>n?Number(n).toLocaleString('fr-FR')+' FCFA':'—';
                    const retTotal=(Number(s.cotisations)||0)+(Number(s.impot)||0)+(Number(s.deduction)||0);
                    return (
                      <div key={s.id} className="panel" style={{marginBottom:14}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:10,marginBottom:14}}>
                          <div>
                            <div style={{fontFamily:"'Barlow Semi Condensed',sans-serif",fontWeight:800,fontSize:18,color:'var(--navy)'}}>{s.period_month} {s.period_year}</div>
                            {s.reference&&<div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>Réf : {s.reference}</div>}
                          </div>
                          <button className="btn-primary" style={{fontSize:13,padding:'8px 16px'}}
                            onClick={()=>{ if(linkedEmp) generatePaystubPDF(linkedEmp,s); else toast('Données employé introuvables'); }}>
                            📄 Télécharger PDF
                          </button>
                        </div>
                        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:10}}>
                          {[
                            {label:'Salaire brut',    value:fmt(s.gross),         color:'#1f7a48'},
                            {label:'CNSS salarié',    value:fmt(s.cotisations),   color:'#c0392b'},
                            {label:'TCS',             value:fmt(s.impot),         color:'#c0392b'},
                            {label:'TS',              value:fmt(s.deduction),     color:'#c0392b'},
                            s.prime?{label:'Prime',   value:fmt(s.prime),         color:'#1f7a48'}:null,
                            {label:'Total retenues',  value:retTotal?Number(retTotal).toLocaleString('fr-FR')+' FCFA':'—', color:'#c0392b'},
                            {label:'NET À PAYER',     value:fmt(s.net),           color:'var(--navy)', big:true},
                          ].filter(Boolean).map((item,i)=>(
                            <div key={i} style={{background:item.big?'var(--navy)':'#f6f7f9',borderRadius:8,padding:'10px 14px',border:'1px solid var(--line)'}}>
                              <div style={{fontSize:10.5,fontWeight:700,letterSpacing:'.04em',color:item.big?'rgba(255,255,255,.7)':'var(--muted)',marginBottom:4}}>{item.label.toUpperCase()}</div>
                              <div style={{fontWeight:800,fontSize:item.big?16:14,color:item.big?'#fff':item.color}}>{item.value}</div>
                            </div>
                          ))}
                        </div>
                        {s.note&&<div style={{marginTop:12,fontSize:12.5,color:'#5a6178',borderTop:'1px solid var(--line)',paddingTop:10}}>📝 {s.note}</div>}
                      </div>
                    );
                  })
              }
            </div>
          )}

          {/* MESSAGES TAB */}
          {tab==='messages' && (
            <div>
              {/* Sub-nav */}
              <div style={{display:'flex',gap:8,marginBottom:18,flexWrap:'wrap',alignItems:'center'}}>
                {[['inbox','📥 Reçus'+(inbox.filter(m=>!m.read).length>0?` · ${inbox.filter(m=>!m.read).length} non lus`:'')],['sent','📤 Envoyés'],['compose','✏️ Nouveau message']].map(([k,l])=>(
                  <button key={k} onClick={()=>setMsgView(k)}
                    style={{padding:'8px 16px',borderRadius:20,fontSize:13,fontWeight:700,cursor:'pointer',border:'2px solid',
                      borderColor:msgView===k?'var(--navy)':'var(--line)',
                      background:msgView===k?'var(--navy)':'#fff',
                      color:msgView===k?'#fff':'#5a6178'}}>{l}</button>
                ))}
              </div>

              {/* INBOX */}
              {msgView==='inbox' && (
                <div className="panel" style={{padding:0,overflow:'hidden'}}>
                  {inbox.length===0
                    ? <div className="empty" style={{padding:24}}>Aucun message reçu.</div>
                    : inbox.map(m=>(
                      <div key={m.id} onClick={()=>markRead(m)}
                        style={{display:'flex',gap:12,padding:'14px 18px',borderBottom:'1px solid var(--line)',cursor:'pointer',
                          background:m.read?'#fff':'#f0f5ff',transition:'background .15s'}}
                        onMouseOver={e=>e.currentTarget.style.background='#f5f7fc'}
                        onMouseOut={e=>e.currentTarget.style.background=m.read?'#fff':'#f0f5ff'}>
                        <div style={{width:36,height:36,borderRadius:'50%',background:'var(--navy)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:14,fontWeight:800,flexShrink:0}}>
                          {(m.from_name||m.from_email).charAt(0).toUpperCase()}
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
                            <span style={{fontWeight:m.read?600:800,fontSize:13.5,color:'var(--navy)'}}>{m.from_name||m.from_email}</span>
                            <span style={{fontSize:11,color:'var(--muted)',flexShrink:0}}>{new Date(m.created_at).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</span>
                          </div>
                          <div style={{fontSize:13,fontWeight:m.read?500:700,color:'#2b3142',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.subject}</div>
                          <div style={{fontSize:12,color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.body}</div>
                        </div>
                        {!m.read && <div style={{width:8,height:8,borderRadius:'50%',background:'var(--red)',flexShrink:0,marginTop:6}}/>}
                      </div>
                    ))
                  }
                </div>
              )}

              {/* SENT */}
              {msgView==='sent' && (
                <div className="panel" style={{padding:0,overflow:'hidden'}}>
                  {sent.length===0
                    ? <div className="empty" style={{padding:24}}>Aucun message envoyé.</div>
                    : sent.map(m=>(
                      <div key={m.id} style={{display:'flex',gap:12,padding:'14px 18px',borderBottom:'1px solid var(--line)'}}>
                        <div style={{width:36,height:36,borderRadius:'50%',background:'#5a6178',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:14,fontWeight:800,flexShrink:0}}>
                          {(m.to_email).charAt(0).toUpperCase()}
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
                            <span style={{fontWeight:600,fontSize:13.5,color:'#4a5168'}}>À : {teamList.find(t=>t.email===m.to_email)?.name||m.to_email}</span>
                            <span style={{fontSize:11,color:'var(--muted)',flexShrink:0}}>{new Date(m.created_at).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</span>
                          </div>
                          <div style={{fontSize:13,color:'#2b3142',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.subject}</div>
                          <div style={{fontSize:12,color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.body}</div>
                        </div>
                      </div>
                    ))
                  }
                </div>
              )}

              {/* COMPOSE */}
              {msgView==='compose' && (
                <div className="panel">
                  <h3>Nouveau message</h3>
                  <div className="field"><label>Destinataire</label>
                    <select value={compTo} onChange={e=>setCompTo(e.target.value)}
                      style={{padding:'10px 12px',border:'1px solid var(--line)',borderRadius:8,fontSize:13.5,background:'#fff',outline:'none',width:'100%'}}>
                      <option value="">Sélectionner un membre…</option>
                      {teamList.map(m=><option key={m.email} value={m.email}>{m.name||m.email}{m.job_title?` — ${m.job_title}`:''}</option>)}
                    </select>
                  </div>
                  <div className="field"><label>Objet</label>
                    <input value={compSubj} onChange={e=>setCompSubj(e.target.value)} placeholder="Objet du message…" /></div>
                  <div className="field"><label>Message</label>
                    <textarea value={compBody} onChange={e=>setCompBody(e.target.value)} style={{minHeight:120}} placeholder="Écrivez votre message…" /></div>
                  <button className="btn-primary" disabled={msgBusy||!compTo||!compBody.trim()} onClick={sendMessage}>{msgBusy?'Envoi…':'Envoyer'}</button>
                </div>
              )}

              {/* THREAD / REPLY */}
              {msgView==='thread' && openThread && (
                <div>
                  <button className="btn-ghost" style={{marginBottom:14,fontSize:13}} onClick={()=>setMsgView('inbox')}>← Retour</button>
                  <div className="panel" style={{marginBottom:14}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                      <div>
                        <div style={{fontWeight:800,fontSize:16,color:'var(--navy)',marginBottom:4}}>{openThread.subject}</div>
                        <div style={{fontSize:12.5,color:'var(--muted)'}}>De : {openThread.from_name||openThread.from_email} · {new Date(openThread.created_at).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
                      </div>
                    </div>
                    <div style={{fontSize:14,color:'#2b3142',lineHeight:1.65,whiteSpace:'pre-wrap',borderTop:'1px solid var(--line)',paddingTop:14}}>{openThread.body}</div>
                  </div>
                  <div className="panel">
                    <h3 style={{marginBottom:12}}>Répondre</h3>
                    <div className="field">
                      <textarea value={replyBody} onChange={e=>setReplyBody(e.target.value)} style={{minHeight:90}} placeholder="Votre réponse…" />
                    </div>
                    <button className="btn-primary" disabled={msgBusy||!replyBody.trim()} onClick={sendReply}>{msgBusy?'Envoi…':'Envoyer la réponse'}</button>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* BOARD TAB */}
          {tab==='board' && (
            <div>
              {canAnnounce && (
                <div className="panel" style={{marginBottom:20}}>
                  <h3>Publier une annonce</h3>
                  <div className="field"><label>Titre</label><input value={annTitle} onChange={e=>setAnnTitle(e.target.value)} placeholder="Titre de l'annonce…" /></div>
                  <div className="field"><label>Contenu</label><textarea value={annBody} onChange={e=>setAnnBody(e.target.value)} style={{minHeight:80}} placeholder="Texte de l'annonce…" /></div>
                  <label style={{display:'flex',gap:8,alignItems:'center',fontSize:13.5,fontWeight:600,marginBottom:14,cursor:'pointer'}}>
                    <input type="checkbox" checked={annPinned} onChange={e=>setAnnPinned(e.target.checked)} /> 📌 Épingler
                  </label>
                  <button className="btn-primary" disabled={annBusy} onClick={publishAnnouncement}>{annBusy?'…':'Publier'}</button>
                </div>
              )}
              {announcements.length===0
                ? <div className="panel"><div className="empty">Aucune annonce.</div></div>
                : announcements.map(a=>(
                  <div key={a.id} className="panel" style={{marginBottom:12,borderLeft:a.pinned?'4px solid var(--red)':'4px solid var(--line)'}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                      {a.pinned&&<span style={{fontSize:12,color:'var(--red)',fontWeight:800}}>📌 ÉPINGLÉ</span>}
                      <span style={{fontFamily:"'Barlow Semi Condensed',sans-serif",fontWeight:800,fontSize:17,color:'var(--navy)'}}>{a.title}</span>
                    </div>
                    <div style={{fontSize:14,color:'#2b3142',lineHeight:1.55,marginBottom:8}}>{a.body}</div>
                    <div style={{fontSize:11.5,color:'var(--muted)'}}>{a.author_name||a.author_email} · {timeAgo(a.created_at)}</div>
                  </div>
                ))}
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

const MODULES = [
  { key:'can_articles',   label:'Articles' },
  { key:'can_scores',     label:'Scores & Classement' },
  { key:'can_partners',   label:'Partenaires' },
  { key:'can_ads',        label:'Publicités' },
  { key:'can_content',    label:'Planning Contenu' },
  { key:'can_emissions',  label:'Émissions' },
  { key:'can_finance',    label:'Fiches de paie' },
  { key:'can_accounting', label:'Comptabilité' },
  { key:'can_team',       label:'Équipe & Accès' },
  { key:'can_logs',       label:'Journal global' },
  { key:'can_announcements', label:'Annonces' },
];

function PermCheckboxes({ perms, onChange }){
  return (
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:8,marginTop:8}}>
      {MODULES.map(m=>(
        <label key={m.key} style={{display:'flex',alignItems:'center',gap:8,fontSize:13,cursor:'pointer',
          padding:'8px 10px',border:'1px solid var(--line)',borderRadius:8,
          background:perms[m.key]?'rgba(11,36,94,.05)':'#fff',
          borderColor:perms[m.key]?'var(--navy)':'var(--line)'}}>
          <input type="checkbox" checked={!!perms[m.key]} onChange={e=>onChange(m.key,e.target.checked)}
            style={{accentColor:'var(--navy)',width:15,height:15}} />
          <span style={{fontWeight:perms[m.key]?700:400,color:perms[m.key]?'var(--navy)':'#4a5168'}}>{m.label}</span>
        </label>
      ))}
    </div>
  );
}

function AdminUsers({ adminEmail, toast }){
  const [users,setUsers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [newEmail,setNewEmail]=useState('');
  const [newName,setNewName]=useState('');
  const [newTitle,setNewTitle]=useState('');
  const [newUsername,setNewUsername]=useState('');
  const [newPerms,setNewPerms]=useState({});
  const [saving,setSaving]=useState(false);
  const [expandedId,setExpandedId]=useState(null);

  async function load(){
    const { data }=await sb.from('user_roles').select('*').order('created_at',{ascending:true});
    setUsers(data||[]); setLoading(false);
  }
  useEffect(()=>{ load(); },[]);

  const toggleNewPerm=(k,v)=>setNewPerms(p=>({...p,[k]:v}));

  async function addUser(){
    if(!newEmail.trim()){ toast('E-mail requis'); return; }
    setSaving(true);
    const payload={ email:newEmail.trim().toLowerCase(), name:newName.trim()||null,
      job_title:newTitle.trim()||null, username:newUsername.trim().toLowerCase()||null, ...newPerms };
    const { error }=await sb.from('user_roles').upsert([payload],{onConflict:'email'});
    setSaving(false);
    if(error){ toast('Erreur : '+error.message); return; }
    await logAction(adminEmail,'Utilisateur ajouté', newEmail);
    toast('Utilisateur enregistré');
    setNewEmail(''); setNewName(''); setNewTitle(''); setNewUsername(''); setNewPerms({});
    load();
  }

  async function updateUser(u, patch){
    await sb.from('user_roles').update(patch).eq('id',u.id);
    await logAction(adminEmail,'Accès modifié', u.email);
    toast('Mis à jour'); load();
  }

  async function removeUser(id, email){
    if(!confirm(`Retirer ${email} de l'équipe ?`)) return;
    await sb.from('user_roles').delete().eq('id',id);
    await logAction(adminEmail,'Utilisateur retiré', email);
    toast('Retiré'); load();
  }

  return (
    <div>
      {/* Existing users */}
      {loading ? <Spinner/> : users.map(u=>(
        <div key={u.id} className="panel" style={{marginBottom:14}}>
          <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:700,fontSize:15,color:'var(--navy)'}}>{u.name||u.email}
                {u.email===adminEmail&&<span style={{marginLeft:8,fontSize:11,color:'var(--muted)',fontWeight:400}}>(vous)</span>}
              </div>
              <div style={{fontSize:12.5,color:'var(--muted)',marginTop:2}}>{u.email}{u.job_title&&<span style={{marginLeft:8,fontWeight:600,color:'#4a5168'}}>{u.job_title}</span>}</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:5,marginTop:6}}>
                {MODULES.filter(m=>u[m.key]).map(m=>(
                  <span key={m.key} style={{fontSize:10.5,fontWeight:700,background:'#e7eefc',color:'#2a5bd0',padding:'2px 8px',borderRadius:20}}>{m.label}</span>
                ))}
                {!MODULES.some(m=>u[m.key])&&<span style={{fontSize:12,color:'var(--muted)',fontStyle:'italic'}}>Aucun accès configuré</span>}
              </div>
            </div>
            <div style={{display:'flex',gap:8,flexShrink:0}}>
              <button className="btn-ghost" style={{fontSize:13,padding:'7px 12px'}}
                onClick={()=>setExpandedId(expandedId===u.id?null:u.id)}>
                {expandedId===u.id?'Fermer':'Modifier les accès'}
              </button>
              {u.email!==adminEmail&&<button className="icon-btn del" onClick={()=>removeUser(u.id,u.email)}>Retirer</button>}
            </div>
          </div>

          {expandedId===u.id&&(
            <div style={{marginTop:16,paddingTop:16,borderTop:'1px solid var(--line)'}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:14}}>
                <div className="field" style={{margin:0}}>
                  <label>Nom complet</label>
                  <input defaultValue={u.name||''} onBlur={e=>updateUser(u,{name:e.target.value||null})} />
                </div>
                <div className="field" style={{margin:0}}>
                  <label>Nom d'utilisateur</label>
                  <input defaultValue={u.username||''} placeholder="Ex : desire.akoda"
                    autoCapitalize="off" autoCorrect="off"
                    onBlur={e=>updateUser(u,{username:e.target.value.trim().toLowerCase()||null})} />
                </div>
                <div className="field" style={{margin:0}}>
                  <label>Titre / Poste</label>
                  <input defaultValue={u.job_title||''} placeholder="Ex : Journaliste sportif"
                    onBlur={e=>updateUser(u,{job_title:e.target.value||null})} />
                </div>
              </div>
              <div style={{fontSize:12,fontWeight:700,letterSpacing:'.04em',color:'var(--muted)',marginBottom:8}}>ACCÈS AUX MODULES</div>
              <PermCheckboxes perms={u} onChange={(k,v)=>updateUser(u,{[k]:v})} />
            </div>
          )}
        </div>
      ))}

      {/* Add new user */}

function fmtFCFA(n){ if(!n&&n!==0) return '—'; return Number(n).toLocaleString('fr-FR')+ ' FCFA'; }
